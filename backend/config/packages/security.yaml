security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_email_provider:
            entity:
                class: App\Domain\User\User
                property: email
        app_user_id_provider:
            entity:
                class: App\Domain\User\User
                property: id

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: ^/
            stateless: true
            provider: app_user_id_provider
            jwt: ~

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/auth/register$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/email-availability$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/display-name-availability$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/password-reset/request$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/password-reset/confirm$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/email-verification/request$, roles: PUBLIC_ACCESS }
        - { path: ^/auth/email-verification/confirm$, roles: PUBLIC_ACCESS }
        - { path: ^/landing/preview$, roles: PUBLIC_ACCESS }
        - { path: ^/users/[^/]+/avatar$, roles: PUBLIC_ACCESS }
        - { path: ^/cards, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
