# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    game_websocket_listen_default: '0.0.0.0:8081'
    game_websocket_public_url_default: 'ws://127.0.0.1:8081'
    game_websocket_listen: '%env(default:game_websocket_listen_default:GAME_WEBSOCKET_LISTEN)%'
    game_websocket_public_url: '%env(default:game_websocket_public_url_default:GAME_WEBSOCKET_PUBLIC_URL)%'
    gameplay_metrics_output_default: ''
    gameplay_metrics_output: '%env(default:gameplay_metrics_output_default:GAMEPLAY_METRICS_OUTPUT)%'
    gameplay_compact_runtime_enabled_default: 'false'
    gameplay_compact_runtime_enabled: '%env(bool:default:gameplay_compact_runtime_enabled_default:GAMEPLAY_COMPACT_RUNTIME_ENABLED)%'
    gameplay_v2_command_enabled_default: 'false'
    gameplay_v2_patch_enabled_default: 'false'
    gameplay_v2_bootstrap_enabled_default: 'false'
    gameplay_v2_event_enabled_default: 'false'
    gameplay_v2_visibility_enabled_default: 'false'
    gameplay_v2_command_enabled: '%env(bool:default:gameplay_v2_command_enabled_default:GAMEPLAY_V2_COMMAND_ENABLED)%'
    gameplay_v2_patch_enabled: '%env(bool:default:gameplay_v2_patch_enabled_default:GAMEPLAY_V2_PATCH_ENABLED)%'
    gameplay_v2_bootstrap_enabled: '%env(bool:default:gameplay_v2_bootstrap_enabled_default:GAMEPLAY_V2_BOOTSTRAP_ENABLED)%'
    gameplay_v2_event_enabled: '%env(bool:default:gameplay_v2_event_enabled_default:GAMEPLAY_V2_EVENT_ENABLED)%'
    gameplay_v2_visibility_enabled: '%env(bool:default:gameplay_v2_visibility_enabled_default:GAMEPLAY_V2_VISIBILITY_ENABLED)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Application\Game\Performance\GameplayMetricsRecorderInterface:
        alias: App\Application\Game\Performance\GameplayMetricsStore

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
