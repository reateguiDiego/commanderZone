services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: commanderzone
      POSTGRES_USER: commanderzone
      POSTGRES_PASSWORD: commanderzone
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "commanderzone", "-U", "commanderzone"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "change-this-mercure-dev-secret"
      MERCURE_SUBSCRIBER_JWT_KEY: "change-this-mercure-dev-secret"
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:4200 http://127.0.0.1:4200 http://127.0.0.1:8000
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile
    ports:
      - "3000:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config

volumes:
  database_data:
  mercure_data:
  mercure_config:
