services:
  api:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-commanderzone-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql://commanderzone:commanderzone@database:5432/commanderzone?serverVersion=16&charset=utf8}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailpit:1025}
      MAILER_FROM_ADDRESS: ${MAILER_FROM_ADDRESS:-no-reply@commanderzone.com}
      MAILER_FROM_NAME: ${MAILER_FROM_NAME:-CommanderZone}
      AUTH_PUBLIC_APP_URL: ${AUTH_PUBLIC_APP_URL:-http://localhost:4200}
      CONTACT_INBOX_ADDRESS: ${CONTACT_INBOX_ADDRESS:-info.dev.sunrise@gmail.com}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-dev-secret-with-at-least-32-chars}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-change-this-jwt-dev-secret-with-at-least-32-chars}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-}
      AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL:-900}
      AUTH_REFRESH_TOKEN_TTL: ${AUTH_REFRESH_TOKEN_TTL:-604800}
      AUTH_REFRESH_REPLAY_GRACE_SECONDS: ${AUTH_REFRESH_REPLAY_GRACE_SECONDS:-20}
      AUTH_REFRESH_COOKIE_SAMESITE: ${AUTH_REFRESH_COOKIE_SAMESITE:-lax}
      AUTH_REFRESH_COOKIE_DOMAIN: ${AUTH_REFRESH_COOKIE_DOMAIN:-}
      MERCURE_URL: ${MERCURE_URL:-http://mercure/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-http://127.0.0.1:3000/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-change-this-mercure-dev-secret-with-at-least-32-chars}
      GAME_DEBUG_HEALTH_ENABLED: ${GAME_DEBUG_HEALTH_ENABLED:-0}
      GAMEPLAY_COMPACT_RUNTIME_ENABLED: ${GAMEPLAY_COMPACT_RUNTIME_ENABLED:-1}
      GAME_RUNTIME_ENABLED: ${GAME_RUNTIME_ENABLED:-1}
      GAME_RUNTIME_INTERNAL_URL: ${GAME_RUNTIME_INTERNAL_URL:-http://game-runtime:8091}
      GAME_RUNTIME_WEBSOCKET_PUBLIC_URL: ${GAME_RUNTIME_WEBSOCKET_PUBLIC_URL:-ws://127.0.0.1:8091/ws}
      GAME_RUNTIME_TICKET_SECRET: ${GAME_RUNTIME_TICKET_SECRET:-commanderzone-dev-runtime-secret-change-me}
      GAMEPLAY_V2_ENABLED: ${GAMEPLAY_V2_ENABLED:-1}
      GAMEPLAY_V2_COMMAND_ENABLED: ${GAMEPLAY_V2_COMMAND_ENABLED:-1}
      GAMEPLAY_V2_COMMANDS_ALLOWLIST: ${GAMEPLAY_V2_COMMANDS_ALLOWLIST:-life.changed,turn.changed,dice.rolled,card.tapped,card.face_down.changed,card.revealed,card.controller.changed,cards.position.changed,card.counter.changed,counter.changed,commander.damage.changed,card.power_toughness.changed,card.position.changed,library.draw,library.draw_many,library.reveal_top,library.reveal,library.play_top_revealed,library.reorder_top,library.move_top,library.put_top,library.put_bottom,library.view,library.shuffle,card.token.created,card.token_copy.created,zone.random_card.selected,card.dungeon_marker.changed,card.face.changed,card.moved,cards.moved,zone.reorderedByIds,zone.move_all,battlefield.untap_all,stack.card_added,stack.item_removed,arrow.created,arrow.removed,attachment.created,attachment.removed,helper.created,helper.updated,helper.removed,game.concede,game.close,mulligan.take,mulligan.keep,mulligan.cards_bottomed,mulligan.scry.confirm,mulligan.ready,mulligan.completed,game.phase.set}
      GAMEPLAY_V2_PATCH_ENABLED: ${GAMEPLAY_V2_PATCH_ENABLED:-1}
      GAMEPLAY_V2_BOOTSTRAP_ENABLED: ${GAMEPLAY_V2_BOOTSTRAP_ENABLED:-1}
      GAMEPLAY_V2_EVENT_ENABLED: ${GAMEPLAY_V2_EVENT_ENABLED:-1}
      GAMEPLAY_V2_VISIBILITY_ENABLED: ${GAMEPLAY_V2_VISIBILITY_ENABLED:-1}
      SEMANTIC_PATCHES_ENABLED: ${SEMANTIC_PATCHES_ENABLED:-1}
      COMPACT_BOOTSTRAP_ENABLED: ${COMPACT_BOOTSTRAP_ENABLED:-1}
      SHADOW_COMPARE_ENABLED: ${SHADOW_COMPARE_ENABLED:-0}
      GAMEPLAY_STREAMS_ENABLED: ${GAMEPLAY_STREAMS_ENABLED:-1}
      GAMEPLAY_METRICS_OUTPUT: ${GAMEPLAY_METRICS_OUTPUT:-}
      GAME_WEBSOCKET_PUBLIC_URL: ${GAME_WEBSOCKET_PUBLIC_URL:-ws://127.0.0.1:8081}
      SCRYFALL_USER_AGENT: ${SCRYFALL_USER_AGENT:-CommanderZone/0.1 contact@example.local}
      SCRYFALL_SYNC_MEMORY_LIMIT: ${SCRYFALL_SYNC_MEMORY_LIMIT:-20G}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$}
    ports:
      - "${API_PORT:-8000}:80"
    depends_on:
      database:
        condition: service_healthy
      mercure:
        condition: service_started
      mailpit:
        condition: service_started
      game-runtime:
        condition: service_healthy

  websocket:
    build:
      context: ./backend
    command: php bin/console app:game-websocket-server
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_SECRET: ${APP_SECRET:-commanderzone-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql://commanderzone:commanderzone@database:5432/commanderzone?serverVersion=16&charset=utf8}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-dev-secret-with-at-least-32-chars}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-change-this-jwt-dev-secret-with-at-least-32-chars}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-}
      GAME_WEBSOCKET_LISTEN: ${GAME_WEBSOCKET_LISTEN:-0.0.0.0:8081}
      GAME_WEBSOCKET_PUBLIC_URL: ${GAME_WEBSOCKET_PUBLIC_URL:-ws://127.0.0.1:8081}
      GAME_WEBSOCKET_CONNECTION_LIMIT: ${GAME_WEBSOCKET_CONNECTION_LIMIT:-1000}
      GAME_WEBSOCKET_CONNECTION_LIMIT_PER_IP: ${GAME_WEBSOCKET_CONNECTION_LIMIT_PER_IP:-100}
      GAME_DEBUG_HEALTH_ENABLED: ${GAME_DEBUG_HEALTH_ENABLED:-0}
      GAMEPLAY_COMPACT_RUNTIME_ENABLED: ${GAMEPLAY_COMPACT_RUNTIME_ENABLED:-1}
      GAME_RUNTIME_ENABLED: ${GAME_RUNTIME_ENABLED:-1}
      GAME_RUNTIME_INTERNAL_URL: ${GAME_RUNTIME_INTERNAL_URL:-http://game-runtime:8091}
      GAME_RUNTIME_TICKET_SECRET: ${GAME_RUNTIME_TICKET_SECRET:-commanderzone-dev-runtime-secret-change-me}
      GAMEPLAY_V2_ENABLED: ${GAMEPLAY_V2_ENABLED:-1}
      GAMEPLAY_V2_COMMAND_ENABLED: ${GAMEPLAY_V2_COMMAND_ENABLED:-1}
      GAMEPLAY_V2_COMMANDS_ALLOWLIST: ${GAMEPLAY_V2_COMMANDS_ALLOWLIST:-life.changed,turn.changed,dice.rolled,card.tapped,card.face_down.changed,card.revealed,card.controller.changed,cards.position.changed,card.counter.changed,counter.changed,commander.damage.changed,card.power_toughness.changed,card.position.changed,library.draw,library.draw_many,library.reveal_top,library.reveal,library.play_top_revealed,library.reorder_top,library.move_top,library.put_top,library.put_bottom,library.view,library.shuffle,card.token.created,card.token_copy.created,zone.random_card.selected,card.dungeon_marker.changed,card.face.changed,card.moved,cards.moved,zone.reorderedByIds,zone.move_all,battlefield.untap_all,stack.card_added,stack.item_removed,arrow.created,arrow.removed,attachment.created,attachment.removed,helper.created,helper.updated,helper.removed,game.concede,game.close,mulligan.take,mulligan.keep,mulligan.cards_bottomed,mulligan.scry.confirm,mulligan.ready,mulligan.completed,game.phase.set}
      GAMEPLAY_V2_PATCH_ENABLED: ${GAMEPLAY_V2_PATCH_ENABLED:-1}
      GAMEPLAY_V2_BOOTSTRAP_ENABLED: ${GAMEPLAY_V2_BOOTSTRAP_ENABLED:-1}
      GAMEPLAY_V2_EVENT_ENABLED: ${GAMEPLAY_V2_EVENT_ENABLED:-1}
      GAMEPLAY_V2_VISIBILITY_ENABLED: ${GAMEPLAY_V2_VISIBILITY_ENABLED:-1}
      SEMANTIC_PATCHES_ENABLED: ${SEMANTIC_PATCHES_ENABLED:-1}
      COMPACT_BOOTSTRAP_ENABLED: ${COMPACT_BOOTSTRAP_ENABLED:-1}
      SHADOW_COMPARE_ENABLED: ${SHADOW_COMPARE_ENABLED:-0}
      GAMEPLAY_STREAMS_ENABLED: ${GAMEPLAY_STREAMS_ENABLED:-1}
      GAMEPLAY_METRICS_OUTPUT: ${GAMEPLAY_METRICS_OUTPUT:-}
    ports:
      - "127.0.0.1:${GAME_WEBSOCKET_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "php", "bin/ws-healthcheck.php"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      database:
        condition: service_healthy
      game-runtime:
        condition: service_healthy

  game-runtime:
    build:
      context: ./game-runtime
      dockerfile: Dockerfile
      args:
        GO_BUILD_IMAGE: ${GAME_RUNTIME_GO_BUILD_IMAGE:-golang:1.22.12-bookworm}
    environment:
      GAME_RUNTIME_LISTEN: ${GAME_RUNTIME_LISTEN:-0.0.0.0:8091}
      GAME_RUNTIME_OWNERSHIP_MODE: ${GAME_RUNTIME_OWNERSHIP_MODE:-single-node}
      # Use a runtime-specific DB URL so local runtime never inherits production DATABASE_URL.
      GAME_RUNTIME_PERSISTENCE: ${GAME_RUNTIME_PERSISTENCE:-postgres}
      DATABASE_URL: ${GAME_RUNTIME_DATABASE_URL:-postgresql://commanderzone:commanderzone@database:5432/commanderzone}
      GAME_RUNTIME_TICKET_SECRET: ${GAME_RUNTIME_TICKET_SECRET:-commanderzone-dev-runtime-secret-change-me}
    ports:
      - "127.0.0.1:${GAME_RUNTIME_PORT:-8091}:8091"
    expose:
      - "8091"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: commanderzone
      POSTGRES_USER: commanderzone
      POSTGRES_PASSWORD: commanderzone
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "commanderzone", "-U", "commanderzone"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "change-this-mercure-dev-secret-with-at-least-32-chars"
      MERCURE_SUBSCRIBER_JWT_KEY: "change-this-mercure-dev-secret-with-at-least-32-chars"
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:4200 http://127.0.0.1:4200 http://localhost:8000 http://127.0.0.1:8000
        anonymous
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile
    ports:
      - "3000:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  database_data:
  mercure_data:
  mercure_config:
