services:
  api:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: commanderzone-dev-secret-change-me
      DATABASE_URL: postgresql://commanderzone:commanderzone@database:5432/commanderzone?serverVersion=16&charset=utf8
      JWT_SECRET_KEY: change-this-jwt-dev-secret-with-at-least-32-chars
      JWT_PUBLIC_KEY: change-this-jwt-dev-secret-with-at-least-32-chars
      JWT_PASSPHRASE: ""
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: http://127.0.0.1:3000/.well-known/mercure
      MERCURE_JWT_SECRET: change-this-mercure-dev-secret-with-at-least-32-chars
      SCRYFALL_USER_AGENT: CommanderZone/0.1 contact@example.local
      SCRYFALL_SYNC_MEMORY_LIMIT: 1024M
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
    ports:
      - "8000:80"
    depends_on:
      database:
        condition: service_healthy
      mercure:
        condition: service_started

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: commanderzone
      POSTGRES_USER: commanderzone
      POSTGRES_PASSWORD: commanderzone
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "commanderzone", "-U", "commanderzone"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "change-this-mercure-dev-secret-with-at-least-32-chars"
      MERCURE_SUBSCRIBER_JWT_KEY: "change-this-mercure-dev-secret-with-at-least-32-chars"
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:4200 http://127.0.0.1:4200 http://127.0.0.1:8000
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile
    ports:
      - "3000:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config

volumes:
  database_data:
  mercure_data:
  mercure_config:
