      responses:
        '200':
          description: Incoming room invites.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoomInvite'
        '401':
          $ref: '#/components/responses/Error'
  /rooms/{id}/invites:
    post:
      tags: [Rooms]
      summary: Invite an accepted friend to a waiting room.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomInviteRequest'
      responses:
        '201':
          description: Room invite created.
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: '#/components/schemas/RoomInvite'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/invites/{id}/accept:
    post:
      tags: [Rooms]
      summary: Accept a pending room invite and join the room if the user is not already in another active room.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckSelection'
      responses:
        '200':
          description: Room invite accepted.
          content:
            application/json:
              schema:
                type: object
                required: [invite, room]
                properties:
                  invite:
                    $ref: '#/components/schemas/RoomInvite'
                  room:
                    $ref: '#/components/schemas/Room'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/invites/{id}/decline:
    post:
      tags: [Rooms]
      summary: Decline a pending room invite.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Room invite declined.
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: '#/components/schemas/RoomInvite'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /rooms/{id}/join:
    post:
      tags: [Rooms]
      summary: Join a waiting room by id when the user is not already in another active room.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/code/{code}/join:
    post:
      tags: [Rooms]
      summary: Join a waiting room by short room code when the user is not already in another active room.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: CZ-ABC-DEF-123
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/roll-turn:
    post:
      tags: [Rooms]
      summary: Roll a d20 for waiting-room turn order or an unresolved tie-break.
      description: >
        Rolls a real d20 for the current room player. Ties are allowed on the
        initial roll; only players in an unresolved tie group may roll again
        until turn order is fully resolved.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Updated room with the player's turn-order roll history.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/leave:
    post:
      tags: [Rooms]
      summary: Leave an active room as a current room player.
      description: Leaves the room membership and returns only the leave result. If leaving removes the last player, the room is deleted.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Leave operation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveRoomResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /rooms/{id}/players/{playerId}:
    delete:
      tags: [Rooms]
      summary: Kick a player from a waiting room as the room owner.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/start:
    post:
      tags: [Rooms]
      summary: Start a room and create a game.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '201':
          description: Started game.
          content:
            application/json:
              schema:
                type: object
                required: [room, game]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
                  game:
                    $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /games/{id}/snapshot:
    get:
      tags: [Games]
      summary: Get current game snapshot.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Game snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [game]
                properties:
                  game:
                    $ref: '#/components/schemas/Game'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/bootstrap:
    get:
      tags: [Games]
      summary: Get initial game bootstrap snapshot.
      description: Returns the same projected GameSnapshot shape as /games/{id}/snapshot for initial client synchronization.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Game bootstrap snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [game]
                properties:
                  game:
                    $ref: '#/components/schemas/Game'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/websocket-ticket:
    post:
      tags: [Games]
      summary: Issue a short-lived gameplay WebSocket ticket.
      description: The ticket is scoped to the game and current authenticated user and opens the Go runtime gameplay WebSocket route (`runtime_ws`). PHP websocket routes are not returned for gameplay.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Short-lived WebSocket ticket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameWebsocketTicketResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/debug/health:
    get:
      tags: [Games]
      summary: Get private gameplay debug health for one game.
      description: Returns sanitized debug page context and an empty technical baseline. Live WebSocket/sync diagnostics are collected only while a separate debug WebSocket is connected at /games/{id}/debug. It does not expose game snapshots, card names, chat text, or card instance identifiers.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Sanitized debug health report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDebugHealthResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/events:
    get:
      tags: [Games]
      summary: List persisted game activity for reconnection and synchronization.
      description: Returns legacy `game_event` records by default. When gameplay streams are enabled, it returns a merged activity stream built from `game_log_entry` and chat stream visibility for the authenticated viewer.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
        - name: cursor
          in: query
          schema:
            type: string
          description: Stream cursor returned by bootstrap `chatCursor` or `logCursor` when gameplay streams are enabled.
        - name: after
          in: query
          schema:
            type: string
            format: date-time
          description: Legacy game-event pagination cursor. Ignored when gameplay streams are enabled.
      responses:
        '200':
          description: Ordered game activity.
          content:
            application/json:
              schema:
                type: object
                required: [data, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameActivityEntry'
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/chat:
    get:
      tags: [Games]
      summary: List chat messages outside the gameplay runtime snapshot.
      description: Available only when gameplay chat streams are enabled. Visibility rules still apply: private messages are only returned to the sender and target player.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 150
        - name: cursor
          in: query
          schema:
            type: string
          description: Stable message id returned as `chatCursor` by V2 bootstrap.
      responses:
        '200':
          description: Ordered chat messages.
          content:
            application/json:
              schema:
                type: object
                required: [data, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatMessage'
                  limit:
                    type: integer
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/log:
    get:
      tags: [Games]
      summary: List gameplay log entries outside the gameplay runtime snapshot.
      description: Available only when gameplay log streams are enabled.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 250
        - name: cursor
          in: query
          schema:
            type: string
          description: Stable log entry id returned as `logCursor` by V2 bootstrap.
      responses:
        '200':
          description: Ordered gameplay log entries.
          content:
            application/json:
              schema:
                type: object
                required: [data, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameLogEntry'
                  limit:
                    type: integer
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/rematch-vote:
    post:
      tags: [Games]
      summary: Vote to leave or replay after defeat/game end.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RematchVoteRequest'
      responses:
        '200':
          description: Current rematch vote status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RematchVoteResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/disconnect-vote:
    post:
      tags: [Games]
      summary: Vote how to handle a disconnected player (wait or expel).
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisconnectVoteRequest'
      responses:
        '201':
          description: Disconnect vote stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisconnectVoteResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/zones/{playerId}/{zone}:
    get:
      tags: [Games]
      summary: List a projected game zone.
      description: Hand and library are private; non-owners only receive cards explicitly revealed to them.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: zone
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/GameZoneName'
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Projected zone cards.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameZoneResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/commands:
    post:
      tags: [Games]
      summary: Apply a manual game command and publish a Mercure event.
      description: Unknown command types are rejected. Finished games only accept explicitly allowed command types.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCommand'
            examples:
              chat:
                value:
                  type: chat.message
                  payload:
                    message: Hello
              privateChat:
                value:
                  type: chat.message
                  payload:
                    message: Hello
                    targetPlayerId: 01966d5f-0000-7000-8000-000000000001
              chatReaction:
                value:
                  type: chat.reaction.toggled
                  payload:
                    messageId: 01966d5f-0000-7000-8000-000000000010
                    reaction: like
              life:
                value:
                  type: life.changed
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    delta: -1
              move:
                value:
                  type: card.moved
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    fromZone: hand
                    toZone: battlefield
                    instanceId: card-instance-id
              playFaceDown:
                value:
                  type: card.moved
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    fromZone: hand
                    toZone: battlefield
                    instanceId: card-instance-id
                    faceDown: true
      responses:
        '201':
          description: Created game event and current snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [event, snapshot, version, applied]
                properties:
                  event:
                    $ref: '#/components/schemas/GameEvent'
                  snapshot:
                    $ref: '#/components/schemas/GameSnapshot'
                  version:
                    type: integer
                  applied:
                    type: boolean
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: commanderzone.refresh
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScryfallId:
      name: scryfallId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        count:
          type: integer
          minimum: 0
          description: Present on login failures with the active failed-login attempt count.
    GameWebsocketTicketResponse:
      type: object
      required: [ticket, expiresAt, websocketUrl, route, claims]
      properties:
        ticket:
          type: string
          description: HMAC-signed short-lived runtime ticket scoped to one game and user.
        expiresAt:
          type: string
          format: date-time
        websocketUrl:
          type: string
          format: uri
          example: ws://127.0.0.1:8091/ws?ticket=...
        route:
          type: string
          enum: [runtime_ws]
          description: Active gameplay websocket route. Legacy/PHP routes must not be returned by this endpoint.
        claims:
          type: object
          required: [gameId, userId, playerId, role, permissions, expiry]
          properties:
            gameId:
              type: string
              format: uuid
            userId:
              type: string
              format: uuid
            playerId:
              type: string
              format: uuid
            role:
              type: string
              enum: [player, viewer]
            permissions:
              type: array
              items:
                type: string
                enum: [view, command]
            expiry:
              type: integer
              description: Unix timestamp matching the signed ticket `exp` claim.
    GameDebugHealthResponse:
      type: object
      required: [gameId, enabled, context, health, generatedAt, updatedAt]
      properties:
        gameId:
          type: string
          format: uuid
        enabled:
          type: boolean
          description: Whether live debug instrumentation is enabled for gameplay websocket traffic.
        context:
          type: object
          required: [players, viewerCount, languageCount, uniqueCardCount, uniqueScryfallIdCount, debugObserved, usingLegacyLocalizationFallback]
          properties:
            players:
              type: array
              description: Player-facing context allowed in friend games. This does not include card names or zone contents.
              items:
                type: object
                required: [playerId, displayName, deckName, status]
                properties:
                  playerId:
                    type: string
                    format: uuid
                  displayName:
                    type: string
                  deckName:
                    type: string
                    nullable: true
                  status:
                    type: string
            viewerCount:
              type: integer
            languageCount:
              type: integer
            uniqueCardCount:
              type: integer
            uniqueScryfallIdCount:
              type: integer
            debugObserved:
              type: boolean
            usingLegacyLocalizationFallback:
              nullable: true
              oneOf:
                - type: boolean
                - type: 'null'
        health:
          $ref: '#/components/schemas/GameDebugHealth'
        generatedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GameDebugHealth:
      type: object
      required: [websocket, traffic, actions, pipeline, performance, replay, sync, errors, bootstrap, recent, events]
      properties:
        websocket:
          type: object
          required: [connections]
          properties:
            connections:
              type: object
              required: [total, byUser, transitions, disconnectRanking]
              properties:
                total:
                  type: integer
                byUser:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      displayName:
                        type: string
                      status:
                        type: string
                      connections:
                        type: integer
                      disconnects:
                        type: integer
                      lastConnectedAt:
                        type: string
                        nullable: true
                      lastDisconnectedAt:
                        type: string
                        nullable: true
                      offlineSince:
                        type: string
                        nullable: true
                transitions:
                  type: object
                  required: [online, offline]
                  properties:
                    online:
                      type: integer
                    offline:
                      type: integer
                disconnectRanking:
                  type: array
                  items:
                    type: object
                    required: [userId, displayName, disconnects, status, lastDisconnectedAt]
                    properties:
                      userId:
                        type: string
                      displayName:
                        type: string
                      disconnects:
                        type: integer
                      status:
                        type: string
                      lastDisconnectedAt:
                        type: string
                        nullable: true
            lastSeen:
              type: object
              nullable: true
              additionalProperties: true
        traffic:
          type: object
          required: [incoming, outgoing, keepalive]
          properties:
            incoming:
              $ref: '#/components/schemas/GameDebugTrafficBucket'
            outgoing:
              $ref: '#/components/schemas/GameDebugTrafficBucket'
            keepalive:
              type: object
              required: [incoming, outgoing]
              properties:
                incoming:
                  $ref: '#/components/schemas/GameDebugTrafficBucket'
                outgoing:
                  $ref: '#/components/schemas/GameDebugTrafficBucket'
        actions:
          type: object
          required: [total, byType, recent]
          properties:
            total:
              type: integer
            byType:
              type: object
              additionalProperties:
                type: integer
            recent:
              type: array
              description: Recent sanitized action exchanges with inbound/outbound counts, character sizes, operation types, duration, and optional backend phase timings.
              items:
                type: object
                properties:
                  kind:
                    type: string
                  action:
                    type: string
                  durationMs:
                    type: number
                  phases:
                    $ref: '#/components/schemas/GameDebugActionPhases'
                additionalProperties: true
        pipeline:
          type: object
          required: [gamePatch, commandAck, resyncRequired, error, pong, presenceChanged]
          properties:
            gamePatch:
              type: integer
            commandAck:
              type: object
              required: [rejected, duplicate, resync_required]
              properties:
                rejected:
                  type: integer
                duplicate:
                  type: integer
                resync_required:
                  type: integer
            resyncRequired:
              type: integer
            error:
              type: integer
            pong:
              type: integer
