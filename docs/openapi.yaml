openapi: 3.1.0
info:
  title: CommanderZone API
  version: 0.1.0
  description: "Backend API for a manual Magic: The Gathering Commander table."
servers:
  - url: http://127.0.0.1:8000
    description: Local Symfony API
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Friends
  - name: Cards
  - name: DeckFolders
  - name: Decks
  - name: Rooms
  - name: Games
paths:
  /landing/preview:
    get:
      tags: [Landing]
      summary: Return public randomized names used by the landing page preview.
      responses:
        '200':
          description: Landing preview data.
          content:
            application/json:
              schema:
                type: object
                required: [cardName, displayName]
                properties:
                  cardName:
                    type: string
                  displayName:
                    type: string
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                type: object
                required: [user, verificationRequired]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  verificationRequired:
                    type: boolean
                    description: Indicates the account must verify email ownership.
        '409':
          $ref: '#/components/responses/Error'
  /auth/email-availability:
    get:
      tags: [Auth]
      security: []
      summary: Check if an email is available.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Email availability.
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available:
                    type: boolean
  /auth/display-name-availability:
    get:
      tags: [Auth]
      security: []
      summary: Check if a user name is available.
      parameters:
        - name: displayName
          in: query
          required: true
          schema:
            type: string
            minLength: 4
            maxLength: 25
      responses:
        '200':
          description: User name availability.
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available:
                    type: boolean
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and receive a short-lived JWT access token (verified accounts only).
      description: Also sets an HttpOnly refresh cookie (`commanderzone.refresh`) used by `/auth/refresh`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access token plus refresh cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /auth/refresh:
    post:
      tags: [Auth]
      security:
        - refreshCookieAuth: []
      summary: Rotate refresh token cookie and return a new JWT access token.
      description: Requires an HttpOnly refresh cookie. On success, returns a new access token and rotated refresh cookie.
      responses:
        '200':
          description: Access token refreshed and cookie rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Error'
  /auth/logout:
    post:
      tags: [Auth]
      security:
        - refreshCookieAuth: []
      summary: Revoke current refresh session and clear refresh cookie.
      responses:
        '204':
          description: Session revoked and refresh cookie cleared.
  /auth/password-reset/request:
    post:
      tags: [Auth]
      security: []
      summary: Request password reset with one-time token flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Password reset request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestAcceptedResponse'
  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      security: []
      summary: Confirm password reset by one-time token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password was updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirmResponse'
        '400':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /auth/email-verification/request:
    post:
      tags: [Auth]
      security: []
      summary: Re-send email verification token for an unverified account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '202':
          description: Email verification request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestAcceptedResponse'
  /auth/email-verification/confirm:
    post:
      tags: [Auth]
      security: []
      summary: Confirm email ownership with token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verified and authenticated session returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationConfirmResponse'
        '400':
          $ref: '#/components/responses/Error'
  /me:
    get:
      tags: [Auth]
      summary: Get the authenticated user.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
    patch:
      tags: [Auth]
      summary: Update authenticated user's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                displayName:
                  type: string
                  minLength: 4
                  maxLength: 25
                email:
                  type: string
                  format: email
                cardLanguage:
                  type: string
                  enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
                appLanguage:
                  type: string
                  enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Auth]
      summary: Delete authenticated user account (anonymized deletion).
      responses:
        '204':
          description: Account deleted.
        '401':
          $ref: '#/components/responses/Error'
  /me/avatar:
    patch:
      tags: [Auth]
      summary: Update authenticated user's avatar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarUpdateRequest'
      responses:
        '200':
          description: Updated user avatar.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /me/display-name-style:
    patch:
      tags: [Auth]
      summary: Update authenticated user's display name style.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisplayNameStyleUpdateRequest'
      responses:
        '200':
          description: Updated user display name style.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /users/{id}/avatar:
    get:
      tags: [Auth]
      security: []
      summary: Load an uploaded user avatar image.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Uploaded avatar image.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '404':
          description: Avatar image was not found.
  /me/password:
    patch:
      tags: [Auth]
      summary: Change authenticated user's password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$'
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /me/offline:
    post:
      tags: [Auth]
      summary: Mark the authenticated user as offline.
      responses:
        '204':
          description: User marked offline.
        '401':
          $ref: '#/components/responses/Error'
  /friends:
    get:
      tags: [Friends]
      summary: List accepted friendships for the authenticated user.
      responses:
        '200':
          description: Accepted friendships.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/search:
    get:
      tags: [Friends]
      summary: Search users by email or display name.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: Matching users with current friendship status.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FriendSearchResult'
        '401':
          $ref: '#/components/responses/Error'
  /friends/{userId}:
    delete:
      tags: [Friends]
      summary: Remove an accepted friendship with a user.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Friendship removed.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests:
    post:
      tags: [Friends]
      summary: Send a friend request by exact email or user id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestCreateRequest'
      responses:
        '201':
          description: Friend request created.
          content:
            application/json:
              schema:
                type: object
                required: [friendship]
                properties:
                  friendship:
                    $ref: '#/components/schemas/Friendship'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /friends/requests/incoming:
    get:
      tags: [Friends]
      summary: List pending friend requests received by the authenticated user.
      responses:
        '200':
          description: Incoming friend requests.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/requests/outgoing:
    get:
      tags: [Friends]
      summary: List pending friend requests sent by the authenticated user.
      responses:
        '200':
          description: Outgoing friend requests.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}:
    delete:
      tags: [Friends]
      summary: Cancel a pending outgoing friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Friend request cancelled.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}/accept:
    post:
      tags: [Friends]
      summary: Accept a pending incoming friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Friend request accepted.
          content:
            application/json:
              schema:
                type: object
                required: [friendship]
                properties:
                  friendship:
                    $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}/decline:
    post:
      tags: [Friends]
      summary: Decline a pending incoming friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Friend request declined.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /cards/search:
    get:
      tags: [Cards]
      security: []
      summary: Search cards imported from Scryfall.
      description: Searches canonical card names and localized card names imported from Scryfall, including printed and flavor names where available.
      parameters:
        - name: q
          in: query
          description: Search text matched against canonical names, localized printed names, and flavor names.
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 25
        - name: commanderLegal
          in: query
          schema:
            type: boolean
        - name: colorIdentity
          in: query
          description: Comma-separated color identity symbols.
          schema:
            type: string
            example: W,U
        - name: type
          in: query
          schema:
            type: string
            enum: [creature, instant, sorcery, artifact, enchantment, planeswalker, land]
        - name: tokenOnly
          in: query
          description: When true, restricts results to token cards in the local catalog.
          schema:
            type: boolean
        - name: lang
          in: query
          description: Preferred card language. Falls back to English, then to the original printing.
          schema:
            type: string
            enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
          description: Card search results.
          content:
            application/json:
              schema:
                type: object
                required: [data, page, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  page:
                    type: integer
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
  /cards/resolve:
    get:
      tags: [Cards]
      security: []
      summary: Resolve a card from local Scryfall data.
      parameters:
        - name: scryfallId
          in: query
          schema:
            type: string
            format: uuid
        - name: name
          in: query
          schema:
            type: string
        - name: setCode
          in: query
          schema:
            type: string
        - name: collectorNumber
          in: query
          schema:
            type: string
        - name: flavorName
          in: query
          schema:
            type: string
        - name: lang
          in: query
          description: Preferred card language. Falls back to English, then to the original printing.
          schema:
            type: string
            enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
          description: Resolved card.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          description: Ambiguous resolution.
          content:
            application/json:
              schema:
                type: object
                required: [error, matches]
                properties:
                  error:
                    type: string
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
  /cards/{scryfallId}:
    get:
      tags: [Cards]
      security: []
      summary: Get a card by Scryfall id.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
        - name: lang
          in: query
          description: Preferred card language. Falls back to English, then to the original printing.
          schema:
            type: string
            enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
          description: Card detail.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
  /cards/{scryfallId}/image:
    get:
      tags: [Cards]
      security: []
      summary: Resolve or proxy a Scryfall card image.
      description: Returns the image for the requested Scryfall id only. It does not accept a language parameter; localized images are returned in localized card payloads.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
        - name: format
          in: query
          schema:
            type: string
            enum: [small, normal, large, png, art_crop, border_crop]
            default: normal
        - name: mode
          in: query
          schema:
            type: string
            enum: [uri, redirect, binary]
            default: uri
      responses:
        '200':
          description: Image URI or binary image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImageResponse'
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '302':
          description: Redirect to Scryfall image URI.
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
  /deck-folders:
    get:
      tags: [DeckFolders]
      summary: List authenticated user's deck folders.
      responses:
        '200':
          description: Deck folders.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFolder'
    post:
      tags: [DeckFolders]
      summary: Create a deck folder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckFolderRequest'
      responses:
        '201':
          description: Created deck folder.
          content:
            application/json:
              schema:
                type: object
                required: [folder]
                properties:
                  folder:
                    $ref: '#/components/schemas/DeckFolder'
        '400':
          $ref: '#/components/responses/Error'
  /deck-folders/names:
    get:
      tags: [DeckFolders]
      summary: List authenticated user's deck folder names.
      responses:
        '200':
          description: Lightweight deck folder names.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFolder'
  /deck-folders/{id}:
    patch:
      tags: [DeckFolders]
      summary: Rename a deck folder.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckFolderRequest'
      responses:
        '200':
          description: Updated deck folder.
          content:
            application/json:
              schema:
                type: object
                required: [folder]
                properties:
                  folder:
                    $ref: '#/components/schemas/DeckFolder'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [DeckFolders]
      summary: Delete a deck folder and leave its decks without folder.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/Error'
  /deck-formats:
    get:
      tags: [Decks]
      summary: List supported deck creation formats.
      responses:
        '200':
          description: Supported deck formats.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFormat'
  /decklists/parse:
    post:
      tags: [Decks]
      summary: Parse and resolve a decklist without modifying a deck.
      description: If format is omitted, the backend auto-detects plain, Moxfield, or Archidekt text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecklistParseRequest'
      responses:
        '200':
          description: Parsed decklist preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecklistParseResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /decks:
    get:
      tags: [Decks]
      summary: List authenticated user's decks.
      parameters:
        - name: folderId
          in: query
          description: Use a folder UUID or the literal null for decks without folder.
          schema:
            type: string
      responses:
        '200':
          description: Deck list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckSummary'
    post:
      tags: [Decks]
      summary: Create a deck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeckRequest'
      responses:
        '201':
          description: Created deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
  /decks/quick-build:
    post:
      tags: [Decks]
      summary: Create a deck and add initial cards in one request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckQuickBuildRequest'
      responses:
        '201':
          description: Created deck with unresolved card details.
          content:
            application/json:
              schema:
                type: object
                required: [deck, missing, missingCards]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
                  missing:
                    type: array
                    items:
                      type: string
                  missingCards:
                    type: array
                    items:
                      $ref: '#/components/schemas/MissingDeckCard'
        '400':
          $ref: '#/components/responses/Error'
        '401':
