          format: uuid
        version:
          type: integer
          minimum: 1
        ackClientActionId:
          type: [string, 'null']
        visibility:
          type: string
          pattern: '^(public|player:[^:]+|group:[A-Za-z0-9_-]+)$'
        ops:
          type: array
          items:
            $ref: '#/components/schemas/PatchOperationV2'
    PatchOperationV2:
      type: object
      required: [op]
      properties:
