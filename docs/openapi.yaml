openapi: 3.1.0
info:
  title: CommanderZone API
  version: 0.1.0
  description: "Backend API for a manual Magic: The Gathering Commander table."
servers:
  - url: http://127.0.0.1:8000
    description: Local Symfony API
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Friends
  - name: Cards
  - name: DeckFolders
  - name: Decks
  - name: Rooms
  - name: Games
paths:
  /landing/preview:
    get:
      tags: [Landing]
      summary: Return public randomized names used by the landing page preview.
      responses:
        '200':
          description: Landing preview data.
          content:
            application/json:
              schema:
                type: object
                required: [cardName, displayName]
                properties:
                  cardName:
                    type: string
                  displayName:
                    type: string
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                type: object
                required: [user, verificationRequired]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  verificationRequired:
                    type: boolean
                    description: Indicates the account must verify email ownership.
        '409':
          $ref: '#/components/responses/Error'
  /auth/email-availability:
    get:
      tags: [Auth]
      security: []
      summary: Check if an email is available.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Email availability.
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available:
                    type: boolean
  /auth/display-name-availability:
    get:
      tags: [Auth]
      security: []
      summary: Check if a user name is available.
      parameters:
        - name: displayName
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 20
      responses:
        '200':
          description: User name availability.
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available:
                    type: boolean
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and receive a short-lived JWT access token (verified accounts only).
      description: Accepts an email address or user name as `identifier`. Also sets an HttpOnly refresh cookie (`commanderzone.refresh`) used by `/auth/refresh`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access token plus refresh cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /auth/refresh:
    post:
      tags: [Auth]
      security:
        - refreshCookieAuth: []
      summary: Rotate refresh token cookie and return a new JWT access token.
      description: Requires an HttpOnly refresh cookie. On success, returns a new access token and rotated refresh cookie.
      responses:
        '200':
          description: Access token refreshed and cookie rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Error'
  /auth/logout:
    post:
      tags: [Auth]
      security:
        - refreshCookieAuth: []
      summary: Revoke current refresh session and clear refresh cookie.
      responses:
        '204':
          description: Session revoked and refresh cookie cleared.
  /contact:
    post:
      tags: [Contact]
      security: []
      summary: Send a public contact request to the CommanderZone inbox.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
      responses:
        '202':
          description: Contact request accepted for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
  /auth/password-reset/request:
    post:
      tags: [Auth]
      security: []
      summary: Request password reset with one-time token flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Password reset request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestAcceptedResponse'
  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      security: []
      summary: Confirm password reset by one-time token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password was updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirmResponse'
        '400':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /auth/email-verification/request:
    post:
      tags: [Auth]
      security: []
      summary: Re-send email verification token for an unverified account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '202':
          description: Email verification request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestAcceptedResponse'
  /auth/email-verification/confirm:
    post:
      tags: [Auth]
      security: []
      summary: Confirm email ownership with token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verified and authenticated session returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationConfirmResponse'
        '400':
          $ref: '#/components/responses/Error'
  /me:
    get:
      tags: [Auth]
      summary: Get the authenticated user.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
    patch:
      tags: [Auth]
      summary: Update authenticated user's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                displayName:
                  type: string
                  minLength: 2
                  maxLength: 20
                email:
                  type: string
                  format: email
                cardLanguage:
                  type: string
                  enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
                appLanguage:
                  type: string
                  enum: [en, fr, de, it, es, ja, zhs, pt, ru, nl, ca]
                gamePreferences:
                  $ref: '#/components/schemas/UserGamePreferences'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Auth]
      summary: Delete authenticated user account (anonymized deletion).
      responses:
        '204':
          description: Account deleted.
  /themes:
    get:
      tags: [Auth]
      summary: Get the authenticated user's selected app theme.
      responses:
        '200':
          description: Current theme preference.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemePreferenceResponse'
        '401':
          $ref: '#/components/responses/Error'
    put:
      tags: [Auth]
      summary: Update the authenticated user's selected app theme.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [themeId]
              properties:
                themeId:
                  $ref: '#/components/schemas/AppThemeId'
      responses:
        '200':
          description: Updated theme preference.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemePreferenceResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /me/avatar:
    patch:
      tags: [Auth]
      summary: Update authenticated user's avatar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarUpdateRequest'
      responses:
        '200':
          description: Updated user avatar.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /me/display-name-style:
    patch:
      tags: [Auth]
      summary: Update authenticated user's display name style.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisplayNameStyleUpdateRequest'
      responses:
        '200':
          description: Updated user display name style.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /users/{id}/avatar:
    get:
      tags: [Auth]
      security: []
      summary: Load an uploaded user avatar image.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Uploaded avatar image.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '404':
          description: Avatar image was not found.
  /me/password:
    patch:
      tags: [Auth]
      summary: Change authenticated user's password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$'
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /me/offline:
    post:
      tags: [Auth]
      summary: Mark the authenticated user as offline.
      responses:
        '204':
          description: User marked offline.
        '401':
          $ref: '#/components/responses/Error'
  /friends:
    get:
      tags: [Friends]
      summary: List accepted friendships for the authenticated user.
      responses:
        '200':
          description: Accepted friendships.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/search:
    get:
      tags: [Friends]
      summary: Search users by display name.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: Matching users with current friendship status.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FriendSearchResult'
        '401':
          $ref: '#/components/responses/Error'
  /friends/{userId}:
    delete:
      tags: [Friends]
      summary: Remove an accepted friendship with a user.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Friendship removed.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests:
    post:
      tags: [Friends]
      summary: Send a friend request by user id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestCreateRequest'
      responses:
        '201':
          description: Friend request created.
          content:
            application/json:
              schema:
                type: object
                required: [friendship]
                properties:
                  friendship:
                    $ref: '#/components/schemas/Friendship'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /friends/requests/incoming:
    get:
      tags: [Friends]
      summary: List pending friend requests received by the authenticated user.
      responses:
        '200':
          description: Incoming friend requests.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/requests/outgoing:
    get:
      tags: [Friends]
      summary: List pending friend requests sent by the authenticated user.
      responses:
        '200':
          description: Outgoing friend requests.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}:
    delete:
      tags: [Friends]
      summary: Cancel a pending outgoing friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Friend request cancelled.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}/accept:
    post:
      tags: [Friends]
      summary: Accept a pending incoming friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Friend request accepted.
          content:
            application/json:
              schema:
                type: object
                required: [friendship]
                properties:
                  friendship:
                    $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}/decline:
    post:
      tags: [Friends]
      summary: Decline a pending incoming friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Friend request declined.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /cards/search:
    get:
      tags: [Cards]
      security: []
      summary: Search cards imported from Scryfall.
      description: Searches canonical card names and localized card names imported from Scryfall, including printed and flavor names where available.
      parameters:
        - name: q
          in: query
          description: Search text matched against canonical names, localized printed names, and flavor names.
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 25
        - name: sort
          in: query
          description: Result ordering. Relevance preserves the existing search ranking.
          schema:
            type: string
            enum: [relevance, colors, name_asc, name_desc, mana_value_asc, mana_value_desc]
            default: relevance
        - name: commanderLegal
          in: query
          schema:
            type: boolean
        - name: colorIdentity
          in: query
          description: Comma-separated color identity symbols.
          schema:
            type: string
            example: W,U
        - name: type
          in: query
          schema:
            type: string
            enum: [creature, instant, sorcery, artifact, enchantment, planeswalker, battle, land]
        - name: types
          in: query
          description: Comma-separated type filters. Matches any selected type.
          schema:
            type: string
            example: creature,artifact
        - name: subtypes
          in: query
          description: Comma-separated subtype filters. Matches any selected subtype in typeLine.
          schema:
            type: string
            example: elf,druid
        - name: sets
          in: query
          description: Comma-separated Scryfall set codes.
          schema:
            type: string
            example: cmm,ltr
        - name: rarities
          in: query
          description: Comma-separated rarities.
          schema:
            type: string
            enum: [mythic, rare, uncommon, common]
        - name: colors
          in: query
          description: Comma-separated printed color symbols.
          schema:
            type: string
            example: W,U
        - name: colorMatchMode
          in: query
          schema:
            type: string
            enum: [all, any, exact]
            default: any
        - name: artifact
          in: query
          schema:
            type: boolean
        - name: multicolor
          in: query
          schema:
            type: boolean
        - name: land
          in: query
          schema:
            type: boolean
        - name: basic
          in: query
          description: Requires Basic in the type line. Intended for land searches.
          schema:
            type: boolean
        - name: legendary
          in: query
          description: Requires Legendary in the type line.
          schema:
            type: boolean
        - name: oracleTextA
          in: query
          schema:
            type: string
        - name: oracleTextB
          in: query
          schema:
            type: string
        - name: oracleTextMode
          in: query
          schema:
            type: string
            enum: [and, or]
            default: and
        - name: manaValueMin
          in: query
          schema:
            type: number
        - name: manaValueMax
          in: query
          schema:
            type: number
        - name: manaCost
          in: query
          description: Exact mana cost. Inputs such as 2GG, WUBRG, and {R/W} are normalized before matching.
          schema:
            type: string
        - name: powerMin
          in: query
          schema:
            type: number
        - name: powerMax
          in: query
          schema:
            type: number
        - name: includeVariablePower
          in: query
          schema:
            type: boolean
        - name: toughnessMin
          in: query
          schema:
            type: number
        - name: toughnessMax
          in: query
          schema:
            type: number
        - name: includeVariableToughness
          in: query
          schema:
            type: boolean
        - name: formats
          in: query
          description: Comma-separated legality formats that must be legal.
          schema:
            type: string
            example: commander,modern
        - name: tokenOnly
          in: query
          description: When true, restricts results to token cards in the local catalog.
          schema:
            type: boolean
        - name: gameplayKind
          in: query
          description: Additive gameplay helper search filter for token, emblem, or dungeon cards.
          schema:
            type: string
            enum: [token, emblem, dungeon]
        - name: lang
          in: query
          description: Preferred card language. Falls back to English, then to the original printing.
          schema:
            type: string
            enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
          description: Card search results.
          content:
            application/json:
              schema:
                type: object
                required: [data, page, limit, hasMore, total]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  page:
                    type: integer
                  limit:
                    type: integer
                  hasMore:
                    type: boolean
                    description: True when another page exists for the same filters.
                  total:
                    type: integer
                    minimum: 0
                    description: Total cards matching the same search filters after playable-card deduplication.
        '400':
          $ref: '#/components/responses/Error'
  /cards/search/options:
    get:
      tags: [Cards]
      security: []
      summary: List available advanced card search options.
      parameters:
        - name: lang
          in: query
          required: false
          schema:
            type: string
          description: Preferred language tag for display labels derived from localized card print data. Option codes remain stable English filter codes.
      responses:
        '200':
          description: Advanced search option lists derived from the local catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardSearchOptions'
  /cards/languages:
    get:
      tags: [Cards]
      summary: List available card languages and the current card-language selection.
      description: Returns card-language coverage relative to English. Common print languages are excluded from the selectable list.
      responses:
        '200':
          description: Card language coverage and current selection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardLanguagesResponse'
  /cards/resolve:
    get:
      tags: [Cards]
      security: []
      summary: Resolve a card from local Scryfall data.
      parameters:
        - name: scryfallId
          in: query
          schema:
            type: string
            format: uuid
        - name: name
          in: query
          schema:
            type: string
        - name: setCode
          in: query
          schema:
            type: string
        - name: collectorNumber
          in: query
          schema:
            type: string
        - name: flavorName
          in: query
          schema:
            type: string
        - name: lang
          in: query
          description: Preferred card language. Falls back to English, then to the original printing.
          schema:
            type: string
            enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
          description: Resolved card.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          description: Ambiguous resolution.
          content:
            application/json:
              schema:
                type: object
                required: [error, matches]
                properties:
                  error:
                    type: string
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
  /cards/{scryfallId}:
    get:
      tags: [Cards]
      security: []
      summary: Get a card by Scryfall id.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
        - name: lang
          in: query
          description: Preferred card language. Falls back to English, then to the original printing.
          schema:
            type: string
            enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
          description: Card detail.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
  /cards/{scryfallId}/printings:
    get:
      tags: [Cards]
      security: []
      summary: List available print editions for a card.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
        - name: lang
          in: query
          description: Preferred card language. Falls back to English and common print languages.
          schema:
            type: string
            enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
      responses:
        '200':
