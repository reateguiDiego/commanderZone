          type: string
        imageUris:
          type: object
          additionalProperties:
            type: string
        cardFaces:
          type: array
          items:
            $ref: '#/components/schemas/CardFace'
        typeLine:
          type: [string, 'null']
        oracleText:
          type: [string, 'null']
        layout:
          type: [string, 'null']
    GameCommand:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
          enum:
            - game.concede
            - game.close
            - chat.message
            - chat.reaction.toggled
            - dice.rolled
            - life.changed
            - commander.damage.changed
            - counter.changed
            - card.counter.changed
            - card.power_toughness.changed
            - card.moved
            - cards.moved
            - card.tapped
            - card.position.changed
            - card.dungeon_marker.changed
            - cards.position.changed
            - card.face_down.changed
            - card.face.changed
            - card.revealed
            - card.token.created
            - card.token_copy.created
            - card.controller.changed
            - turn.changed
            - battlefield.untap_all
            - zone.changed
            - zone.move_all
            - zone.random_card.selected
            - library.draw
            - library.draw_many
            - library.shuffle
            - library.move_top
            - library.reveal_top
            - library.reveal
            - library.view
            - library.play_top_revealed
            - stack.card_added
            - stack.item_removed
            - arrow.created
            - arrow.removed
            - attachment.created
            - attachment.removed
            - helper.created
            - helper.updated
            - helper.removed
        payload:
          type: object
          description: >
            Command payload. For commander.damage.changed, the actor must be the
            target player and must send targetPlayerId, sourcePlayerId, and
            commanderInstanceId; reaching 21 damage from one commander defeats
            that player. For counter.changed with a commander:<instanceId> scope
            and key=casts, the instanceId must identify one of the actor's
            commander cards.
            For counter.changed with a player:<playerId> scope, the actor must
            be that player and may send either value or delta. For
            card.counter.changed, send key plus either value, delta, or
            remove=true to delete that counter from the card. For
            card.power_toughness.changed, power/toughness/loyalty may be numbers
            or null to clear manually assigned stats. For card.moved into
            battlefield, faceDown=true places the moved card face down. For
            cards.moved into library, randomOrder=true randomizes only the moved
            cards before placing them at the requested top/bottom position.
            zone.random_card.selected logs one random card name from library,
            hand, graveyard, or exile without moving it. instanceId is optional
            in the request; when omitted, the backend resolves the selected card
            and returns the authoritative instanceId in the resulting event
            payload. library.move_top may send targetPlayerId to
            move top cards into another player's hand or battlefield, and
            position=bottom when moving top cards to the bottom of the library.
            library.view logs that the actor looked at their library order, with
            optional count for top-card views. library.reveal may send to=<playerId>
            to let another room player inspect the actor's full library; closing
            that read-only view may send library.shuffle with
            reason=revealed-library-closed to shuffle and clear the reveal.
            attachment.created manually attaches one non-land battlefield
            permanent to another permanent on the same battlefield through
            equipmentInstanceId and attachedToInstanceId; lands may be targets
            but cannot be the attachment source, and permanents with attached
            cards cannot be attachment sources. attachment.removed detaches by
            id or equipmentInstanceId.
            dice.rolled only requires kind in the request; the backend generates
            the authoritative finalResult and returns it in the resulting event
            payload. battlefield.untap_all
            untaps all tapped cards in the actor's own battlefield.
            library.play_top_revealed toggles a persistent public top-library
            reveal flag and does not move cards.
            card.token.created creates the selected token payload on the actor
            player's battlefield, or a generic 1/1 token when no card payload is
            provided. It may include quantity from 1 to 20 to create multiple
            token instances atomically in one command. cards.position.changed
            persists multiple battlefield card positions atomically with payload shape { playerId, zone:
            battlefield, positions: [{ instanceId, position }] }. helper.created
            accepts { template, ownerPlayerId?, card?, state? }; helper.updated
            accepts { entityId, state }; helper.removed accepts { entityId }.
          additionalProperties: true
        clientActionId:
          type: string
    GameEvent:
      type: object
      required: [id, type, payload, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        payload:
