          maximum: 999
        timerMode:
          type: string
          enum: [none, turn]
        timerDurationSeconds:
          type: integer
          minimum: 30
          maximum: 1800
    CreateRoomInviteRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
    Room:
      type: object
      required: [id, name, owner, status, visibility, format, maxPlayers, startingLife, timerMode, timerDurationSeconds, players, waitingLog, createdAt, updatedAt]
