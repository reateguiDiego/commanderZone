                $ref: '#/components/schemas/ValidationResult'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /rooms:
    get:
      tags: [Rooms]
      summary: List rooms visible to the authenticated user.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, all]
            default: active
      responses:
        '200':
          description: Own rooms, joined rooms, pending-invite private rooms, and public waiting rooms.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
    post:
      tags: [Rooms]
      summary: Create a room and join it as owner.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Created room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
  /rooms/{id}:
    get:
      tags: [Rooms]
      summary: Get a room by id when visible to the authenticated user.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Room detail.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /rooms/invites/incoming:
    get:
      tags: [Rooms]
      summary: List pending room invites received by the authenticated user.
      responses:
        '200':
          description: Incoming room invites.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoomInvite'
        '401':
          $ref: '#/components/responses/Error'
  /rooms/{id}/invites:
    post:
      tags: [Rooms]
      summary: Invite an accepted friend to a waiting room.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomInviteRequest'
      responses:
        '201':
          description: Room invite created.
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: '#/components/schemas/RoomInvite'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/invites/{id}/accept:
    post:
      tags: [Rooms]
      summary: Accept a pending room invite and join the room.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckSelection'
      responses:
        '200':
          description: Room invite accepted.
          content:
            application/json:
              schema:
                type: object
                required: [invite, room]
                properties:
                  invite:
                    $ref: '#/components/schemas/RoomInvite'
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/invites/{id}/decline:
    post:
      tags: [Rooms]
      summary: Decline a pending room invite.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Room invite declined.
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: '#/components/schemas/RoomInvite'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /rooms/{id}/join:
    post:
      tags: [Rooms]
      summary: Join a waiting room (public, or private when invited).
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckSelection'
      responses:
        '200':
          description: Joined room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/leave:
    post:
      tags: [Rooms]
      summary: Leave a waiting room as a current room player.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Updated room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/start:
    post:
      tags: [Rooms]
      summary: Start a room and create a game.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '201':
          description: Started game.
          content:
            application/json:
              schema:
                type: object
                required: [room, game]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
                  game:
                    $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/archive:
    post:
      tags: [Rooms]
      summary: Archive a started room and finish its game.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Archived room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /games/{id}/snapshot:
    get:
      tags: [Games]
      summary: Get current game snapshot.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Game snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [game]
                properties:
                  game:
                    $ref: '#/components/schemas/Game'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/events:
    get:
      tags: [Games]
      summary: List persisted game events for reconnection and synchronization.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
        - name: after
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Ordered game events.
          content:
            application/json:
              schema:
                type: object
                required: [data, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameEvent'
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/zones/{playerId}/{zone}:
    get:
      tags: [Games]
      summary: List a projected game zone.
      description: Hand and library are private; non-owners only receive cards explicitly revealed to them.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: zone
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/GameZoneName'
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Projected zone cards.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameZoneResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/commands:
    post:
      tags: [Games]
      summary: Apply a manual game command and publish a Mercure event.
      description: Unknown command types are rejected. Finished games only accept explicitly allowed command types.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCommand'
            examples:
              chat:
                value:
                  type: chat.message
                  payload:
                    message: Hello
              life:
                value:
                  type: life.changed
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    delta: -1
              move:
                value:
                  type: card.moved
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    fromZone: hand
                    toZone: battlefield
                    instanceId: card-instance-id
      responses:
        '201':
          description: Created game event and current snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [event, snapshot, version, applied]
                properties:
                  event:
                    $ref: '#/components/schemas/GameEvent'
                  snapshot:
                    $ref: '#/components/schemas/GameSnapshot'
                  version:
                    type: integer
                  applied:
                    type: boolean
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScryfallId:
      name: scryfallId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    RegisterRequest:
      type: object
      required: [email, displayName, password]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      required: [id, email, displayName, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
    FriendUser:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        presence:
          $ref: '#/components/schemas/FriendPresence'
    FriendPresence:
      type: string
      enum: [online, in_game, offline]
    FriendSearchResult:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        friendshipStatus:
          oneOf:
            - $ref: '#/components/schemas/FriendshipStatus'
            - type: 'null'
    FriendshipStatus:
      type: string
      enum: [pending, accepted, declined, blocked]
    Friendship:
      type: object
      required: [id, status, requester, recipient, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/FriendshipStatus'
        requester:
          $ref: '#/components/schemas/FriendUser'
        recipient:
          $ref: '#/components/schemas/FriendUser'
        friend:
          $ref: '#/components/schemas/FriendUser'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FriendRequestCreateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        userId:
          type: string
          format: uuid
    Card:
      type: object
      required: [id, scryfallId, name, colors, colorIdentity, legalities, imageUris, layout, commanderLegal]
      properties:
        id:
          type: string
          format: uuid
        scryfallId:
          type: string
          format: uuid
        name:
          type: string
        manaCost:
          type: [string, 'null']
        typeLine:
          type: [string, 'null']
        oracleText:
          type: [string, 'null']
        colors:
          type: array
          items:
            type: string
        colorIdentity:
          type: array
          items:
            type: string
        legalities:
          type: object
          additionalProperties:
            type: string
        imageUris:
          type: object
          additionalProperties:
            type: string
        layout:
          type: string
        commanderLegal:
          type: boolean
        set:
          type: [string, 'null']
        collectorNumber:
          type: [string, 'null']
        lang:
          type: [string, 'null']
        printedName:
          type: [string, 'null']
        flavorName:
          type: [string, 'null']
        allParts:
          type: array
          items:
            type: object
            additionalProperties: true
        manaValue:
          type: [number, 'null']
        producedMana:
          type: array
          items:
            type: string
            enum: [W, U, B, R, G, C]
        prices:
          type: object
          additionalProperties:
            type: [string, 'null']
    CardImageResponse:
      type: object
      required: [scryfallId, format, uri]
      properties:
        scryfallId:
          type: string
          format: uuid
        format:
          type: string
          enum: [small, normal, large, png, art_crop, border_crop]
        uri:
          type: string
          format: uri
    DeckVisibility:
      type: string
      enum: [private, public]
    DeckFolderVisibility:
      type: string
      enum: [private, public]
    DeckSummary:
      type: object
      required: [id, name, format, visibility, folderId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        format:
          type: string
          enum: [commander]
        visibility:
          $ref: '#/components/schemas/DeckVisibility'
        folderId:
          type: [string, 'null']
          format: uuid
    Deck:
      allOf:
        - $ref: '#/components/schemas/DeckSummary'
        - type: object
          properties:
            cards:
              type: array
              items:
                $ref: '#/components/schemas/DeckCard'
    DeckCard:
      type: object
      required: [id, quantity, section, card]
      properties:
        id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        section:
          type: string
          enum: [commander, main, sideboard, maybeboard]
        card:
          $ref: '#/components/schemas/Card'
    DeckSectionsResponse:
      type: object
      required: [deckId, sections, counts]
      properties:
        deckId:
          type: string
          format: uuid
        sections:
          type: object
          required: [commander, main, sideboard, maybeboard, tokens]
          properties:
            commander:
              type: array
              items:
                $ref: '#/components/schemas/DeckCard'
            main:
              type: array
              items:
                $ref: '#/components/schemas/DeckCard'
            sideboard:
              type: array
              items:
                $ref: '#/components/schemas/DeckCard'
            maybeboard:
              type: array
              items:
                $ref: '#/components/schemas/DeckCard'
            tokens:
              type: array
              items:
                $ref: '#/components/schemas/ResolvedDeckToken'
        counts:
          type: object
          required: [commander, main, sideboard, maybeboard, tokens, playableTotal]
          properties:
            commander:
              type: integer
            main:
              type: integer
            sideboard:
              type: integer
            maybeboard:
              type: integer
            tokens:
              type: integer
            playableTotal:
              type: integer
    DeckTokensResponse:
      type: object
      required: [deckId, data, unresolved]
      properties:
        deckId:
          type: string
          format: uuid
        data:
          type: array
          items:
            $ref: '#/components/schemas/ResolvedDeckToken'
        unresolved:
          type: array
          items:
            $ref: '#/components/schemas/UnresolvedDeckToken'
    DeckTokenSource:
      type: object
      required: [scryfallId, name, section]
      properties:
        scryfallId:
          type: string
          format: uuid
        name:
          type: string
        section:
          type: string
          enum: [commander, main, sideboard, maybeboard]
    ResolvedDeckToken:
      type: object
      required: [sourceCard, token, resolved]
      properties:
        sourceCard:
          $ref: '#/components/schemas/DeckTokenSource'
        token:
          $ref: '#/components/schemas/Card'
        resolved:
          type: boolean
          enum: [true]
    UnresolvedDeckToken:
      type: object
      required: [sourceCard, token, resolved]
      properties:
        sourceCard:
          $ref: '#/components/schemas/DeckTokenSource'
        token:
          type: object
          required: [scryfallId, name, uri]
          properties:
            scryfallId:
              type: string
              format: uuid
            name:
              type: string
            uri:
              type: [string, 'null']
        resolved:
          type: boolean
          enum: [false]
    ManaColor:
      type: string
      enum: [W, U, B, R, G, C]
    CardPrimaryType:
      type: string
      enum: [creature, instant, sorcery, artifact, enchantment, planeswalker, battle, land, other]
    ColorBalanceStatus:
      type: string
      enum: [underproduced, balanced, overproduced, unused]
    DeckAnalysis:
      type: object
      required: [summary, manaCurve, typeBreakdown, colorRequirement, manaProduction, colorBalance, curvePlayability, sections, options]
      properties:
        summary:
          $ref: '#/components/schemas/DeckAnalysisSummary'
        manaCurve:
          $ref: '#/components/schemas/ManaCurveAnalysis'
        typeBreakdown:
          $ref: '#/components/schemas/TypeBreakdownAnalysis'
        colorRequirement:
          $ref: '#/components/schemas/ColorRequirementAnalysis'
        manaProduction:
          $ref: '#/components/schemas/ManaProductionAnalysis'
        colorBalance:
          $ref: '#/components/schemas/ColorBalanceAnalysis'
        curvePlayability:
          $ref: '#/components/schemas/CurvePlayabilityAnalysis'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/CardSectionAnalysis'
        options:
          type: object
          additionalProperties: true
    DeckAnalysisSummary:
      type: object
      required: [totalCards, mainboardCards, commanderCards, landCount, nonLandCount, creatureCount, instantCount, sorceryCount, artifactCount, enchantmentCount, planeswalkerCount, battleCount, averageManaValueWithLands, averageManaValueWithoutLands, medianManaValueWithLands, medianManaValueWithoutLands, totalManaValue, colorIdentity]
      properties:
        totalCards:
          type: integer
        mainboardCards:
          type: integer
        commanderCards:
          type: integer
        landCount:
          type: integer
        nonLandCount:
          type: integer
        creatureCount:
          type: integer
        instantCount:
          type: integer
        sorceryCount:
          type: integer
        artifactCount:
          type: integer
        enchantmentCount:
          type: integer
        planeswalkerCount:
          type: integer
        battleCount:
          type: integer
        averageManaValueWithLands:
          type: number
        averageManaValueWithoutLands:
          type: number
        medianManaValueWithLands:
          type: number
        medianManaValueWithoutLands:
          type: number
        totalManaValue:
          type: number
        colorIdentity:
          type: array
          items:
            $ref: '#/components/schemas/ManaColor'
    ManaCurveAnalysis:
      type: object
      required: [buckets]
      properties:
        manaCurve:
          deprecated: true
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/ManaCurveBucket'
    ManaCurveBucket:
      type: object
      required: [manaValue, totalCards, permanents, spells, lands, cards]
      properties:
        manaValue:
          type: integer
          minimum: 0
          maximum: 7
        totalCards:
          type: integer
        permanents:
          type: integer
        spells:
          type: integer
        lands:
          type: integer
        cards:
          type: array
          items:
            $ref: '#/components/schemas/ManaCurveCard'
    ManaCurveCard:
      type: object
      required: [id, name, quantity, manaValue, typeLine, primaryType, isPermanent, isLand, imageUrl, priceEur]
      properties:
        id:
          type: string
        name:
          type: string
        quantity:
          type: integer
        manaValue:
          type: integer
        typeLine:
          type: string
        primaryType:
          $ref: '#/components/schemas/CardPrimaryType'
