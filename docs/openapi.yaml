openapi: 3.1.0
info:
  title: CommanderZone API
  version: 0.1.0
  description: "Backend API for a manual Magic: The Gathering Commander table."
servers:
  - url: http://127.0.0.1:8000
    description: Local Symfony API
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Cards
  - name: DeckFolders
  - name: Decks
  - name: Rooms
  - name: Games
paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Error'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and receive a JWT access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token.
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
        '401':
          $ref: '#/components/responses/Error'
  /me:
    get:
      tags: [Auth]
      summary: Get the authenticated user.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
    patch:
      tags: [Auth]
      summary: Update authenticated user's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName:
                  type: string
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /me/password:
    patch:
      tags: [Auth]
      summary: Change authenticated user's password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /cards/search:
    get:
      tags: [Cards]
      security: []
      summary: Search cards imported from Scryfall.
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
        - name: commanderLegal
          in: query
          schema:
            type: boolean
        - name: colorIdentity
          in: query
          description: Comma-separated color identity symbols.
          schema:
            type: string
            example: W,U
        - name: type
          in: query
          schema:
            type: string
            enum: [creature, instant, sorcery, artifact, enchantment, planeswalker, land]
      responses:
        '200':
          description: Card search results.
          content:
            application/json:
              schema:
                type: object
                required: [data, page, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  page:
                    type: integer
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
  /cards/resolve:
    get:
      tags: [Cards]
      security: []
      summary: Resolve a card from local Scryfall data.
      parameters:
        - name: scryfallId
          in: query
          schema:
            type: string
            format: uuid
        - name: name
          in: query
          schema:
            type: string
        - name: setCode
          in: query
          schema:
            type: string
        - name: collectorNumber
          in: query
          schema:
            type: string
        - name: flavorName
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Resolved card.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          description: Ambiguous resolution.
          content:
            application/json:
              schema:
                type: object
                required: [error, matches]
                properties:
                  error:
                    type: string
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
  /cards/{scryfallId}:
    get:
      tags: [Cards]
      security: []
      summary: Get a card by Scryfall id.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
      responses:
        '200':
          description: Card detail.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
  /cards/{scryfallId}/image:
    get:
      tags: [Cards]
      security: []
      summary: Resolve or proxy a Scryfall card image.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
        - name: format
          in: query
          schema:
            type: string
            enum: [small, normal, large, png, art_crop, border_crop]
            default: normal
        - name: mode
          in: query
          schema:
            type: string
            enum: [uri, redirect, binary]
            default: uri
      responses:
        '200':
          description: Image URI or binary image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImageResponse'
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '302':
          description: Redirect to Scryfall image URI.
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
  /deck-folders:
    get:
      tags: [DeckFolders]
      summary: List authenticated user's deck folders.
      responses:
        '200':
          description: Deck folders.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFolder'
    post:
      tags: [DeckFolders]
      summary: Create a deck folder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckFolderRequest'
      responses:
        '201':
          description: Created deck folder.
          content:
            application/json:
              schema:
                type: object
                required: [folder]
                properties:
                  folder:
                    $ref: '#/components/schemas/DeckFolder'
        '400':
          $ref: '#/components/responses/Error'
  /deck-folders/names:
    get:
      tags: [DeckFolders]
      summary: List authenticated user's deck folder names.
      responses:
        '200':
          description: Lightweight deck folder names.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFolder'
  /deck-folders/{id}:
    patch:
      tags: [DeckFolders]
      summary: Rename a deck folder.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckFolderRequest'
      responses:
        '200':
          description: Updated deck folder.
          content:
            application/json:
              schema:
                type: object
                required: [folder]
                properties:
                  folder:
                    $ref: '#/components/schemas/DeckFolder'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [DeckFolders]
      summary: Delete a deck folder and leave its decks without folder.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/Error'
  /deck-formats:
    get:
      tags: [Decks]
      summary: List supported deck creation formats.
      responses:
        '200':
          description: Supported deck formats.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFormat'
  /decklists/parse:
    post:
      tags: [Decks]
      summary: Parse and resolve a decklist without modifying a deck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecklistParseRequest'
      responses:
        '200':
          description: Parsed decklist preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecklistParseResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /decks:
    get:
      tags: [Decks]
      summary: List authenticated user's decks.
      parameters:
        - name: folderId
          in: query
          description: Use a folder UUID or the literal null for decks without folder.
          schema:
            type: string
      responses:
        '200':
          description: Deck list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckSummary'
    post:
      tags: [Decks]
      summary: Create a deck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeckRequest'
      responses:
        '201':
          description: Created deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
  /decks/{id}:
    get:
      tags: [Decks]
      summary: Get a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Deck detail.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Decks]
      summary: Update a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                folderId:
                  type: [string, 'null']
                  format: uuid
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
    delete:
      tags: [Decks]
      summary: Delete a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted.
  /decks/{id}/analysis:
    get:
      tags: [Decks]
      summary: Analyze deck composition for deckbuilding UI.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Deck analysis.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckAnalysis'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/import:
    post:
      tags: [Decks]
      summary: Replace deck cards from a text decklist.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecklistParseRequest'
      responses:
        '200':
          description: Imported deck and unresolved card names.
          content:
            application/json:
              schema:
                type: object
                required: [deck, missing, summary, missingCards]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
                  missing:
                    type: array
                    items:
                      type: string
                  summary:
                    $ref: '#/components/schemas/DeckImportSummary'
                  missingCards:
                    type: array
                    items:
                      $ref: '#/components/schemas/MissingDeckCard'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/export:
    get:
      tags: [Decks]
      summary: Export a decklist as text.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: format
          in: query
          schema:
            type: string
            enum: [plain, moxfield, archidekt]
            default: plain
      responses:
        '200':
          description: Exported decklist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckExportResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/cards:
    post:
      tags: [Decks]
      summary: Add or increment a card in a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckCardMutation'
      responses:
        '201':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/cards/{deckCardId}:
    patch:
      tags: [Decks]
      summary: Update a deck card quantity or section.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: deckCardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
                section:
                  type: string
                  enum: [main, commander]
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Decks]
      summary: Remove a card entry from a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: deckCardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/validate-commander:
    post:
      tags: [Decks]
      summary: Validate Commander constraints.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /rooms:
    get:
      tags: [Rooms]
      summary: List rooms visible to the authenticated user.
      responses:
        '200':
          description: Own rooms and public waiting rooms.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
    post:
      tags: [Rooms]
      summary: Create a room and join it as owner.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Created room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
  /rooms/{id}:
    get:
      tags: [Rooms]
      summary: Get a visible room by id.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Room detail.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /rooms/{id}/join:
    post:
      tags: [Rooms]
      summary: Join a waiting room.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckSelection'
      responses:
        '200':
          description: Joined room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/leave:
    post:
      tags: [Rooms]
      summary: Leave a waiting room.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Updated room.
          content:
            application/json:
              schema:
                type: object
                required: [room]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /rooms/{id}/start:
    post:
      tags: [Rooms]
      summary: Start a room and create a game.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '201':
          description: Started game.
          content:
            application/json:
              schema:
                type: object
                required: [room, game]
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
                  game:
                    $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /games/{id}/snapshot:
    get:
      tags: [Games]
      summary: Get current game snapshot.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Game snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [game]
                properties:
                  game:
                    $ref: '#/components/schemas/Game'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/events:
    get:
      tags: [Games]
      summary: List persisted game events for reconnection and synchronization.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
        - name: after
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Ordered game events.
          content:
            application/json:
              schema:
                type: object
                required: [data, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameEvent'
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/commands:
    post:
      tags: [Games]
      summary: Apply a manual game command and publish a Mercure event.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCommand'
            examples:
              chat:
                value:
                  type: chat.message
                  payload:
                    message: Hello
              life:
                value:
                  type: life.changed
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    delta: -1
              move:
                value:
                  type: card.moved
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    fromZone: hand
                    toZone: battlefield
                    instanceId: card-instance-id
      responses:
        '201':
          description: Created game event and current snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [event, snapshot]
                properties:
                  event:
                    $ref: '#/components/schemas/GameEvent'
                  snapshot:
                    $ref: '#/components/schemas/GameSnapshot'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScryfallId:
      name: scryfallId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    RegisterRequest:
      type: object
      required: [email, displayName, password]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      required: [id, email, displayName, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
    Card:
      type: object
      required: [id, scryfallId, name, colors, colorIdentity, legalities, imageUris, layout, commanderLegal]
      properties:
        id:
          type: string
          format: uuid
        scryfallId:
          type: string
          format: uuid
        name:
          type: string
        manaCost:
          type: [string, 'null']
        typeLine:
          type: [string, 'null']
        oracleText:
          type: [string, 'null']
        colors:
          type: array
          items:
            type: string
        colorIdentity:
          type: array
          items:
            type: string
        legalities:
          type: object
          additionalProperties:
            type: string
        imageUris:
          type: object
          additionalProperties:
            type: string
        layout:
          type: string
        commanderLegal:
          type: boolean
        set:
          type: [string, 'null']
        collectorNumber:
          type: [string, 'null']
        lang:
          type: [string, 'null']
        printedName:
          type: [string, 'null']
        flavorName:
          type: [string, 'null']
    CardImageResponse:
      type: object
      required: [scryfallId, format, uri]
      properties:
        scryfallId:
          type: string
          format: uuid
        format:
          type: string
          enum: [small, normal, large, png, art_crop, border_crop]
        uri:
          type: string
          format: uri
    DeckSummary:
      type: object
      required: [id, name, format, folderId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        format:
          type: string
          enum: [commander]
        folderId:
          type: [string, 'null']
          format: uuid
    Deck:
      allOf:
        - $ref: '#/components/schemas/DeckSummary'
        - type: object
          properties:
            cards:
              type: array
              items:
                $ref: '#/components/schemas/DeckCard'
    DeckCard:
      type: object
      required: [id, quantity, section, card]
      properties:
        id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        section:
          type: string
          enum: [main, commander]
        card:
          $ref: '#/components/schemas/Card'
    DeckMetric:
      type: object
      required: [label, count, cards]
      properties:
        label:
          type: string
        count:
          type: integer
        cards:
          type: array
          items:
            type: string
    ManaCurveBucket:
      type: object
      required: [manaValue, count]
      properties:
        manaValue:
          type: integer
          minimum: 0
          maximum: 7
        count:
          type: integer
    LandTypeCount:
      type: object
      required: [label, symbol, count]
      properties:
        label:
          type: string
        symbol:
          type: string
          enum: [W, U, B, R, G]
        count:
          type: integer
    DeckAnalysis:
      type: object
      required:
        - totalCards
        - landCount
        - nonlandCount
        - colorPips
        - landTypes
        - manaCurve
        - creatures
        - artifacts
        - enchantments
        - instants
        - sorceries
        - planeswalkers
        - ramp
        - draw
        - removal
        - wipes
      properties:
        totalCards:
          type: integer
        landCount:
          type: integer
        nonlandCount:
          type: integer
        colorPips:
          type: object
          additionalProperties:
            type: integer
        landTypes:
          type: array
          items:
            $ref: '#/components/schemas/LandTypeCount'
        manaCurve:
          type: array
          items:
            $ref: '#/components/schemas/ManaCurveBucket'
        creatures:
          $ref: '#/components/schemas/DeckMetric'
        artifacts:
          $ref: '#/components/schemas/DeckMetric'
        enchantments:
          $ref: '#/components/schemas/DeckMetric'
        instants:
          $ref: '#/components/schemas/DeckMetric'
        sorceries:
          $ref: '#/components/schemas/DeckMetric'
        planeswalkers:
          $ref: '#/components/schemas/DeckMetric'
        ramp:
          $ref: '#/components/schemas/DeckMetric'
        draw:
          $ref: '#/components/schemas/DeckMetric'
        removal:
          $ref: '#/components/schemas/DeckMetric'
        wipes:
          $ref: '#/components/schemas/DeckMetric'
    CommanderValidationIssue:
      type: object
      required: [severity, title, detail, cards]
      properties:
        severity:
          type: string
          enum: [error, warning]
        title:
          type: string
        detail:
          type: string
        cards:
          type: array
          items:
            type: string
    ValidationResult:
      type: object
      required: [valid, errors, issues]
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/CommanderValidationIssue'
    DeckFolder:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    DeckFolderRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    DeckFormat:
      type: object
      required: [id, name, minCards, maxCards, hasCommander]
      properties:
        id:
          type: string
          enum: [commander]
        name:
          type: string
        minCards:
          type: integer
        maxCards:
          type: integer
        hasCommander:
          type: boolean
    DecklistFormat:
      type: string
      enum: [plain, moxfield, archidekt]
      default: plain
    DecklistParseRequest:
      type: object
      required: [decklist]
      properties:
        decklist:
          type: string
        format:
          $ref: '#/components/schemas/DecklistFormat'
    DecklistEntry:
      type: object
      required: [line, quantity, name, section, setCode, collectorNumber, rawLine, resolved, card]
      properties:
        line:
          type: integer
        quantity:
          type: integer
          minimum: 1
        name:
          type: string
        section:
          type: string
          enum: [main, commander]
        setCode:
          type: [string, 'null']
        collectorNumber:
          type: [string, 'null']
        rawLine:
          type: string
        resolved:
          type: boolean
        card:
          anyOf:
            - $ref: '#/components/schemas/Card'
            - type: 'null'
    DeckImportSummary:
      type: object
      required: [format, parsedCards, totalCards, resolvedCards, importedCards, missingCards, commanderCount, mainCount]
      properties:
        format:
          $ref: '#/components/schemas/DecklistFormat'
        parsedCards:
          type: integer
        totalCards:
          type: integer
        resolvedCards:
          type: integer
        importedCards:
          type: integer
        missingCards:
          type: integer
        commanderCount:
          type: integer
        mainCount:
          type: integer
    MissingDeckCard:
      type: object
      required: [name, quantity, section, setCode, collectorNumber, line, rawLine, reason]
      properties:
        name:
          type: string
        quantity:
          type: integer
        section:
          type: string
          enum: [main, commander]
        setCode:
          type: [string, 'null']
        collectorNumber:
          type: [string, 'null']
        line:
          type: integer
        rawLine:
          type: string
        reason:
          type: string
          enum: [not_found]
    DecklistParseResult:
      type: object
      required: [format, entries, summary, missingCards, warnings]
      properties:
        format:
          $ref: '#/components/schemas/DecklistFormat'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DecklistEntry'
        summary:
          $ref: '#/components/schemas/DeckImportSummary'
        missingCards:
          type: array
          items:
            $ref: '#/components/schemas/MissingDeckCard'
        warnings:
          type: array
          items:
            type: string
    DeckExportResponse:
      type: object
      required: [format, filename, content]
      properties:
        format:
          $ref: '#/components/schemas/DecklistFormat'
        filename:
          type: string
        content:
          type: string
    CreateDeckRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        folderId:
          type: [string, 'null']
          format: uuid
    DeckCardMutation:
      type: object
      required: [scryfallId]
      properties:
        scryfallId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          default: 1
        section:
          type: string
          enum: [main, commander]
          default: main
    DeckSelection:
      type: object
      properties:
        deckId:
          type: string
          format: uuid
    CreateRoomRequest:
      allOf:
        - $ref: '#/components/schemas/DeckSelection'
        - type: object
          properties:
            visibility:
              type: string
              enum: [private, public]
              default: private
    Room:
      type: object
      required: [id, owner, status, visibility, players]
      properties:
        id:
          type: string
          format: uuid
        owner:
          $ref: '#/components/schemas/User'
        status:
          type: string
          enum: [waiting, started]
        visibility:
          type: string
          enum: [private, public]
        players:
          type: array
          items:
            $ref: '#/components/schemas/RoomPlayer'
        gameId:
          type: [string, 'null']
          format: uuid
    RoomPlayer:
      type: object
      required: [id, user]
      properties:
        id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
        deckId:
          type: [string, 'null']
          format: uuid
    Game:
      type: object
      required: [id, status, snapshot]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active]
        snapshot:
          $ref: '#/components/schemas/GameSnapshot'
    GameSnapshot:
      type: object
      required: [players, turn, chat, createdAt]
      properties:
        players:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GamePlayer'
        turn:
          $ref: '#/components/schemas/TurnState'
        chat:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        createdAt:
          type: string
          format: date-time
        counters:
          type: object
    GamePlayer:
      type: object
      required: [user, life, zones, commanderDamage, counters]
      properties:
        user:
          $ref: '#/components/schemas/User'
        life:
          type: integer
        zones:
          type: object
          required: [library, hand, battlefield, graveyard, exile, command]
          properties:
            library:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            hand:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            battlefield:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            graveyard:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            exile:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            command:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
        commanderDamage:
          type: object
          additionalProperties:
            type: integer
        counters:
          type: object
    GameCard:
      type: object
      required: [instanceId, scryfallId, name, tapped]
      properties:
        instanceId:
          type: string
        scryfallId:
          type: string
          format: uuid
        name:
          type: string
        tapped:
          type: boolean
    TurnState:
      type: object
      required: [activePlayerId, phase, number]
      properties:
        activePlayerId:
          type: [string, 'null']
          format: uuid
        phase:
          type: string
        number:
          type: integer
    ChatMessage:
      type: object
      required: [userId, displayName, message, createdAt]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
    GameCommand:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
          enum:
            - chat.message
            - life.changed
            - commander.damage.changed
            - counter.changed
            - card.moved
            - card.tapped
            - turn.changed
            - zone.changed
        payload:
          type: object
          additionalProperties: true
    GameEvent:
      type: object
      required: [id, type, payload, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdBy:
          type: [string, 'null']
          format: uuid
        createdAt:
          type: string
          format: date-time
