        type:
          type: string
        message:
          type: string
        actorId:
          type: [string, 'null']
          format: uuid
        displayName:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    GameRematch:
      type: object
      required: [votes]
      properties:
        votes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GameRematchVote'
    GameRematchVote:
