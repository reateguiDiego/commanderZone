          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/events:
    get:
      tags: [Games]
      summary: List persisted game events for reconnection and synchronization.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
        - name: after
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Ordered game events.
          content:
            application/json:
              schema:
                type: object
                required: [data, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameEvent'
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/rematch-vote:
    post:
      tags: [Games]
      summary: Vote to leave or replay after defeat/game end.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RematchVoteRequest'
      responses:
        '200':
          description: Current rematch vote status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RematchVoteResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/disconnect-vote:
    post:
      tags: [Games]
      summary: Vote how to handle a disconnected player (wait or expel).
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisconnectVoteRequest'
      responses:
        '201':
          description: Disconnect vote stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisconnectVoteResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/zones/{playerId}/{zone}:
    get:
      tags: [Games]
      summary: List a projected game zone.
      description: Hand and library are private; non-owners only receive cards explicitly revealed to them.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: zone
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/GameZoneName'
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Projected zone cards.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameZoneResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /games/{id}/commands:
    post:
      tags: [Games]
      summary: Apply a manual game command and publish a Mercure event.
      description: Unknown command types are rejected. Finished games only accept explicitly allowed command types.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameCommand'
            examples:
              chat:
                value:
                  type: chat.message
                  payload:
                    message: Hello
              privateChat:
                value:
                  type: chat.message
                  payload:
                    message: Hello
                    targetPlayerId: 01966d5f-0000-7000-8000-000000000001
              chatReaction:
                value:
                  type: chat.reaction.toggled
                  payload:
                    messageId: 01966d5f-0000-7000-8000-000000000010
                    reaction: like
              life:
                value:
                  type: life.changed
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    delta: -1
              move:
                value:
                  type: card.moved
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    fromZone: hand
                    toZone: battlefield
                    instanceId: card-instance-id
              playFaceDown:
                value:
                  type: card.moved
                  payload:
                    playerId: 01966d5f-0000-7000-8000-000000000000
                    fromZone: hand
                    toZone: battlefield
                    instanceId: card-instance-id
                    faceDown: true
      responses:
        '201':
          description: Created game event and current snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [event, snapshot, version, applied]
                properties:
                  event:
                    $ref: '#/components/schemas/GameEvent'
                  snapshot:
                    $ref: '#/components/schemas/GameSnapshot'
                  version:
                    type: integer
                  applied:
                    type: boolean
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: commanderzone.refresh
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScryfallId:
      name: scryfallId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    GameWebsocketTicketResponse:
      type: object
      required: [ticket, expiresAt, websocketUrl]
      properties:
        ticket:
          type: string
          description: Signed short-lived ticket scoped to one game and user.
        expiresAt:
          type: string
          format: date-time
        websocketUrl:
          type: string
          format: uri
          example: ws://127.0.0.1:8081/games/01966d5f-0000-7000-8000-000000000000?ticket=...
    GameDebugHealthResponse:
      type: object
      required: [gameId, enabled, context, health, generatedAt, updatedAt]
      properties:
        gameId:
          type: string
          format: uuid
        enabled:
          type: boolean
          description: Whether live debug instrumentation is enabled for gameplay websocket traffic.
        context:
          type: object
          required: [players]
          properties:
            players:
              type: array
              description: Player-facing context allowed in friend games. This does not include card names or zone contents.
              items:
                type: object
                required: [playerId, displayName, deckName, status]
                properties:
                  playerId:
                    type: string
                    format: uuid
                  displayName:
                    type: string
                  deckName:
                    type: string
                    nullable: true
                  status:
                    type: string
        health:
          $ref: '#/components/schemas/GameDebugHealth'
        generatedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GameDebugHealth:
      type: object
      required: [websocket, traffic, actions, pipeline, performance, replay, sync, errors, recent, events]
      properties:
        websocket:
          type: object
          required: [connections]
          properties:
            connections:
              type: object
              required: [total, byUser, transitions, disconnectRanking]
              properties:
                total:
                  type: integer
                byUser:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      displayName:
                        type: string
                      status:
                        type: string
                      connections:
                        type: integer
                      disconnects:
                        type: integer
                      lastConnectedAt:
                        type: string
                        nullable: true
                      lastDisconnectedAt:
                        type: string
                        nullable: true
                      offlineSince:
                        type: string
                        nullable: true
                transitions:
                  type: object
                  required: [online, offline]
                  properties:
                    online:
                      type: integer
                    offline:
                      type: integer
                disconnectRanking:
                  type: array
                  items:
                    type: object
                    required: [userId, displayName, disconnects, status, lastDisconnectedAt]
                    properties:
                      userId:
                        type: string
                      displayName:
                        type: string
                      disconnects:
                        type: integer
                      status:
                        type: string
                      lastDisconnectedAt:
                        type: string
                        nullable: true
            lastSeen:
              type: object
              nullable: true
              additionalProperties: true
        traffic:
          type: object
          required: [incoming, outgoing, keepalive]
          properties:
            incoming:
              $ref: '#/components/schemas/GameDebugTrafficBucket'
            outgoing:
              $ref: '#/components/schemas/GameDebugTrafficBucket'
            keepalive:
              type: object
              required: [incoming, outgoing]
              properties:
                incoming:
                  $ref: '#/components/schemas/GameDebugTrafficBucket'
                outgoing:
                  $ref: '#/components/schemas/GameDebugTrafficBucket'
        actions:
          type: object
          required: [total, byType, recent]
          properties:
            total:
              type: integer
            byType:
              type: object
              additionalProperties:
                type: integer
            recent:
              type: array
              description: Recent sanitized action exchanges with inbound/outbound counts, character sizes, operation types, and duration.
              items:
                type: object
                additionalProperties: true
        pipeline:
          type: object
          required: [gamePatch, commandAck, resyncRequired, error, pong, presenceChanged]
          properties:
            gamePatch:
              type: integer
            commandAck:
              type: object
              required: [rejected, duplicate, resync_required]
              properties:
                rejected:
                  type: integer
                duplicate:
                  type: integer
                resync_required:
                  type: integer
            resyncRequired:
              type: integer
            error:
              type: integer
            pong:
              type: integer
            presenceChanged:
              type: integer
        performance:
          type: object
          required: [commands]
          properties:
            commands:
              type: object
              required: [count, totalMs, avgMs, maxMs]
              properties:
                count:
                  type: integer
                totalMs:
                  type: number
                avgMs:
                  type: number
                maxMs:
                  type: number
        replay:
          type: object
          required: [attempts, hits, misses, gaps, lastWindow]
          properties:
            attempts:
              type: integer
            hits:
              type: integer
            misses:
              type: integer
            gaps:
              type: integer
            lastWindow:
              type: object
              nullable: true
              additionalProperties: true
        sync:
          type: object
          required: [lastGamePatch, lastVersionGap, lastConflict, lastError]
          properties:
            lastGamePatch:
              type: object
              nullable: true
              additionalProperties: true
            lastVersionGap:
              type: object
              nullable: true
              additionalProperties: true
            lastConflict:
              type: object
              nullable: true
              additionalProperties: true
              properties:
                status:
                  type: string
                version:
                  type: integer
                clientActionId:
                  type: string
                  nullable: true
                code:
                  type: string
                  nullable: true
                message:
                  type: string
                at:
                  type: string
                conflict:
                  $ref: '#/components/schemas/GameWebsocketVersionConflict'
            lastError:
              type: object
              nullable: true
              additionalProperties: true
        errors:
          type: object
          required: [total, byCode, recent]
          properties:
            total:
              type: integer
            byCode:
              type: object
              additionalProperties:
                type: integer
            recent:
              type: array
              description: Recent exact WebSocket/debug errors. Messages are included for diagnostics but card payloads are not stored.
              items:
                type: object
                additionalProperties: true
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  at:
                    type: string
                  conflict:
                    $ref: '#/components/schemas/GameWebsocketVersionConflict'
        recent:
          type: array
          items:
            type: object
            additionalProperties: true
        events:
          type: array
          items:
            type: object
            additionalProperties: true
    GameDebugTrafficBucket:
      type: object
      required: [messages, characters, byKind, byAction, byChannel]
      properties:
        messages:
          type: integer
        characters:
          type: integer
          description: Total JSON payload characters observed in this direction.
        byKind:
          type: object
          additionalProperties:
            type: integer
        byAction:
          type: object
          additionalProperties:
            type: integer
        byChannel:
          type: object
          additionalProperties:
            type: integer
    GameWebsocketVersionConflict:
      type: object
      required: [commandBaseVersion, currentVersion, delta, classification]
      properties:
        commandBaseVersion:
          type: integer
        currentVersion:
          type: integer
        delta:
          type: integer
        classification:
          type: string
          enum: [concurrent_write, stale_client]
    RoomStartError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            invalidDecks:
              type: array
              items:
                $ref: '#/components/schemas/RoomStartInvalidDeck'
    RoomStartInvalidDeck:
      type: object
      required: [playerId, displayName, deckId]
      properties:
        playerId:
          type: string
          format: uuid
        displayName:
          type: string
        deckId:
          type: string
          format: uuid
        validation:
          $ref: '#/components/schemas/ValidationResult'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/CommanderValidationEntry'
    RegisterRequest:
      type: object
      required: [email, displayName, password]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 4
          maxLength: 25
        password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$'
          description: Must include at least one lowercase letter, one uppercase letter, and one number.
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Short-lived access token intended for Authorization Bearer usage.
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetRequestAcceptedResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean
    PasswordResetConfirmRequest:
      type: object
      required: [email, token, newPassword]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$'
          description: Must include at least one lowercase letter, one uppercase letter, and one number.
    PasswordResetConfirmResponse:
      type: object
      required: [updated, token, user]
      properties:
        updated:
          type: boolean
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    EmailVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    EmailVerificationConfirmRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    EmailVerificationConfirmResponse:
      type: object
      required: [verified, user, token]
      properties:
        verified:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
    AvatarUpdateRequest:
      oneOf:
        - type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [initial]
            letter:
              type: string
              minLength: 1
              maxLength: 2
              description: Initial avatar letters. Defaults to the display-name initial.
            backgroundColor:
              type: string
              pattern: '^#[0-9a-fA-F]{6}$'
              description: Initial avatar background color.
            textColor:
              type: string
              pattern: '^#[0-9a-fA-F]{6}$'
              description: Initial avatar text color.
        - type: object
          required: [type, imageUrl]
          properties:
            type:
              type: string
              enum: [preset]
            imageUrl:
              type: string
              enum:
                - assets/images/avatars/arcane-duelist.png
                - assets/images/avatars/storm-seer.png
                - assets/images/avatars/verdant-warden.png
                - assets/images/avatars/rune-knight.png
                - assets/images/avatars/ember-marshal.png
                - assets/images/avatars/moonlit-necromancer.png
                - assets/images/avatars/black-clad-mage.png
                - assets/images/avatars/friendly-robot.png
                - assets/images/avatars/ironroot-boar.png
                - assets/images/avatars/elderwood-ent.png
                - assets/images/avatars/shadow-necromancer.png
                - assets/images/avatars/serpent-assassin.png
                - assets/images/avatars/wandering-blade.png
                - assets/images/avatars/abyssal-overlord.png
                - assets/images/avatars/radiant-paladin.png
                - assets/images/avatars/porcelain-priestess.png
                - assets/images/avatars/chaos-court-mage.png
                - assets/images/avatars/rootbound-dryad.png
                - assets/images/avatars/leonine-champion.png
                - assets/images/avatars/spectral-dragon-sage.png
                - assets/images/avatars/emerald-prophet.png
                - assets/images/avatars/temporal-scholar.png
                - assets/images/avatars/mind-illusionist.png
                - assets/images/avatars/dragonblood-shaman.png
                - assets/images/avatars/wild-beastmaster.png
                - assets/images/avatars/tidecaller-oracle.png
                - assets/images/avatars/nightblade-agent.png
                - assets/images/avatars/elder-dragon-tyrant.png
                - assets/images/avatars/moonlit-vampire.png
                - assets/images/avatars/crimson-patriarch.png
                - assets/images/avatars/golden-lawkeeper.png
                - assets/images/avatars/sky-law-artificer.png
                - assets/images/avatars/sunlit-archon.png
                - assets/images/avatars/living-metal-sage.png
                - assets/images/avatars/volcanic-forger.png
                - assets/images/avatars/nightmare-oracle.png
                - assets/images/avatars/hawk-wildwarden.png
                - assets/images/avatars/infernal-noble.png
                - assets/images/avatars/moonstone-seer.png
                - assets/images/avatars/obsidian-geomancer.png
        - type: object
          required: [type, imageData]
          properties:
            type:
              type: string
              enum: [upload]
            imageData:
              type: string
              description: Cropped data URL. PNG, JPG or WEBP, max decoded payload 2MB.
    DisplayNameStyleUpdateRequest:
      type: object
      required: [presetId]
      properties:
        presetId:
          type: string
          enum:
            - plain
            - basic-colorless
            - basic-silver
            - basic-green
            - basic-blue
            - basic-black
            - basic-plains
            - basic-mountain
            - copper-adventurer
            - emerald-warden
            - arcane-apprentice
            - crimson-vanguard
            - moonstone-initiate
            - obsidian-crown
            - astral-veil
            - ember-forge
            - jade-serpent
            - frost-runeblade
            - sanguine-royal
            - storm-vault
            - solar-edict
            - void-amethyst
            - iron-warden
            - oceanic-oracle
            - gilded-thorn
            - lunar-sentinel
            - crimson-engine
            - arcane-prism
            - necrosteel-relic
            - sapphire-comet
            - radiant-halo
            - umbral-rose
            - chronomancer
        textColor:
          type: [string, 'null']
          pattern: '^#[0-9a-fA-F]{6}$'
    UserAvatar:
      type: object
      required: [type, imageUrl]
      properties:
        type:
          type: string
          enum: [initial, preset, upload]
        imageUrl:
          type: [string, 'null']
          description: Preset asset URL, uploaded avatar image URL, or null when using the display-name initial.
        initial:
          type: [object, 'null']
          description: Present when the user is using the configurable initial avatar.
          required: [letter, backgroundColor, textColor]
          properties:
            letter:
              type: string
              maxLength: 2
            backgroundColor:
              type: string
              pattern: '^#[0-9a-fA-F]{6}$'
            textColor:
              type: string
              pattern: '^#[0-9a-fA-F]{6}$'
    UserDisplayNameStyle:
      type: object
      required: [type, presetId]
      properties:
        type:
          type: string
          enum: [plain, preset]
        presetId:
          type: string
        textColor:
          type: [string, 'null']
          pattern: '^#[0-9a-fA-F]{6}$'
    User:
      type: object
      required: [id, email, emailVerified, pendingEmail, displayName, displayNameStyle, preferences, roles, avatar, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        emailVerified:
          type: boolean
        pendingEmail:
          type: [string, 'null']
          format: email
        displayName:
          type: string
          maxLength: 25
        displayNameStyle:
          $ref: '#/components/schemas/UserDisplayNameStyle'
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        roles:
          type: array
          items:
            type: string
        avatar:
          $ref: '#/components/schemas/UserAvatar'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserPreferences:
      type: object
      required: [cardLanguage, appLanguage]
      properties:
        cardLanguage:
          type: string
          enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
        appLanguage:
          type: string
          enum: [en, fr, de, it, es, ja, zhs, pt, ru, ko, zht, nl, ca]
    FriendUser:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        displayNameStyle:
          $ref: '#/components/schemas/UserDisplayNameStyle'
        avatar:
          $ref: '#/components/schemas/UserAvatar'
        presence:
          $ref: '#/components/schemas/FriendPresence'
    FriendPresence:
      type: string
      enum: [online, in_game, offline]
    FriendSearchResult:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        displayNameStyle:
          $ref: '#/components/schemas/UserDisplayNameStyle'
        friendshipStatus:
          oneOf:
            - $ref: '#/components/schemas/FriendshipStatus'
            - type: 'null'
    FriendshipStatus:
      type: string
      enum: [pending, accepted, declined, blocked]
    Friendship:
      type: object
      required: [id, status, requester, recipient, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/FriendshipStatus'
        requester:
          $ref: '#/components/schemas/FriendUser'
        recipient:
          $ref: '#/components/schemas/FriendUser'
        friend:
          $ref: '#/components/schemas/FriendUser'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FriendRequestCreateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        userId:
          type: string
          format: uuid
    CardFace:
      type: object
