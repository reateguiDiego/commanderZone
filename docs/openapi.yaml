openapi: 3.1.0
info:
  title: CommanderZone API
  version: 0.1.0
  description: "Backend API for a manual Magic: The Gathering Commander table."
servers:
  - url: http://127.0.0.1:8000
    description: Local Symfony API
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Friends
  - name: Cards
  - name: DeckFolders
  - name: Decks
  - name: Rooms
  - name: Games
paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Error'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and receive a JWT access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token.
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
        '401':
          $ref: '#/components/responses/Error'
  /me:
    get:
      tags: [Auth]
      summary: Get the authenticated user.
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
    patch:
      tags: [Auth]
      summary: Update authenticated user's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName:
                  type: string
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /me/password:
    patch:
      tags: [Auth]
      summary: Change authenticated user's password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /me/offline:
    post:
      tags: [Auth]
      summary: Mark the authenticated user as offline.
      responses:
        '204':
          description: User marked offline.
        '401':
          $ref: '#/components/responses/Error'
  /friends:
    get:
      tags: [Friends]
      summary: List accepted friendships for the authenticated user.
      responses:
        '200':
          description: Accepted friendships.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/search:
    get:
      tags: [Friends]
      summary: Search users by email or display name.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: Matching users with current friendship status.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FriendSearchResult'
        '401':
          $ref: '#/components/responses/Error'
  /friends/{userId}:
    delete:
      tags: [Friends]
      summary: Remove an accepted friendship with a user.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Friendship removed.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests:
    post:
      tags: [Friends]
      summary: Send a friend request by exact email or user id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestCreateRequest'
      responses:
        '201':
          description: Friend request created.
          content:
            application/json:
              schema:
                type: object
                required: [friendship]
                properties:
                  friendship:
                    $ref: '#/components/schemas/Friendship'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /friends/requests/incoming:
    get:
      tags: [Friends]
      summary: List pending friend requests received by the authenticated user.
      responses:
        '200':
          description: Incoming friend requests.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/requests/outgoing:
    get:
      tags: [Friends]
      summary: List pending friend requests sent by the authenticated user.
      responses:
        '200':
          description: Outgoing friend requests.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}:
    delete:
      tags: [Friends]
      summary: Cancel a pending outgoing friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Friend request cancelled.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}/accept:
    post:
      tags: [Friends]
      summary: Accept a pending incoming friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Friend request accepted.
          content:
            application/json:
              schema:
                type: object
                required: [friendship]
                properties:
                  friendship:
                    $ref: '#/components/schemas/Friendship'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /friends/requests/{id}/decline:
    post:
      tags: [Friends]
      summary: Decline a pending incoming friend request.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Friend request declined.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /cards/search:
    get:
      tags: [Cards]
      security: []
      summary: Search cards imported from Scryfall.
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
        - name: commanderLegal
          in: query
          schema:
            type: boolean
        - name: colorIdentity
          in: query
          description: Comma-separated color identity symbols.
          schema:
            type: string
            example: W,U
        - name: type
          in: query
          schema:
            type: string
            enum: [creature, instant, sorcery, artifact, enchantment, planeswalker, land]
      responses:
        '200':
          description: Card search results.
          content:
            application/json:
              schema:
                type: object
                required: [data, page, limit]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  page:
                    type: integer
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'
  /cards/resolve:
    get:
      tags: [Cards]
      security: []
      summary: Resolve a card from local Scryfall data.
      parameters:
        - name: scryfallId
          in: query
          schema:
            type: string
            format: uuid
        - name: name
          in: query
          schema:
            type: string
        - name: setCode
          in: query
          schema:
            type: string
        - name: collectorNumber
          in: query
          schema:
            type: string
        - name: flavorName
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Resolved card.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          description: Ambiguous resolution.
          content:
            application/json:
              schema:
                type: object
                required: [error, matches]
                properties:
                  error:
                    type: string
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
  /cards/{scryfallId}:
    get:
      tags: [Cards]
      security: []
      summary: Get a card by Scryfall id.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
      responses:
        '200':
          description: Card detail.
          content:
            application/json:
              schema:
                type: object
                required: [card]
                properties:
                  card:
                    $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/Error'
  /cards/{scryfallId}/image:
    get:
      tags: [Cards]
      security: []
      summary: Resolve or proxy a Scryfall card image.
      parameters:
        - $ref: '#/components/parameters/ScryfallId'
        - name: format
          in: query
          schema:
            type: string
            enum: [small, normal, large, png, art_crop, border_crop]
            default: normal
        - name: mode
          in: query
          schema:
            type: string
            enum: [uri, redirect, binary]
            default: uri
      responses:
        '200':
          description: Image URI or binary image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImageResponse'
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '302':
          description: Redirect to Scryfall image URI.
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
  /deck-folders:
    get:
      tags: [DeckFolders]
      summary: List authenticated user's deck folders.
      responses:
        '200':
          description: Deck folders.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFolder'
    post:
      tags: [DeckFolders]
      summary: Create a deck folder.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckFolderRequest'
      responses:
        '201':
          description: Created deck folder.
          content:
            application/json:
              schema:
                type: object
                required: [folder]
                properties:
                  folder:
                    $ref: '#/components/schemas/DeckFolder'
        '400':
          $ref: '#/components/responses/Error'
  /deck-folders/names:
    get:
      tags: [DeckFolders]
      summary: List authenticated user's deck folder names.
      responses:
        '200':
          description: Lightweight deck folder names.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFolder'
  /deck-folders/{id}:
    patch:
      tags: [DeckFolders]
      summary: Rename a deck folder.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckFolderRequest'
      responses:
        '200':
          description: Updated deck folder.
          content:
            application/json:
              schema:
                type: object
                required: [folder]
                properties:
                  folder:
                    $ref: '#/components/schemas/DeckFolder'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [DeckFolders]
      summary: Delete a deck folder and leave its decks without folder.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/Error'
  /deck-formats:
    get:
      tags: [Decks]
      summary: List supported deck creation formats.
      responses:
        '200':
          description: Supported deck formats.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckFormat'
  /decklists/parse:
    post:
      tags: [Decks]
      summary: Parse and resolve a decklist without modifying a deck.
      description: If format is omitted, the backend auto-detects plain, Moxfield, or Archidekt text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecklistParseRequest'
      responses:
        '200':
          description: Parsed decklist preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecklistParseResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /decks:
    get:
      tags: [Decks]
      summary: List authenticated user's decks.
      parameters:
        - name: folderId
          in: query
          description: Use a folder UUID or the literal null for decks without folder.
          schema:
            type: string
      responses:
        '200':
          description: Deck list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeckSummary'
    post:
      tags: [Decks]
      summary: Create a deck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeckRequest'
      responses:
        '201':
          description: Created deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
  /decks/quick-build:
    post:
      tags: [Decks]
      summary: Create a deck and add initial cards in one request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckQuickBuildRequest'
      responses:
        '201':
          description: Created deck with unresolved card details.
          content:
            application/json:
              schema:
                type: object
                required: [deck, missing, missingCards]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
                  missing:
                    type: array
                    items:
                      type: string
                  missingCards:
                    type: array
                    items:
                      $ref: '#/components/schemas/MissingDeckCard'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}:
    get:
      tags: [Decks]
      summary: Get a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Deck detail.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Decks]
      summary: Update a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                folderId:
                  type: [string, 'null']
                  format: uuid
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
    delete:
      tags: [Decks]
      summary: Delete a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted.
  /decks/{id}/analysis:
    get:
      tags: [Decks]
      summary: Analyze deck composition for deckbuilding UI.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: includeCommanderInAnalysis
          in: query
          schema:
            type: boolean
            default: true
        - name: includeSideboard
          in: query
          schema:
            type: boolean
            default: false
        - name: includeMaybeboard
          in: query
          schema:
            type: boolean
            default: false
        - name: curvePlayabilityMode
          in: query
          schema:
            type: string
            enum: [play, draw]
            default: play
        - name: manaSourcesMode
          in: query
          schema:
            type: string
            enum: [landsOnly, landsAndRamp]
            default: landsOnly
      responses:
        '200':
          description: Deck analysis.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckAnalysis'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/sections:
    get:
      tags: [Decks]
      summary: Return deck cards grouped by deckbuilder section.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Grouped deck sections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckSectionsResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/tokens:
    get:
      tags: [Decks]
      summary: Return token cards derived from Scryfall all_parts on cards in the deck.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Derived deck tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckTokensResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/import:
    post:
      tags: [Decks]
      summary: Replace deck cards from a text decklist.
      description: If format is omitted, the backend auto-detects plain, Moxfield, or Archidekt text.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecklistParseRequest'
      responses:
        '200':
          description: Imported deck and unresolved card names.
          content:
            application/json:
              schema:
                type: object
                required: [format, deck, missing, summary, missingCards]
                properties:
                  format:
                    $ref: '#/components/schemas/DecklistFormat'
                  deck:
                    $ref: '#/components/schemas/Deck'
                  missing:
                    type: array
                    items:
                      type: string
                  summary:
                    $ref: '#/components/schemas/DeckImportSummary'
                  missingCards:
                    type: array
                    items:
                      $ref: '#/components/schemas/MissingDeckCard'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/export:
    get:
      tags: [Decks]
      summary: Export a decklist as text.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: format
          in: query
          schema:
            type: string
            enum: [plain, moxfield, archidekt]
            default: plain
      responses:
        '200':
          description: Exported decklist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckExportResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/commanders:
    put:
      tags: [Decks]
      summary: Replace the deck command zone with one or two cards.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommanderReplacementRequest'
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /decks/{id}/cards:
    post:
      tags: [Decks]
      summary: Add or increment a card in a deck by Scryfall id, name, or print.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckCardMutation'
      responses:
        '201':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Decks]
      summary: Update multiple deck card entries.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckCardsBatchRequest'
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/cards/{deckCardId}:
    patch:
      tags: [Decks]
      summary: Update a deck card quantity or section.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: deckCardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
                section:
                  type: string
                  enum: [commander, main, sideboard, maybeboard]
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Decks]
      summary: Remove a card entry from a deck.
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: deckCardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated deck.
          content:
            application/json:
              schema:
                type: object
                required: [deck]
                properties:
                  deck:
                    $ref: '#/components/schemas/Deck'
        '404':
          $ref: '#/components/responses/Error'
  /decks/{id}/validate-commander:
    post:
      tags: [Decks]
      summary: Validate Commander constraints.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
