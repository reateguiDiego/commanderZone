            - type: 'null'
          description: Current battle defense. Can be a printed non-numeric value.
        defaultPower:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
          description: Printed/default power used to reset battlefield stat changes.
        defaultToughness:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
          description: Printed/default toughness used to reset battlefield stat changes.
        defaultLoyalty:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
