        zones:
          type: object
          required: [library, hand, battlefield, graveyard, exile, command]
          properties:
            library:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            hand:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            battlefield:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            graveyard:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            exile:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
            command:
              type: array
              items:
                $ref: '#/components/schemas/GameCard'
        commanderDamage:
          type: object
          additionalProperties:
            type: integer
        counters:
          type: object
        zoneCounts:
          type: object
          additionalProperties:
            type: integer
    GameCard:
      type: object
      description: >
        Gameplay projection payload. Localized text metadata (`lang`, `printedName`)
        is intentionally omitted; per-viewer localization only swaps imageUris and
        cardFaces imageUris while preserving gameplay identity/state fields.
      required: [instanceId, name, tapped]
      properties:
        instanceId:
          type: string
        ownerId:
          type: [string, 'null']
          format: uuid
          description: Immutable player id of the deck this card instance belongs to.
        controllerId:
          type: [string, 'null']
          format: uuid
          description: Player id currently controlling the card while it is on the battlefield.
        scryfallId:
          type: [string, 'null']
          format: uuid
        name:
          type: string
        imageUris:
          type: object
          additionalProperties:
            type: string
        cardFaces:
          type: array
          items:
            $ref: '#/components/schemas/CardFace'
        typeLine:
          type: [string, 'null']
        manaCost:
          type: [string, 'null']
        colorIdentity:
          type: array
          items:
            type: string
            enum: [W, U, B, R, G]
        power:
          type: [integer, 'null']
        toughness:
          type: [integer, 'null']
        loyalty:
          type: [integer, 'null']
        defaultPower:
          type: [integer, 'null']
          description: Printed/default power used to reset battlefield stat changes.
        defaultToughness:
          type: [integer, 'null']
          description: Printed/default toughness used to reset battlefield stat changes.
        defaultLoyalty:
          type: [integer, 'null']
          description: Printed/default loyalty used to reset battlefield loyalty changes.
        tapped:
          type: boolean
        faceDown:
          type: boolean
        activeFaceIndex:
          type: integer
          minimum: 0
          description: Zero-based displayed face index for double-faced cards.
        hidden:
          type: boolean
        revealedTo:
          type: array
          items:
            type: string
        position:
          oneOf:
            - type: object
              description: Legacy pixel position. Preserved for existing snapshots.
              properties:
                x:
                  type: number
                y:
                  type: number
              required: [x, y]
            - type: object
              description: Responsive battlefield position. Values are normalized against the available rendered battlefield axis.
              properties:
                x:
                  type: number
                  minimum: 0
                  maximum: 1
                y:
                  type: number
                  minimum: 0
                  maximum: 1
                unit:
                  type: string
                  enum: [ratio]
              required: [x, y, unit]
        rotation:
          type: integer
        counters:
          type: object
          additionalProperties:
            type: integer
        zone:
          $ref: '#/components/schemas/GameZoneName'
        isToken:
          type: boolean
        isTokenCopy:
          type: boolean
          description: True when this token was created as a copy of another card.
        isCommander:
          type: boolean
          description: True when this instance is a commander card and may return to the command zone.
    GameZoneName:
      type: string
      enum: [library, hand, battlefield, graveyard, exile, command]
    GameZoneResponse:
      type: object
      required: [gameId, playerId, zone, total, data]
      properties:
        gameId:
          type: string
          format: uuid
        playerId:
          type: string
          format: uuid
        zone:
          $ref: '#/components/schemas/GameZoneName'
        total:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/GameCard'
    TurnState:
      type: object
      required: [activePlayerId, phase, number]
      properties:
        activePlayerId:
          type: [string, 'null']
          format: uuid
        phase:
          type: string
        number:
          type: integer
    ChatMessage:
      type: object
      required: [id, userId, displayName, message, createdAt]
      properties:
        id:
          type: string
          description: Stable chat message identifier used by persisted reactions and read-state clients.
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        message:
          type: string
        targetPlayerId:
          type: [string, 'null']
          format: uuid
          description: Present when the message is private and only visible to sender and target player.
        targetDisplayName:
          type: [string, 'null']
          description: Display name for the private message target.
        createdAt:
          type: string
          format: date-time
        reactions:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/ChatReactionEntry'
          description: Reaction buckets keyed by like, dislike, love, laugh, angry, vomit or cry.
        cardNames:
          type: array
          items:
            type: string
          description: Card names included in aggregate card movement log entries.
    ChatReactionEntry:
      type: object
      required: [userId, displayName, createdAt]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
    GameLogEntry:
      type: object
