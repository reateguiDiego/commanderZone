<div class="modal-backdrop" role="presentation" (click)="close()">
  <section class="roll-modal" role="dialog" aria-modal="true" aria-label="Tirar dado" (click)="$event.stopPropagation()">
    <header>
      <span class="eyebrow">Tirar dado</span>
      <button type="button" aria-label="Cerrar tirada" (click)="close()">&#10005;</button>
    </header>

    <div class="roll-options" aria-label="Tipo de tirada">
      @for (option of rollOptions; track option.kind) {
        <button
          type="button"
          [class.selected]="isSelected(option.kind)"
          [attr.aria-pressed]="isSelected(option.kind)"
          [attr.aria-label]="option.label"
          [title]="option.label"
          (click)="selectRoll(option.kind)"
        >
          <img class="roll-icon" [src]="rollIconSrc(option.kind)" [alt]="option.label" />
        </button>
      }
    </div>

    @if (rollResult(); as result) {
      <section class="roll-result" aria-live="polite">
        <span>{{ result.label }}</span>
        <strong>{{ result.finalResult }}</strong>
      </section>
    } @else {
      <section class="roll-result empty" aria-live="polite">
        <span>{{ selectedLabel() }}</span>
        <strong>?</strong>
      </section>
    }

    <footer>
      <button class="secondary-action" type="button" (click)="close()">Cerrar</button>
      <button class="primary-action" type="button" (click)="roll()">{{ rollResult() ? 'Volver a tirar' : 'Tirar' }}</button>
    </footer>
  </section>
</div>
