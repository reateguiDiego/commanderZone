<div class="modal-backdrop" role="presentation" (click)="close()">
  <section class="roll-modal" role="dialog" aria-modal="true" [attr.aria-label]="'modals.roll.rollModal.tirarDado' | runtimeTranslate" (click)="$event.stopPropagation()">
    <header>
      <span class="eyebrow">{{ 'modals.roll.rollModal.tirarDado' | runtimeTranslate }}</span>
      <button type="button" [attr.aria-label]="'modals.roll.rollModal.cerrarTirada' | runtimeTranslate" (click)="close()">&#10005;</button>
    </header>

    <div class="roll-options" [attr.aria-label]="'modals.roll.rollModal.tipoDeTirada' | runtimeTranslate">
      @for (option of rollOptions; track option.kind) {
        <button
          type="button"
          [class.selected]="isSelected(option.kind)"
          [attr.aria-pressed]="isSelected(option.kind)"
          [attr.aria-label]="option.label | runtimeTranslate"
          [title]="option.label | runtimeTranslate"
          (click)="selectRoll(option.kind)"
        >
          <img class="roll-icon" [src]="rollIconSrc(option.kind)" [alt]="option.label | runtimeTranslate" />
        </button>
      }
    </div>

    @if (rollResult(); as result) {
      <section class="roll-result" aria-live="polite">
        <span>{{ result.label }}</span>
        <strong>{{ result.finalResult }}</strong>
      </section>
    } @else {
      <section class="roll-result empty" aria-live="polite">
        <span>{{ selectedLabel() | runtimeTranslate }}</span>
        <strong>{{ 'modals.roll.rollModal.text' | runtimeTranslate }}</strong>
      </section>
    }

    <footer>
      <button class="secondary-action" type="button" (click)="close()">{{ 'modals.roll.rollModal.cerrar' | runtimeTranslate }}</button>
      <button class="primary-action" type="button" (click)="roll()">
        {{ (rollResult() ? 'modals.roll.rollModal.volverATirar' : 'modals.roll.rollModal.tirar') | runtimeTranslate }}
      </button>
    </footer>
  </section>
</div>
