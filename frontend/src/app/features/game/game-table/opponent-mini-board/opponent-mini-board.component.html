@let opponent = player();

<button
  type="button"
  class="player-thumb"
  data-testid="opponent-mini-board"
  [style.--player-accent]="colorAccent()(opponent)"
  [attr.data-player-id]="opponent.id"
  [attr.data-player-drop-target]="opponent.id"
  [class.conceded]="opponent.state.status === 'conceded'"
  [class.drop-target-active]="isPlayerDropHighlighted()(opponent.id)"
  (click)="focusPlayer.emit(opponent.id)"
  (dragover)="dropAllowed.emit($event)"
  (drop)="playerDropped.emit({ event: $event, playerId: opponent.id })"
  (contextmenu)="playerMenuOpened.emit({ event: $event, playerId: opponent.id })"
>
  <span class="player-thumb-header">
    @if (deckLabel()(opponent); as label) {
      <strong class="opponent-deck-title" data-testid="opponent-deck-name">{{ label }}</strong>
    } @else {
      <strong class="opponent-deck-title muted" data-testid="opponent-deck-name">Deck pending</strong>
    }
    <span class="opponent-life" data-testid="opponent-life">{{ opponent.state.life }}</span>
  </span>
  <app-opponent-mini-battlefield
    [playerId]="opponent.id"
    [cards]="opponent.state.zones.battlefield"
    [backgroundImage]="backgroundImage()(opponent)"
    [battlefieldSize]="battlefieldSize()"
    [cardPosition]="cardPosition()"
    [cardImage]="cardImage()"
    [isCardDropSettling]="isCardDropSettling()"
    [isManaDropSettling]="isManaDropSettling()"
    [isBattlefieldEntrySettling]="isBattlefieldEntrySettling()"
    [isCommanderEntrySettling]="isCommanderEntrySettling()"
    [isCardTransferPending]="isCardTransferPending()"
    [arrowTargeting]="arrowTargeting()"
    (cardPreviewShown)="cardPreviewShown.emit($event)"
    (cardPreviewHidden)="cardPreviewHidden.emit()"
    (battlefieldCardClicked)="battlefieldCardClicked.emit($event)"
  />
  <span class="opponent-zone-counts" aria-label="Opponent zone counts">
    @for (summary of opponentZoneSummaries; track summary.zone) {
      <span
        class="opponent-zone-count"
        [attr.title]="zoneCountTooltip(opponent, summary)"
        [attr.aria-label]="zoneCountTooltip(opponent, summary)"
      >
        @switch (summary.icon) {
          @case ('hand-fan') {
            <img
              class="opponent-zone-icon opponent-hand-icon"
              src="/assets/icons/CM_cards_icon.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
          }
          @case ('deck') {
            <lucide-icon name="library" size="20" aria-hidden="true" />
          }
          @case ('grave') {
            <img
              class="opponent-zone-icon opponent-graveyard-icon"
              src="/assets/icons/gameplay/graveyard.svg"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
          }
          @default {
            <lucide-icon name="ban" size="20" aria-hidden="true" />
          }
        }
        <strong>{{ zoneCount()(opponent, summary.zone) }}</strong>
      </span>
    }
  </span>
</button>
