@let currentCard = card();
@let currentMode = mode();

@if (currentMode === 'mini') {
  <span
    class="mini-battlefield-card"
    data-testid="mini-battlefield-card"
    [attr.data-card-instance-id]="currentCard.instanceId"
    [attr.data-arrow-card-player-id]="playerId()"
    [attr.data-arrow-card-instance-id]="currentCard.instanceId"
    data-arrow-card-surface="mini-battlefield"
    [class.free-position]="freePosition()"
    [class.tapped]="currentCard.tapped"
    [class.drop-settling]="dropSettling() && !commanderEntrySettling()"
    [class.mana-drop-settling]="manaDropSettling() && !commanderEntrySettling()"
    [class.commander-entry-settling]="commanderEntrySettling()"
    [class.arrow-target-candidate]="arrowTargetCandidate()"
    [class.face-flipping]="faceFlipAnimating()"
    [style.visibility]="visible() ? null : 'hidden'"
    [style.left.px]="miniLeftPx()"
    [style.top.px]="miniTopPx()"
    [style.width.px]="miniWidthPx()"
    [style.height.px]="miniHeightPx()"
    [style.z-index]="miniZIndex()"
    (click)="cardClicked.emit({ event: $event, card: currentCard })"
    (mouseenter)="onMouseEnter($event, currentCard)"
    (mouseleave)="cardMouseLeft.emit()"
  >
    @if (image(); as cardImage) {
      <img [src]="cardImage" [alt]="currentCard.name" />
    } @else {
      <span class="card-back"></span>
    }
    <app-card-marker-rail [isToken]="currentCard.isToken === true" [counters]="visibleCounters()" [compact]="true" />
  </span>
} @else {
  <button
    type="button"
    [class]="currentMode === 'hand' ? 'mini-card hand-card' : 'game-card'"
    data-testid="game-card"
    [attr.data-card-instance-id]="currentCard.instanceId"
    [attr.data-card-name]="currentCard.name"
    [attr.data-owner-player-id]="playerId()"
    [attr.data-zone]="zone()"
    [attr.data-arrow-card-player-id]="currentMode === 'battlefield' ? playerId() : null"
    [attr.data-arrow-card-instance-id]="currentMode === 'battlefield' ? currentCard.instanceId : null"
    [attr.data-arrow-card-surface]="currentMode === 'battlefield' ? 'battlefield' : null"
    [attr.draggable]="draggable() ? 'true' : null"
    [class.free-position]="freePosition()"
    [class.tapped]="currentCard.tapped"
    [class.selected]="selected()"
    [class.dragging]="dragging()"
    [class.hover-lifted]="hoverLifted()"
    [class.locked-card]="locked()"
    [class.pending-transfer]="pendingTransfer()"
    [class.alignment-reference]="alignmentReference()"
    [class.arrow-target-candidate]="arrowTargetCandidate()"
    [class.drop-settling]="dropSettling() && !commanderEntrySettling()"
    [class.mana-drop-settling]="manaDropSettling() && !commanderEntrySettling()"
    [class.stat-drop-settling]="statDropSettling() && !commanderEntrySettling()"
    [class.commander-entry-settling]="commanderEntrySettling()"
    [class.stat-overlay-arriving]="statOverlayArriving()"
    [class.face-flipping]="faceFlipAnimating()"
    [class.loyalty-card]="loyaltyVisible()"
    [class.face-down]="faceDown()"
    [class.hand-drop-before]="handClass('before')"
    [class.hand-drop-after]="handClass('after')"
    [class.hand-arrival-before]="handArrivalSide() === 'before'"
    [class.hand-arrival-after]="handArrivalSide() === 'after'"
    [class.hand-arrival-new]="handArrivalSide() === 'new'"
    [class.hand-row-layout]="handLayout() === 'row'"
    [class.focus-entry-left]="battlefieldFocusEntry() === 'left'"
    [class.focus-entry-right]="battlefieldFocusEntry() === 'right'"
    [class.focus-entry-fade]="battlefieldFocusEntry() === 'fade'"
    [disabled]="disabled()"
    [style.visibility]="visible() ? null : 'hidden'"
    [style.left.px]="position()?.x"
    [style.top.px]="position()?.y"
    [style.--hand-index]="handIndex()"
    [style.--hand-count]="handCount()"
    [style.--hand-depth]="handDepth()"
    [style.--hand-fan-rotation]="handFanRotationDeg() + 'deg'"
    [style.--hand-fan-counter-rotation]="handFanCounterRotationDeg() + 'deg'"
    [style.--hand-fan-lift]="handFanLiftPx() + 'px'"
    [style.--hand-fan-splay]="handFanSplayPx() + 'px'"
    [style.--hand-fan-arc]="handFanArcPx() + 'px'"
    [style.--hand-row-splay]="handRowSplayPx() + 'px'"
    (pointerdown)="onPointerDown($event)"
    (click)="cardClicked.emit({ event: $event, card: currentCard })"
    (dblclick)="onDoubleClick($event)"
    (contextmenu)="cardMenuOpened.emit({ event: $event, card: currentCard })"
    (dragstart)="onDragStart($event, currentCard)"
    (dragend)="cardDragEnded.emit()"
    (dragover)="cardDragOver.emit({ event: $event, card: currentCard })"
    (drop)="cardDropped.emit({ event: $event, card: currentCard })"
    (mouseenter)="onMouseEnter($event, currentCard)"
    (mouseleave)="onMouseLeave()"
  >
    <span class="card-visual">
      <app-card-marker-rail
        [isToken]="currentCard.isToken === true"
        [counters]="visibleCounters()"
        (counterChanged)="changeCounter($event)"
        (counterDeleteRequested)="requestCounterDelete($event)"
      />
      @if (image(); as cardImage) {
        <img [src]="cardImage" [alt]="currentCard.name" draggable="false" />
      } @else {
        <span>{{ fallbackLabel() }}</span>
      }
      @if (statsVisible()) {
        <span
          class="power-toughness-overlay"
          aria-label="Power and toughness"
          [class.stat-pair-pulse-increase]="powerPulse() === 'increase' && toughnessPulse() === 'increase'"
          [class.stat-pair-pulse-decrease]="powerPulse() === 'decrease' && toughnessPulse() === 'decrease'"
        >
          <span
            role="button"
            tabindex="0"
            title="Power. Left click adds, right click removes."
            [class.stat-pulse-increase]="powerPulse() === 'increase'"
            [class.stat-pulse-decrease]="powerPulse() === 'decrease'"
            (pointerdown)="stopStatPointer($event)"
            (dblclick)="stopStatDoubleClick($event)"
            (click)="changePower($event, 1)"
            (contextmenu)="changePower($event, -1)"
          >
            {{ powerValue() }}
          </span>
          <span
            role="button"
            tabindex="0"
            title="Toughness. Left click adds, right click removes."
            [class.stat-pulse-increase]="toughnessPulse() === 'increase'"
            [class.stat-pulse-decrease]="toughnessPulse() === 'decrease'"
            (pointerdown)="stopStatPointer($event)"
            (dblclick)="stopStatDoubleClick($event)"
            (click)="changeToughness($event, 1)"
            (contextmenu)="changeToughness($event, -1)"
          >
            {{ toughnessValue() }}
          </span>
        </span>
      } @else if (loyaltyVisible()) {
        <app-loyalty-counter
          [value]="loyaltyValue()!"
          [pulse]="loyaltyPulse()"
          [entrySettling]="statDropSettling()"
          (loyaltyChanged)="changeLoyalty($event.event, $event.delta)"
        />
      }
    </span>
  </button>
}
