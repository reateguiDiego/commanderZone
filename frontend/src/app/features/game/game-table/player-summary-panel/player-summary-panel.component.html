@let currentPlayer = player();

<div class="player-summary-panel" data-testid="player-summary-panel" [style.--player-accent]="colorAccent()(currentPlayer)">
  <app-player-avatar
    class="player-avatar"
    [displayName]="currentPlayer.state.user.displayName"
    [avatar]="currentPlayer.state.user.avatar"
    size="md"
  />
  <div class="player-copy">
    <app-player-name
      data-testid="focused-player-name"
      [displayName]="currentPlayer.state.user.displayName"
      [nameStyle]="currentPlayer.state.user.displayNameStyle"
      size="lg"
      plateSize="md"
      plateWidth="100%"
      plateHeight="3.35rem"
      plateLabelWidth="calc(100% - 4rem)"
      [fill]="true"
    />
    @if (deckLabel()(currentPlayer); as label) {
      <small>{{ label }}</small>
    }
    <app-mana-symbols class="mana-row" [symbols]="manaSymbols()(currentPlayer)" fallback="Colorless" size="small" />
  </div>
  <div class="life-controls" data-testid="focused-player-life" [attr.data-player-id]="currentPlayer.id">
    <button
      type="button"
      class="life-total"
      data-testid="life-value"
      [attr.data-player-id]="currentPlayer.id"
      (click)="changeLife($event, 1)"
      (contextmenu)="changeLife($event, -1)"
      aria-label="Life total. Left click adds life, right click removes life."
    >
      {{ currentPlayer.state.life }}
    </button>
    <app-extra-actions-menu
      class="player-extra-actions"
      data-testid="player-extra-menu-host"
      label="Extras"
      ariaLabel="Open extra player counters"
      menuLabel="Extra player counters"
      icon="plus"
      align="right"
      variant="gold"
    >
      <button type="button" role="menuitem">
        <span>Commander damage</span>
        <small>Coming soon</small>
      </button>
      <button type="button" role="menuitem">
        <span>Poison</span>
        <small>Coming soon</small>
      </button>
      <button type="button" role="menuitem">
        <span>More counters</span>
        <small>Coming soon</small>
      </button>
    </app-extra-actions-menu>
  </div>
</div>
