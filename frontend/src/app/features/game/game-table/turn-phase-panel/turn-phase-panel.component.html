@let currentTurn = turn();

<div class="turn-phase-panel" data-testid="turn-panel">
  <div class="turn-summary">
    <div class="turn-title">
      <span data-testid="turn-number">Turn {{ currentTurn.number }}</span>
      <strong data-testid="turn-active-player">{{ activePlayerName() }}</strong>
    </div>
    @if (isCurrentTurnPlayer()) {
      <div class="turn-actions">
        <button
          type="button"
          class="turn-action-button pass-turn-button"
          data-testid="pass-turn"
          [disabled]="pending()"
          [title]="pending() ? 'Applying action' : 'Pass turn'"
          (click)="passTurn.emit()"
        >
          <span>Pasar turno</span>
        </button>
        <button
          type="button"
          class="turn-action-button advance-phase-button"
          data-testid="advance-phase"
          [disabled]="pending()"
          [title]="pending() ? 'Applying action' : 'Advance to ' + nextPhaseLabel()"
          (click)="advancePhase.emit()"
        >
          <span data-testid="end-step">{{ nextPhaseLabel() }}</span>
        </button>
      </div>
    }
  </div>
  <div class="phase-tracker" aria-label="Turn phases">
    <span class="sr-only" data-testid="active-phase">{{ currentTurn.phase }}</span>
    @for (phase of phases(); track phase) {
      <button
        type="button"
        data-testid="phase-step"
        [attr.data-phase]="phase"
        [class.active]="currentTurn.phase === phase"
        [class.phase-past]="isPhasePast()(phase)"
        [class.phase-compact]="isCompactPhase(phase)"
        [class.phase-combat]="phase === 'combat'"
        [attr.aria-current]="currentTurn.phase === phase ? 'step' : null"
      >
        <span class="phase-node"></span>
        <span>{{ phase }}</span>
      </button>
    }
  </div>
</div>
