<section class="arrow-target-backdrop" data-testid="arrow-target-dialog">
  <form
    class="arrow-target-dialog"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'game.arrowTargetDialog.selectArrowTargetPlayer' | runtimeTranslate"
    (click)="$event.stopPropagation()"
    (ngSubmit)="confirm()"
  >
    <header class="dialog-header">
      <span class="dialog-kicker">{{ 'game.arrowTargetDialog.drawArrow' | runtimeTranslate }}</span>
      <h2>{{ 'game.arrowTargetDialog.chooseTargetBoard' | runtimeTranslate }}</h2>
      <p>{{ 'game.arrowTargetDialog.theSelectedBattlefieldOpensBehindThisPanel' | runtimeTranslate }}</p>
    </header>

    <label class="field">
      <span>{{ 'game.arrowTargetDialog.targetPlayer' | runtimeTranslate }}</span>
      <span class="select-shell">
        <select
          data-testid="arrow-target-player-select"
          [value]="effectiveSelectedPlayerId()"
          (input)="updatePlayer($any($event.target).value)"
          (change)="updatePlayer($any($event.target).value)"
          autofocus
        >
          @for (player of availablePlayers(); track player.id) {
            <option [value]="player.id">{{ playerLabel()(player) }}</option>
          }
        </select>
      </span>
    </label>

    <label class="checkbox-field">
      <input
        type="checkbox"
        data-testid="arrow-target-multiple-checkbox"
        [checked]="multipleTargets()"
        (change)="updateMultipleTargets($any($event.target).checked)"
      />
      <span>
        <strong>{{ 'game.arrowTargetDialog.multipleTargets' | runtimeTranslate }}</strong>
        <small>{{ 'game.arrowTargetDialog.drawSeveralArrowsFromThisCard' | runtimeTranslate }}</small>
      </span>
    </label>

    @if (multipleTargets()) {
      <label class="target-count-field">
        <span>{{ 'game.arrowTargetDialog.targets' | runtimeTranslate }}</span>
        <input
          type="number"
          data-testid="arrow-target-count-input"
          min="2"
          step="1"
          [value]="effectiveTargetCount()"
          (input)="updateTargetCount($any($event.target).value)"
          (change)="updateTargetCount($any($event.target).value)"
        />
      </label>
    }

    <footer>
      <button
        type="button"
        class="secondary-button"
        data-testid="arrow-target-cancel"
        (click)="cancelled.emit()"
      >
        {{ 'game.arrowTargetDialog.cancel' | runtimeTranslate }}
      </button>
      <button
        type="button"
        class="primary-button"
        data-testid="arrow-target-confirm"
        (click)="confirm()"
      >
        {{ 'game.arrowTargetDialog.selectTarget' | runtimeTranslate }}
      </button>
    </footer>
  </form>
</section>
