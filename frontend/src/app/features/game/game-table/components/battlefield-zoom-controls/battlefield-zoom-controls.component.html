<div class="battlefield-zoom-controls" data-testid="battlefield-zoom-controls">
  @if (!isExpanded()) {
    <button
      class="zoom-toggle-button"
      type="button"
      [title]="'game.battlefieldZoomControls.battlefieldZoom' | runtimeTranslate"
      [attr.aria-label]="'game.battlefieldZoomControls.openBattlefieldZoomControls' | runtimeTranslate"
      aria-expanded="false"
      (click)="toggleExpanded()"
    >
      <lucide-icon name="search" size="14" aria-hidden="true" />
    </button>
  } @else {
    <div class="zoom-popover" data-testid="battlefield-zoom-popover" [attr.aria-label]="'game.battlefieldZoomControls.battlefieldZoom' | runtimeTranslate">
      <span
        class="zoom-slider-shell"
        data-testid="battlefield-zoom-default-mark"
        [style.--zoom-current-position]="currentZoomPosition()"
        [style.--zoom-default-position]="defaultZoomPosition()"
        (pointerdown)="startSliderDrag($event)"
        (pointermove)="moveSliderDrag($event)"
        (pointerup)="endSliderDrag($event)"
        (pointercancel)="endSliderDrag($event)"
        (lostpointercapture)="cancelSliderDrag()"
      >
        <span class="zoom-track" aria-hidden="true">
          <span class="zoom-default-mark"></span>
          <span class="zoom-thumb">
            <i [appManaIcon]="zoomThumbSymbol" manaIconKind="cost" aria-hidden="true"></i>
          </span>
        </span>
        <input
          class="zoom-slider"
          data-testid="battlefield-zoom-slider"
          type="range"
          [title]="'game.battlefieldZoomControls.battlefieldZoom' | runtimeTranslate"
          [attr.aria-label]="'game.battlefieldZoomControls.battlefieldZoom' | runtimeTranslate"
          [min]="minZoomPercent()"
          [max]="maxZoomPercent()"
          [step]="zoomStepPercent()"
          [value]="zoomPercent()"
          (input)="handleZoomInput($event)"
        />
      </span>

      <button
        class="reset-button"
        type="button"
        [title]="'game.battlefieldZoomControls.resetZoom' | runtimeTranslate"
        [attr.aria-label]="'game.battlefieldZoomControls.resetBattlefieldZoom' | runtimeTranslate"
        [disabled]="!canResetZoom()"
        (click)="resetZoom.emit()"
      >
        <lucide-icon name="rotate-ccw" size="14" aria-hidden="true" />
      </button>
    </div>
  }
</div>
