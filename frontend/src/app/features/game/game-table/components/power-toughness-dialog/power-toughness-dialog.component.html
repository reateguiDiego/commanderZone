<div class="stat-dialog-backdrop" role="presentation">
  <section class="stat-dialog-panel" role="dialog" aria-modal="true" [attr.aria-label]="'game.powerToughnessDialog.setPowerAndToughness' | runtimeTranslate">
    <header class="stat-dialog-header">
      <span>{{ 'game.powerToughnessDialog.powerToughness' | runtimeTranslate }}</span>
      <strong>{{ cardName() }}</strong>
    </header>

    <div class="stat-preview" aria-hidden="true">
      <span>{{ power() || '0' }}</span>
      <i>/</i>
      <span>{{ toughness() || '0' }}</span>
    </div>

    <div class="stat-fields">
      <label>
        <span>{{ 'game.powerToughnessDialog.power' | runtimeTranslate }}</span>
        <input
          type="number"
          data-testid="power-input"
          [value]="power()"
          (input)="update('power', $any($event.target).value)"
          autofocus
        />
      </label>
      <label>
        <span>{{ 'game.powerToughnessDialog.toughness' | runtimeTranslate }}</span>
        <input
          type="number"
          data-testid="toughness-input"
          [value]="toughness()"
          (input)="update('toughness', $any($event.target).value)"
        />
      </label>
    </div>

    <footer>
      <button type="button" class="secondary-button" (click)="cancelled.emit()">{{ 'game.powerToughnessDialog.cancel' | runtimeTranslate }}</button>
      <button type="button" class="primary-button" [disabled]="invalid()" (click)="confirmed.emit()">{{ 'game.powerToughnessDialog.apply' | runtimeTranslate }}</button>
    </footer>
  </section>
</div>
