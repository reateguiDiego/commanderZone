<div class="header-menu-dropdown">
  <button
    class="icon-button"
    type="button"
    [title]="menuLabel()"
    [attr.aria-label]="headerMenuLabel()"
    [attr.aria-expanded]="menuOpen()"
    (click)="toggleMenu()"
  >
    <lucide-icon name="menu" size="18" />
  </button>

  @if (menuOpen()) {
    <section class="header-menu-panel" role="menu" [attr.aria-label]="userMenuLabel()">
      <button class="menu-item" type="button" role="menuitem" (click)="selectSettings()">
        <span class="menu-item-main">
          <lucide-icon name="settings" size="16" />
          <span>{{ settingsLabel() }}</span>
        </span>
      </button>
      <button class="menu-item" type="button" role="menuitem" (click)="selectFullscreen()">
        <span class="menu-item-main">
          <lucide-icon name="maximize-2" size="16" />
          <span>{{ fullscreenLabel() }}</span>
        </span>
      </button>

      <button
        class="menu-item with-detail"
        type="button"
        role="menuitem"
        [attr.aria-expanded]="languagePickerOpen()"
        (click)="toggleLanguagePicker()"
      >
        <span class="menu-item-main">
          <img class="menu-item-flag" [src]="selectedLanguageFlagAsset()" [alt]="flagAltPrefix() + selectedLanguageLabel()" />
          <span>{{ languageLabel() }}</span>
        </span>
        <span class="menu-item-detail">{{ selectedLanguageLabel() }}</span>
        <lucide-icon name="chevron-right" size="14" [class.expanded]="languagePickerOpen()" />
      </button>

      @if (languagePickerOpen()) {
        <div class="language-list" role="group" [attr.aria-label]="languageOptionsLabel()">
          @for (language of sortedLanguages(); track language.code) {
            <button
              class="language-item"
              type="button"
              [class.selected]="selectedLanguage() === language.code"
              (click)="selectLanguage(language.code)"
            >
              <span class="language-option">
                <img class="language-flag" [src]="language.flagAsset" [alt]="flagAltPrefix() + language.label" />
                <span>{{ language.label }}</span>
              </span>
              @if (selectedLanguage() === language.code) {
                <lucide-icon name="check" size="14" />
              }
            </button>
          }
        </div>
      }

      <button class="menu-item danger" type="button" role="menuitem" (click)="selectLogoff()">
        <span class="menu-item-main">
          <lucide-icon name="log-out" size="16" />
          <span>{{ logOffLabel() }}</span>
        </span>
      </button>
    </section>
  }
</div>
