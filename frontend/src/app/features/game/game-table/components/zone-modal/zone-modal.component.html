@let currentModal = modal();

<section class="zone-modal-backdrop">
  <div class="zone-modal" data-testid="zone-modal" [class.has-zone-filters]="currentModal.showFilters" (click)="stopClick($event)">
    <header class="zone-modal-header">
      <div class="zone-title-block">
        <span class="zone-eyebrow">{{ currentModal.zone }}</span>
        <h2>{{ currentModal.title }}</h2>
        @if (currentModal.readOnly) {
          <small>Read-only library review</small>
        }
        <strong>{{ currentModal.total }} cards</strong>
      </div>
      <button class="zone-modal-close" type="button" data-testid="zone-modal-close" aria-label="Close zone" (click)="close.emit()">
        <lucide-icon name="x" size="18" />
      </button>
    </header>
    @if (currentModal.showFilters) {
      <div class="zone-filters">
        <label>
          <span>Type</span>
          <select [ngModel]="currentModal.type" (ngModelChange)="updateType($event)">
            <option value="">All types</option>
            <option value="creature">Creatures</option>
            <option value="instant">Instants</option>
            <option value="sorcery">Sorceries</option>
            <option value="artifact">Artifacts</option>
            <option value="enchantment">Enchantments</option>
            <option value="planeswalker">Planeswalkers</option>
            <option value="land">Lands</option>
          </select>
        </label>
        <label class="zone-search">
          <span>Search</span>
          <input placeholder="Search by name" [ngModel]="currentModal.search" (ngModelChange)="updateSearch($event)" />
        </label>
      </div>
    }
    <div class="zone-modal-body">
      <app-card-spoiler-grid
        [cards]="currentModal.cards"
        [selectedCardId]="currentModal.selectedCard?.instanceId ?? null"
        [loading]="currentModal.loading"
        [allowContextMenu]="!currentModal.readOnly"
        [allowReorder]="currentModal.allowReorder"
        [allowSelection]="!currentModal.allowReorder"
        [orderLabels]="currentModal.drawOrderLabels"
        [cardImage]="cardImage()"
        emptyLabel="I'm empty now. You can close me if you want, and only if you want. 🙂"
        (cardSelected)="cardSelected.emit($event)"
        (cardsReordered)="cardsReordered.emit($event)"
        (cardMenuOpened)="cardMenuOpened.emit($event)"
      />
    </div>
  </div>
</section>
