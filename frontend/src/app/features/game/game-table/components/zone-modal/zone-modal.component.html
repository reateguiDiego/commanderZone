@let currentModal = modal();

<section class="zone-modal-backdrop">
  <div class="zone-modal" data-testid="zone-modal" [class.has-zone-filters]="currentModal.showFilters" (click)="stopClick($event)">
    <header class="zone-modal-header">
      <div class="zone-title-block">
        <span class="zone-eyebrow">{{ currentModal.zone }}</span>
        <h2>{{ currentModal.title }}</h2>
        @if (currentModal.readOnly) {
          <small>{{ 'game.zoneModal.readOnlyLibraryReview' | runtimeTranslate }}</small>
        }
        <strong>{{ currentModal.total }} cards</strong>
      </div>
      <button class="zone-modal-close" type="button" data-testid="zone-modal-close" [attr.aria-label]="'game.zoneModal.closeZone' | runtimeTranslate" (click)="close.emit()">
        <lucide-icon name="x" size="18" />
      </button>
    </header>
    @if (currentModal.showFilters) {
      <div class="zone-filters">
        <label>
          <span>{{ 'game.zoneModal.type' | runtimeTranslate }}</span>
          <select [ngModel]="currentModal.type" (ngModelChange)="updateType($event)">
            <option value="">{{ 'game.zoneModal.allTypes' | runtimeTranslate }}</option>
            <option value="creature">{{ 'game.zoneModal.creatures' | runtimeTranslate }}</option>
            <option value="instant">{{ 'game.zoneModal.instants' | runtimeTranslate }}</option>
            <option value="sorcery">{{ 'game.zoneModal.sorceries' | runtimeTranslate }}</option>
            <option value="artifact">{{ 'game.zoneModal.artifacts' | runtimeTranslate }}</option>
            <option value="enchantment">{{ 'game.zoneModal.enchantments' | runtimeTranslate }}</option>
            <option value="planeswalker">{{ 'game.zoneModal.planeswalkers' | runtimeTranslate }}</option>
            <option value="land">{{ 'game.zoneModal.lands' | runtimeTranslate }}</option>
          </select>
        </label>
        <label class="zone-search">
          <span>{{ 'game.zoneModal.search' | runtimeTranslate }}</span>
          <input [placeholder]="'game.zoneModal.searchByName' | runtimeTranslate" [ngModel]="currentModal.search" (ngModelChange)="updateSearch($event)" />
        </label>
      </div>
    }
    <div class="zone-modal-body">
      <app-card-spoiler-grid
        [cards]="currentModal.cards"
        [selectedCardId]="currentModal.selectedCard?.instanceId ?? null"
        [loading]="currentModal.loading"
        [allowContextMenu]="!currentModal.readOnly"
        [allowReorder]="currentModal.allowReorder"
        [allowSelection]="!currentModal.allowReorder"
        [orderLabels]="currentModal.drawOrderLabels"
        [cardImage]="cardImage()"
        emptyLabel="I'm empty now. You can close me if you want, and only if you want. 🙂"
        (cardSelected)="cardSelected.emit($event)"
        (cardsReordered)="cardsReordered.emit($event)"
        (cardMenuOpened)="cardMenuOpened.emit($event)"
      />
    </div>
  </div>
</section>
