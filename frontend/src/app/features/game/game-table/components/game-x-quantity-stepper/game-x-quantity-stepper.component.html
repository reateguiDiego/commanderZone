<div class="number-selector" [attr.aria-label]="ariaLabel()">
  <input
    type="number"
    [attr.data-testid]="testIdPrefix() ? testIdPrefix() + '-input' : null"
    [attr.min]="min()"
    [attr.max]="max()"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel()"
    [value]="value()"
    (input)="updateFromInput($event)"
  />
  <div class="number-stepper" [attr.aria-label]="'game.gameXQuantityStepper.adjustValue' | runtimeTranslate">
    <button
      class="number-stepper-button"
      type="button"
      [attr.data-testid]="testIdPrefix() ? testIdPrefix() + '-increase' : null"
      [attr.aria-label]="'game.gameXQuantityStepper.increaseValue' | runtimeTranslate"
      [disabled]="!canStepUp()"
      (click)="adjust(1)"
    >
      <lucide-icon name="chevron-up" [size]="15" [strokeWidth]="2.7" aria-hidden="true" />
    </button>
    <button
      class="number-stepper-button"
      type="button"
      [attr.data-testid]="testIdPrefix() ? testIdPrefix() + '-decrease' : null"
      [attr.aria-label]="'game.gameXQuantityStepper.decreaseValue' | runtimeTranslate"
      [disabled]="!canStepDown()"
      (click)="adjust(-1)"
    >
      <lucide-icon name="chevron-down" [size]="15" [strokeWidth]="2.7" aria-hidden="true" />
    </button>
  </div>
</div>
