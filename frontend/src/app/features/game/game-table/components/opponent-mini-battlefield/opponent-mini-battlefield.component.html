<span
  #viewport
  class="mini-battlefield"
  data-testid="opponent-mini-battlefield"
  [attr.data-motion-zone]="playerId() + ':battlefield'"
  [style.--mini-battlefield-background]="backgroundImageCss()"
  (pointermove)="handlePointerMove($event)"
  (pointerleave)="handlePointerLeave()"
>
  @if (mechanicCards().length > 0) {
    <app-battlefield-mechanics-overlay
      variant="mini"
      [cards]="mechanicCards()"
      [playerId]="playerId()"
      [image]="cardImage()"
      [miniViewportSize]="viewportSize()"
      [miniCardBaseWidthPx]="mechanicMiniCardWidthPx()"
      (cardMenuOpened)="battlefieldCardClicked.emit({ event: $event.event, playerId: playerId(), card: $event.card, forceOpenLeft: $event.forceOpenLeft })"
      (cardPreviewShown)="showCardPreview($event)"
      (cardPreviewRequested)="showCardPreview($event)"
      (cardPreviewHidden)="cardPreviewHidden.emit()"
    />
  }

  @for (card of layoutCards(); track card.instanceId; let cardIndex = $index) {
    @if (cardLayout(card); as layout) {
      <app-game-card-view
        mode="mini"
        [card]="card"
        [playerId]="playerId()"
        zone="battlefield"
        [image]="cardImage()(card)"
        [freePosition]="!!cardPosition()(card)"
        [miniLeftPx]="layout.left"
        [miniTopPx]="layout.top"
        [miniWidthPx]="layout.width"
        [miniHeightPx]="layout.height"
        [miniZIndex]="miniCardZIndex(layout, cardIndex)"
        [activeHoverInstanceId]="activePreviewInstanceId()"
        [attachmentStackRole]="attachmentStackView(card.instanceId)?.role ?? null"
        [attachmentStackLayer]="attachmentStackView(card.instanceId)?.layer ?? null"
        [dropSettling]="isCardDropSettling()(playerId(), 'battlefield', card)"
        [manaDropSettling]="isManaDropSettling()(playerId(), card)"
        [statDropSettling]="isBattlefieldEntrySettling()(playerId(), card)"
        [commanderEntrySettling]="isCommanderEntrySettling()(playerId(), card)"
        [visible]="!isCardTransferPending()(playerId(), 'battlefield', card)"
        [arrowTargetCandidate]="arrowTargeting()"
        (cardClicked)="clickBattlefieldCard($event.event, $event.card)"
        (cardFaceLookRequested)="showCardPreview($event)"
      />
    }
  }
</span>
