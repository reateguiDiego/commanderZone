<section
  class="mana-pool-panel"
  aria-label="Mana pool"
  [style.--mana-pool-symbol-color]="symbolColorStyle()"
  (click)="$event.stopPropagation()"
  (contextmenu)="openResetMenu($event)"
>
  <button
    type="button"
    class="mana-pool-hide-button"
    title="Hide mana pool"
    aria-label="Hide mana pool"
    (click)="hidePanel($event)"
  >
    <lucide-icon name="x" size="12" aria-hidden="true" />
  </button>

  <div class="any-color-pool" [class.controls-active]="activeControls() === 'ANY'">
    <button
      type="button"
      class="any-color-symbol"
      [class.mana-empty]="anyValue() === 0"
      title="Any color"
      aria-label="Any color"
      (click)="activateControls('ANY', $event)"
    >
      @for (color of anyColorSymbols; track color) {
        <span class="any-color-cell any-color-cell--{{ color.toLowerCase() }}" aria-hidden="true">
          <app-mana-symbols [symbols]="[color]" [costBackground]="false" />
        </span>
      }
      <strong>{{ anyValue() }}</strong>
    </button>
    <div class="mana-step-stack">
      <button
        type="button"
        class="step-button step-button--add"
        title="Add Any color"
        aria-label="Add Any color"
        [disabled]="!canAddAny()"
        (click)="anyAdded.emit()"
      >
        <lucide-icon name="plus" size="15" aria-hidden="true" />
      </button>
      @if (anyValue() > 0) {
        <button
          type="button"
          class="step-button step-button--remove"
          title="Remove Any color"
          aria-label="Remove Any color"
          (click)="anyRemoved.emit()"
        >
          <lucide-icon name="minus" size="15" aria-hidden="true" />
        </button>
      } @else {
        <span class="step-button-spacer" aria-hidden="true"></span>
      }
    </div>
  </div>

  <div class="mana-pool-grid" [style.--mana-pool-visible-color-count]="visibleColorCount()">
    @for (color of colors(); track color) {
      <div class="mana-pool-color" [class.controls-active]="activeControls() === color">
        <button
          type="button"
          class="mana-value-button"
          [class.mana-empty]="value(color) === 0"
          [title]="manaTypeName(color)"
          [attr.aria-label]="manaTypeName(color)"
          (click)="activateControls(color, $event)"
        >
          <app-mana-symbols [symbols]="[color]" size="small" [costBackground]="false" />
          <strong>{{ value(color) }}</strong>
        </button>
        <div class="mana-step-stack">
          <button
            type="button"
            class="step-button step-button--add"
            [title]="'Add ' + manaTypeName(color)"
            [attr.aria-label]="'Add ' + manaTypeName(color)"
            [disabled]="!canAdd(color)"
            (click)="colorAdded.emit(color)"
          >
            <lucide-icon name="plus" size="15" aria-hidden="true" />
          </button>
          @if (value(color) > 0) {
            <button
              type="button"
              class="step-button step-button--remove"
              [title]="'Remove ' + manaTypeName(color)"
              [attr.aria-label]="'Remove ' + manaTypeName(color)"
              (click)="colorRemoved.emit(color)"
            >
              <lucide-icon name="minus" size="15" aria-hidden="true" />
            </button>
          } @else {
            <span class="step-button-spacer" aria-hidden="true"></span>
          }
        </div>
      </div>
    }
  </div>

  @if (resetMenuOpen()) {
    <div class="mana-reset-menu" role="menu" aria-label="Mana pool menu">
      <button type="button" role="menuitem" [disabled]="total() === 0" (click)="resetPool($event)">
        <lucide-icon name="rotate-ccw" size="14" aria-hidden="true" />
        <span>Reset mana pool</span>
      </button>
    </div>
  }
</section>
