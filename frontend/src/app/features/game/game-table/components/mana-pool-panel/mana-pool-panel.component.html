<section
  class="mana-pool-panel"
  [attr.aria-label]="'game.manaPoolPanel.manaPool' | runtimeTranslate"
  [class.controls-active]="activeControls() !== null"
  [style.--mana-pool-symbol-color]="symbolColorStyle()"
  (click)="$event.stopPropagation()"
  (contextmenu)="openContextMenu($event)"
>
  <button
    type="button"
    class="mana-pool-hide-button"
    [title]="'game.manaPoolPanel.hideManaPool' | runtimeTranslate"
    [attr.aria-label]="'game.manaPoolPanel.hideManaPool' | runtimeTranslate"
    (click)="hidePanel($event)"
  >
    <lucide-icon name="x" size="12" aria-hidden="true" />
  </button>

  <div class="mana-pool-grid" [style.--mana-pool-visible-color-count]="visibleColorCount()">
    @for (color of colors(); track color) {
      <div class="mana-pool-color" [class.controls-active]="activeControls() === color">
        <button
          type="button"
          class="mana-value-button"
          [class.mana-empty]="value(color) === 0"
          [attr.data-mana-pool-color]="color"
          [title]="manaTypeName(color)"
          [attr.aria-label]="manaTypeName(color)"
          (pointerdown)="activateControls(color, $event)"
        >
          <app-mana-symbols [symbols]="[color]" size="small" [costBackground]="false" />
          <strong>{{ value(color) }}</strong>
        </button>
        <div class="mana-step-stack">
          <button
            type="button"
            class="step-button step-button--add"
            [title]="'Add ' + manaTypeName(color)"
            [attr.aria-label]="'Add ' + manaTypeName(color)"
            [disabled]="!canAdd(color)"
            (click)="colorAdded.emit(color)"
          >
            <lucide-icon name="plus" size="15" aria-hidden="true" />
          </button>
          @if (value(color) > 0) {
            <button
              type="button"
              class="step-button step-button--remove"
              [title]="'Remove ' + manaTypeName(color)"
              [attr.aria-label]="'Remove ' + manaTypeName(color)"
              (click)="colorRemoved.emit(color)"
            >
              <lucide-icon name="minus" size="15" aria-hidden="true" />
            </button>
          } @else {
            <span class="step-button-spacer" aria-hidden="true"></span>
          }
        </div>
      </div>
    }
  </div>
</section>
