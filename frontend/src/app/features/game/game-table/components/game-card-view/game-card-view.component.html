@let currentCard = card();
@let currentMode = mode();

@if (currentMode === 'mini') {
  <span
    class="mini-battlefield-card"
    data-testid="mini-battlefield-card"
    [attr.data-card-instance-id]="currentCard.instanceId"
    [attr.data-flip-id]="currentCard.instanceId"
    [attr.data-arrow-card-player-id]="playerId()"
    [attr.data-arrow-card-instance-id]="currentCard.instanceId"
    data-arrow-card-surface="mini-battlefield"
    [class.free-position]="freePosition()"
    [class.tapped]="currentCard.tapped || battleRotated()"
    [class.drop-settling]="dropSettling() && !commanderEntrySettling()"
    [class.mana-drop-settling]="manaDropSettling() && !commanderEntrySettling()"
    [class.commander-entry-settling]="commanderEntrySettling()"
    [class.arrow-target-candidate]="arrowTargetCandidate()"
    [class.mini-preview-active]="activeHoverInstanceId() === currentCard.instanceId"
    [class.attachment-stack-target]="attachmentStackRole() === 'target'"
    [class.attachment-stack-equipment]="attachmentStackRole() === 'equipment'"
    [class.face-flipping]="faceFlipAnimating()"
    [style.visibility]="visible() ? null : 'hidden'"
    [style.left.px]="miniLeftPx()"
    [style.top.px]="miniTopPx()"
    [style.width.px]="miniWidthPx()"
    [style.height.px]="miniHeightPx()"
    [style.z-index]="miniZIndex()"
    (click)="cardClicked.emit({ event: $event, card: currentCard })"
    (mouseenter)="onMouseEnter($event, currentCard)"
    (mouseleave)="onMouseLeave()"
  >
    @if (image(); as cardImage) {
      <img [src]="cardImage" [alt]="currentCard.name" />
    } @else {
      <span class="card-back"></span>
    }
    @if (canShowFaceToggle()) {
      <span
        class="double-face-toggle"
        role="button"
        tabindex="-1"
        [attr.aria-label]="'game.gameCardView.lookAtOtherFace' | runtimeTranslate"
        [title]="'game.gameCardView.lookAtOtherFace' | runtimeTranslate"
        draggable="false"
        (pointerdown)="stopFaceTogglePointer($event)"
        (click)="lookAtOtherFace($event)"
        (dblclick)="stopFaceToggleEvent($event)"
        (dragstart)="stopFaceToggleEvent($event)"
      >
        <lucide-icon name="rotate-cw" size="13" aria-hidden="true" />
      </span>
    }
  </span>
} @else {
  <button
    type="button"
    [class]="currentMode === 'hand' ? 'mini-card hand-card' : 'game-card'"
    data-testid="game-card"
    [attr.data-card-instance-id]="currentCard.instanceId"
    [attr.data-flip-id]="currentCard.instanceId"
    [attr.data-card-name]="currentCard.name"
    [attr.data-owner-player-id]="playerId()"
    [attr.data-zone]="zone()"
    [attr.data-arrow-card-player-id]="currentMode === 'battlefield' ? playerId() : null"
    [attr.data-arrow-card-instance-id]="currentMode === 'battlefield' ? currentCard.instanceId : null"
    [attr.data-arrow-card-surface]="currentMode === 'battlefield' ? 'battlefield' : null"
    [attr.draggable]="draggable() ? 'true' : null"
    [class.free-position]="freePosition()"
    [class.tapped]="currentCard.tapped || battleRotated()"
    [class.selected]="selected()"
    [class.dragging]="dragging()"
    [class.hover-lifted]="hoverLifted()"
    [class.battlefield-preview-active]="previewActive() && hoverLifted()"
    [class.locked-card]="locked()"
    [class.pending-transfer]="pendingTransfer()"
    [class.alignment-reference]="alignmentReference()"
    [class.arrow-target-candidate]="arrowTargetCandidate()"
    [class.drop-settling]="dropSettling() && !commanderEntrySettling()"
    [class.mana-drop-settling]="manaDropSettling() && !commanderEntrySettling()"
    [class.stat-drop-settling]="statDropSettling() && !commanderEntrySettling()"
    [class.commander-entry-settling]="commanderEntrySettling()"
    [class.stat-overlay-arriving]="statOverlayArriving()"
    [class.face-flipping]="faceFlipAnimating()"
    [class.loyalty-card]="loyaltyVisible()"
    [class.land-stack-card]="landStackRole() !== null"
    [class.land-stack-top]="landStackRole() === 'top'"
    [class.land-stack-under]="landStackRole() === 'under'"
    [class.attachment-stack-target]="attachmentStackRole() === 'target'"
    [class.attachment-stack-equipment]="attachmentStackRole() === 'equipment'"
    [class.attachment-stack-aura]="attachmentStackHighlighted()"
    [class.land-stack-drop-target]="landStackDropTarget()"
    [class.attachment-stack-drop-target]="landStackDropTarget() && landStackDropKind() === 'attachment'"
    [class.face-down]="faceDown()"
    [class.hand-motion-active]="motionActive()"
    [class.hand-drop-before]="handClass('before')"
    [class.hand-drop-after]="handClass('after')"
    [class.hand-row-layout]="handLayout() === 'row'"
    [class.hand-active-hover]="currentMode === 'hand' && activeHoverInstanceId() === currentCard.instanceId"
    [class.focus-entry-left]="battlefieldFocusEntry() === 'left'"
    [class.focus-entry-right]="battlefieldFocusEntry() === 'right'"
    [class.focus-entry-fade]="battlefieldFocusEntry() === 'fade'"
    [disabled]="disabled()"
    [style.visibility]="visible() ? null : 'hidden'"
    [style.z-index]="cardZIndex()"
    [style.left.px]="position()?.x"
    [style.top.px]="position()?.y"
    [style.--hand-index]="handIndex()"
    [style.--hand-count]="handCount()"
    [style.--hand-depth]="handDepth()"
    [style.--hand-fan-rotation]="handFanRotationDeg() + 'deg'"
    [style.--hand-fan-counter-rotation]="handFanCounterRotationDeg() + 'deg'"
    [style.--hand-fan-lift]="handFanLiftPx() + 'px'"
    [style.--hand-fan-splay]="handFanSplayPx() + 'px'"
    [style.--hand-fan-arc]="handFanArcPx() + 'px'"
    [style.--hand-row-distance]="handRowDistance()"
    [style.--land-stack-layer]="landStackLayer()"
    [style.--land-stack-size]="landStackSize()"
    appGameTableDoubleTap
    [appGameTableDoubleTapDisabled]="disabled()"
    (appGameTableDoubleTapped)="onDoubleClick($event)"
    appGameTableLongPress
    (appGameTableLongPressed)="cardMenuOpened.emit({ event: $event, card: currentCard })"
    (pointerdown)="onPointerDown($event)"
    (pointerenter)="onMouseEnter($event, currentCard)"
    (pointermove)="onMouseEnter($event, currentCard)"
    (pointerleave)="onMouseLeave()"
    (click)="onClick($event)"
    (dblclick)="onDoubleClick($event)"
    (contextmenu)="cardMenuOpened.emit({ event: $event, card: currentCard })"
    (dragstart)="onDragStart($event, currentCard)"
    (dragend)="cardDragEnded.emit()"
    (dragover)="cardDragOver.emit({ event: $event, card: currentCard })"
    (drop)="cardDropped.emit({ event: $event, card: currentCard })"
    (mouseenter)="onMouseEnter($event, currentCard)"
    (mouseleave)="onMouseLeave()"
  >
    @if (landStackDropTarget()) {
      <span class="land-stack-preview-badge">
        @if (landStackDropKind() === 'attachment') {
          <lucide-icon class="land-stack-preview-link-icon" name="link" size="18" aria-hidden="true" />
          <span>{{ 'game.gameCardView.attach' | runtimeTranslate }}</span>
        } @else {
          <lucide-icon class="land-stack-preview-stack-icon" name="layers-3" size="18" aria-hidden="true" />
          <span>{{ 'game.gameCardView.stack' | runtimeTranslate }}</span>
        }
      </span>
    }
    <span class="card-visual">
      <app-card-marker-rail
        [showTokenCopyMarker]="currentCard.isTokenCopy === true"
        [showRulingsMarker]="showRulingsMarker()"
        [counters]="visibleCounters()"
        [countersInteractive]="countersEditable()"
        (rulingsRequested)="openRulings($event)"
        (counterChanged)="changeCounter($event)"
        (counterDeleteRequested)="requestCounterDelete($event)"
      />
      @if (image(); as cardImage) {
        <img [src]="cardImage" [alt]="currentCard.name" draggable="false" />
      } @else if (monarchCard()) {
        <span class="monarch-card-visual" aria-label="Monarch">
          <i class="monarch-card-icon ms ms-mechanic ms-ability-role-royal" aria-hidden="true"></i>
          <span class="monarch-card-title">Monarch</span>
        </span>
      } @else {
        <span>{{ fallbackLabel() }}</span>
      }
      @if (showDungeonMarker()) {
        @if (dungeonMarkerPosition(); as marker) {
          <app-dungeon-location-pin
            [marker]="marker"
            [interactive]="true"
            (pointerdown)="onDungeonMarkerPointerDown($event)"
            (pointermove)="onDungeonMarkerPointerMove($event)"
            (pointerup)="onDungeonMarkerPointerUp($event)"
            (pointercancel)="onDungeonMarkerPointerCancel($event)"
            (click)="stopDungeonMarkerEvent($event)"
            (dblclick)="stopDungeonMarkerEvent($event)"
            (contextmenu)="stopDungeonMarkerEvent($event)"
            (dragstart)="stopDungeonMarkerEvent($event)"
          />
        }
      }
      @if (canShowFaceToggle()) {
        <span
          class="double-face-toggle"
          role="button"
          tabindex="-1"
          [attr.aria-label]="'game.gameCardView.lookAtOtherFace' | runtimeTranslate"
          [title]="'game.gameCardView.lookAtOtherFace' | runtimeTranslate"
          draggable="false"
          (pointerdown)="stopFaceTogglePointer($event)"
          (click)="lookAtOtherFace($event)"
          (dblclick)="stopFaceToggleEvent($event)"
          (dragstart)="stopFaceToggleEvent($event)"
        >
          <lucide-icon name="rotate-cw" size="19" aria-hidden="true" />
        </span>
      }
      @if (statsVisible()) {
        <span
          class="power-toughness-overlay"
          [attr.aria-label]="'game.gameCardView.powerAndToughness' | runtimeTranslate"
          [class.stat-pair-pulse-increase]="powerPulse() === 'increase' && toughnessPulse() === 'increase'"
          [class.stat-pair-pulse-decrease]="powerPulse() === 'decrease' && toughnessPulse() === 'decrease'"
        >
          <span
            role="button"
            tabindex="0"
            [title]="'game.gameCardView.powerLeftClickAddsRightClickRemoves' | runtimeTranslate"
            [class.stat-pulse-increase]="powerPulse() === 'increase'"
            [class.stat-pulse-decrease]="powerPulse() === 'decrease'"
            (pointerdown)="stopStatPointer($event)"
            (dblclick)="stopStatDoubleClick($event)"
            (click)="changePower($event, 1)"
            (contextmenu)="changePower($event, -1)"
          >
            {{ powerValue() }}
          </span>
          <span
            role="button"
            tabindex="0"
            [title]="'game.gameCardView.toughnessLeftClickAddsRightClickRemoves' | runtimeTranslate"
            [class.stat-pulse-increase]="toughnessPulse() === 'increase'"
            [class.stat-pulse-decrease]="toughnessPulse() === 'decrease'"
            (pointerdown)="stopStatPointer($event)"
            (dblclick)="stopStatDoubleClick($event)"
            (click)="changeToughness($event, 1)"
            (contextmenu)="changeToughness($event, -1)"
          >
            {{ toughnessValue() }}
          </span>
        </span>
      } @else if (battleVisible()) {
        <app-battle-counter
          [value]="battleValue()!"
          [pulse]="null"
          [entrySettling]="statDropSettling()"
          [rotatedPlacement]="battleRotated()"
          (battleChanged)="changeBattle($event.event, $event.delta)"
        />
      } @else if (sagaVisible()) {
        <app-saga-counter
          [value]="sagaValue()"
          [pulse]="null"
          [entrySettling]="statDropSettling()"
          (sagaChanged)="changeSaga($event.event, $event.delta)"
        />
      } @else if (loyaltyVisible()) {
        <app-loyalty-counter
          [value]="loyaltyValue()!"
          [pulse]="loyaltyPulse()"
          [entrySettling]="statDropSettling()"
          (loyaltyChanged)="changeLoyalty($event.event, $event.delta)"
        />
      }
    </span>
  </button>
}
