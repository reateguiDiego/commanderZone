<div class="community-deck-grid">
  @for (deck of decks(); track deck.id) {
    <app-deck-list-card
      [deck]="deckItem(deck)"
      [commanderBackground]="commanderBackground(deck)"
      [secondaryCommanderBackground]="secondaryCommanderBackground(deck)"
      [colorIdentity]="deck.colorIdentity"
      [hasCommanderArt]="hasCommanderArt(deck)"
      [hasDualCommanderArt]="hasDualCommanderArt(deck)"
      (openDeck)="openDeck(deck.id)"
    />
  }
</div>
