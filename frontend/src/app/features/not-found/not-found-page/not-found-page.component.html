@let page = content();

<main class="not-found-page" [attr.lang]="locale()">
  <section class="not-found-page__panel" aria-labelledby="not-found-title">
    <figure class="not-found-page__media">
      <img [src]="imageSrc" [alt]="page.imageAlt" width="1200" height="630" />
    </figure>

    <div class="not-found-page__content">
      <p class="not-found-page__eyebrow">CommanderZone</p>
      <h1 id="not-found-title">{{ page.title }}</h1>
      <p class="not-found-page__copy">{{ page.description }}</p>

      <a class="primary-button not-found-page__cta" [href]="ctaHref()">
        {{ ctaLabel() }}
      </a>
    </div>
  </section>
</main>
