<div class="table-center-logo">
  <button
    class="brand-mark table-logo-button"
    type="button"
    [attr.aria-label]="'tableAssistant.tableAssistantTableMenu.commanderZoneGameOptions' | runtimeTranslate"
    (click)="toggleMenu()"
  >
    {{ 'tableAssistant.tableAssistantTableMenu.cz' | runtimeTranslate }}
  </button>
  @if (menuOpen()) {
    <div class="table-exit-menu" role="dialog" [attr.aria-label]="'tableAssistant.tableAssistantTableMenu.gameOptions' | runtimeTranslate">
      <button class="menu-action primary" type="button" (click)="selectNewTable()">
        {{ 'tableAssistant.tableAssistantTableMenu.newGame' | runtimeTranslate }}
      </button>
      <button class="menu-action" type="button" (click)="selectRoll()">{{ 'tableAssistant.tableAssistantTableMenu.rollDice' | runtimeTranslate }}</button>
      <button class="menu-action" type="button" (click)="selectFullscreen()">
        {{ 'tableAssistant.tableAssistantTableMenu.fullScreen' | runtimeTranslate }}
      </button>
      <button class="menu-action" type="button" (click)="selectDashboard()">
        {{ 'tableAssistant.tableAssistantTableMenu.exitToDashboard' | runtimeTranslate }}
      </button>
      <button class="menu-action subtle" type="button" (click)="closeMenu()">{{ 'tableAssistant.tableAssistantTableMenu.keepPlaying' | runtimeTranslate }}</button>
    </div>
  }
</div>
