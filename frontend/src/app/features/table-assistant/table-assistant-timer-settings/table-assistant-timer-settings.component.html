<section class="timer-settings" [class.compact]="compact()" aria-label="Temporizador">
  <div class="segmented-control">
    @for (option of timerModes(); track option) {
      <button type="button" [class.active]="timerMode() === option" [attr.aria-pressed]="timerMode() === option" [disabled]="disabled()" (click)="setTimerMode(option)">
        @switch (option) {
          @case ('none') { Sin timer }
          @case ('turn') { Por turno }
          @case ('phase') { Por fase }
        }
      </button>
    }
  </div>

  @if (timerMode() !== 'none' && (durationPickerOpen() || !compact())) {
    <section class="timer-wheel" aria-label="Duracion por turno">
      <div class="wheel-column">
        <span>Min</span>
        <div appPrettyScroll class="wheel-options">
          @for (minutes of timerMinuteOptions; track minutes) {
            <button type="button" [class.selected]="timerDurationMinutes() === minutes" [disabled]="disabled()" (click)="setTimerDurationMinutes(minutes)">{{ minutes }}</button>
          }
        </div>
      </div>
      <div class="wheel-column">
        <span>Seg</span>
        <div appPrettyScroll class="wheel-options">
          @for (seconds of timerSecondOptions; track seconds) {
            <button type="button" [class.selected]="timerDurationRemainderSeconds() === seconds" [disabled]="isSecondOptionDisabled(seconds)" (click)="setTimerDurationRemainderSeconds(seconds)">{{ seconds.toString().padStart(2, '0') }}</button>
          }
        </div>
      </div>
      <strong>{{ timerDurationLabel() }}</strong>
    </section>
  }
</section>
