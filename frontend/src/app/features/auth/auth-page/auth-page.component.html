<main class="auth-screen">
  <section class="auth-panel">
    <div class="auth-copy">
      <span class="brand-mark large">CZ</span>
      <h1>CommanderZone</h1>
      <p>Accede a tu mesa manual de Commander, mazos y salas.</p>
    </div>

    <form class="form-stack" (ngSubmit)="submit()">
      <div class="segmented" role="tablist" aria-label="Auth mode">
        <button type="button" [class.active]="mode() === 'login'" (click)="mode.set('login')">Login</button>
        <button type="button" [class.active]="mode() === 'register'" (click)="mode.set('register')">Register</button>
      </div>

      <label>
        Email
        <input type="email" name="email" autocomplete="email" required [(ngModel)]="email" />
      </label>

      @if (mode() === 'register') {
        <label>
          Display name
          <input type="text" name="displayName" autocomplete="nickname" required [(ngModel)]="displayName" />
        </label>
      }

      <label>
        Password
        <input
          type="password"
          name="password"
          autocomplete="current-password"
          required
          minlength="8"
          [(ngModel)]="password"
        />
      </label>

      @if (auth.error()) {
        <p class="notice error">{{ auth.error() }}</p>
      }

      <button class="primary-button" type="submit" [disabled]="auth.loading()">
        <lucide-icon [name]="mode() === 'login' ? 'log-in' : 'user-plus'" size="18" />
        {{ auth.loading() ? 'Working...' : mode() === 'login' ? 'Login' : 'Create account' }}
      </button>
    </form>
  </section>
</main>
