<main class="auth-screen">
  <section class="auth-panel">
    <div class="auth-copy">
      <img class="auth-logo" src="/assets/icons/CM_logo.png" alt="CommanderZone" />
      <p>Accede a tus mazos, salas y mesa manual de Commander.</p>
    </div>

    <div class="auth-card">
      <div class="segmented" role="tablist" aria-label="Auth mode">
        <button type="button" [class.active]="mode() === 'login'" (click)="setMode('login')">Login</button>
        <button type="button" [class.active]="mode() === 'register'" (click)="setMode('register')">Register</button>
      </div>

      @if (mode() === 'login') {
        <form class="form-stack" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
          <label>
            Email
            <input type="email" autocomplete="email" formControlName="email" />
            @if (loginEmailInvalid()) {
              <span class="field-error">Introduce un email valido.</span>
            }
          </label>

          <label>
            Password
            <div class="password-field">
              <input [type]="loginPasswordVisible() ? 'text' : 'password'" autocomplete="current-password" formControlName="password" />
              <button
                type="button"
                class="password-toggle"
                [attr.aria-label]="loginPasswordVisible() ? 'Ocultar contrasena' : 'Mostrar contrasena'"
                (click)="loginPasswordVisible.set(!loginPasswordVisible())"
              >
                <lucide-icon [name]="loginPasswordVisible() ? 'eye-off' : 'eye'" size="18" />
              </button>
            </div>
          </label>
          <a class="secondary-link" routerLink="/auth/password-reset">He olvidado mi contrasena</a>

          @if (auth.error()) {
            <p class="notice error">{{ auth.error() }}</p>
          }

          <button class="primary-button" type="submit" [disabled]="!canSubmitLogin()">
            <lucide-icon name="log-in" size="18" />
            {{ auth.loading() ? 'Working...' : 'Login' }}
          </button>
        </form>
      } @else {
        <form class="form-stack" [formGroup]="registerForm" (ngSubmit)="submitRegister()">
          <label>
            Email
            <input type="email" autocomplete="email" formControlName="email" />
            @if (registerEmailInvalid()) {
              <span class="field-error">Introduce un email valido.</span>
            }
            @if (registerEmailAvailabilityVisible()) {
              @if (emailAvailability() === 'checking') {
                <span class="availability muted">Comprobando email...</span>
              }
              @if (emailAvailability() === 'available') {
                <span class="availability available"><lucide-icon name="check" size="14" /> Email disponible</span>
              }
              @if (emailAvailability() === 'taken') {
                <span class="availability taken"><lucide-icon name="x" size="14" /> Email ya registrado</span>
              }
              @if (emailAvailability() === 'error') {
                <span class="availability taken"><lucide-icon name="x" size="14" /> No se pudo comprobar ahora</span>
              }
            }
          </label>

          <label>
            User name
            <input type="text" autocomplete="nickname" formControlName="displayName" maxlength="25" />
            @if (controlInvalid('displayName')) {
              <span class="field-error">User name entre 4 y 25 caracteres.</span>
            }
            @if (userNameAvailability() === 'checking') {
              <span class="availability muted">Comprobando disponibilidad...</span>
            }
            @if (userNameAvailability() === 'available') {
              <span class="availability available"><lucide-icon name="check" size="14" /> User name disponible</span>
            }
            @if (userNameAvailability() === 'taken') {
              <span class="availability taken"><lucide-icon name="x" size="14" /> User name no disponible</span>
            }
            @if (userNameAvailability() === 'error') {
              <span class="availability taken"><lucide-icon name="x" size="14" /> No se pudo comprobar ahora</span>
            }
          </label>

          <label>
            Password
            <div class="password-field">
              <input [type]="registerPasswordVisible() ? 'text' : 'password'" autocomplete="new-password" formControlName="password" />
              <button
                type="button"
                class="password-toggle"
                [attr.aria-label]="registerPasswordVisible() ? 'Ocultar contrasena' : 'Mostrar contrasena'"
                (click)="registerPasswordVisible.set(!registerPasswordVisible())"
              >
                <lucide-icon [name]="registerPasswordVisible() ? 'eye-off' : 'eye'" size="18" />
              </button>
            </div>
            @if (controlInvalid('password')) {
              <span class="field-error">Minimo 8 caracteres.</span>
            }
          </label>

          <label>
            Confirmar password
            <div class="password-field">
              <input [type]="registerConfirmPasswordVisible() ? 'text' : 'password'" autocomplete="new-password" formControlName="confirmPassword" />
              <button
                type="button"
                class="password-toggle"
                [attr.aria-label]="registerConfirmPasswordVisible() ? 'Ocultar contrasena' : 'Mostrar contrasena'"
                (click)="registerConfirmPasswordVisible.set(!registerConfirmPasswordVisible())"
              >
                <lucide-icon [name]="registerConfirmPasswordVisible() ? 'eye-off' : 'eye'" size="18" />
              </button>
            </div>
            @if (registerPasswordMismatchVisible()) {
              <span class="field-error">Las contrasenas no coinciden.</span>
            }
          </label>

          @if (auth.error()) {
            <p class="notice error">{{ auth.error() }}</p>
          }

          <button class="primary-button" type="submit" [disabled]="!canSubmitRegister()">
            <lucide-icon name="user-plus" size="18" />
            {{ auth.loading() ? 'Working...' : 'Create account' }}
          </button>
        </form>
      }
    </div>
  </section>
</main>
