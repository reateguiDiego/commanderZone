<main class="demo-room-page">
  <section class="panel demo-room-panel">
    <app-back-button link="/" />
    <span class="eyebrow">{{ 'onboarding.demoRoom.eyebrow' | runtimeTranslate }}</span>
    <h1>{{ roomId() }}</h1>
    <p>{{ 'onboarding.demoRoom.description' | runtimeTranslate }}</p>
    <div class="button-row wrap-row">
      <a czButton="secondary" class="secondary-button" routerLink="/auth/login">{{ 'onboarding.demoRoom.goToLogin' | runtimeTranslate }}</a>
    </div>
  </section>
</main>
