<div class="app-frame">
  <aside class="sidebar">
    <a class="brand" routerLink="/dashboard" aria-label="CommanderZone dashboard">
      <span class="brand-mark">CZ</span>
      <span>
        <strong>CommanderZone</strong>
        <small>Manual Commander table</small>
      </span>
    </a>

    <nav class="nav-list" aria-label="Primary">
      <a routerLink="/decks" routerLinkActive="active">
        <lucide-icon name="layers-3" size="18" />
        Decks
      </a>
      <a routerLink="/rooms" routerLinkActive="active">
        <lucide-icon name="door-open" size="18" />
        Rooms
      </a>
    </nav>
  </aside>

  <main class="workspace">
    <header class="topbar">
      <div>
        <span class="eyebrow">Commander online</span>
        <h1>Game Control</h1>
      </div>

      <div class="user-strip">
        <div class="friends-dropdown" [class.open]="friendsOpen()" (click)="$event.stopPropagation()">
          <button class="friends-trigger" [class.has-requests]="!friendsOpen() && friends.incomingRequestsCount() > 0" type="button" title="Friends" (click)="toggleFriends($event)">
            @if (!friendsOpen() && friends.incomingRequestsCount() > 0) {
              <span class="request-badge" aria-label="Pending friend requests">
                <lucide-icon name="bell" size="12" />
                {{ friends.incomingRequestsCount() }}
              </span>
            }
            <lucide-icon name="circle-user-round" size="18" />
            <span>{{ auth.user()?.displayName || auth.user()?.email || 'Player' }}</span>
            @if (!friendsOpen() && friends.onlineFriendsCount() > 0) {
              <span class="online-badge" aria-label="Online friends">{{ friends.onlineFriendsCount() }}</span>
            }
          </button>
          @if (friendsOpen()) {
            <app-friends-dropdown />
          }
        </div>

        <button class="icon-button" type="button" title="Logout" (click)="logout()">
          <lucide-icon name="log-out" size="18" />
        </button>
      </div>
    </header>

    <router-outlet />
  </main>
</div>
