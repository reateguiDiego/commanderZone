<div class="user-strip">
  <div class="friends-dropdown" [class.open]="friendsOpen()" (click)="$event.stopPropagation()">
    <button
      class="friends-trigger"
      [class.has-requests]="!friendsOpen() && pendingNotificationsCount() > 0"
      type="button"
      [title]="'navigation.dashboard.dashboardHeaderControls.friends' | runtimeTranslate"
      (click)="toggleFriends.emit($event)"
    >
      @if (!friendsOpen() && pendingNotificationsCount() > 0) {
        <span class="request-badge" [attr.aria-label]="'navigation.dashboard.dashboardHeaderControls.pendingFriendRequests' | runtimeTranslate">
          <lucide-icon name="bell" size="12" />
          {{ pendingNotificationsCount() }}
        </span>
      }
      <app-player-avatar class="friends-trigger-avatar" [displayName]="userLabel()" [avatar]="userAvatar()" size="sm" />
      <app-player-name
        [displayName]="userLabel()"
        [nameStyle]="userNameStyle()"
        size="sm"
        plateSize="xs"
        [fill]="true"
      />
      @if (!friendsOpen() && onlineFriendsCount() > 0) {
        <span class="online-badge" [attr.aria-label]="'navigation.dashboard.dashboardHeaderControls.onlineFriends' | runtimeTranslate">{{ onlineFriendsCount() }}</span>
      }
    </button>
    @if (friendsOpen()) {
      <app-friends-dropdown />
    }
  </div>

  <app-header-user-menu
    (settingsSelected)="openSettings()"
    (fullscreenSelected)="toggleFullscreen()"
    (logoffSelected)="logoff()"
  />
</div>

<app-dashboard-settings-modal
  [open]="settingsOpen()"
  (closeRequested)="closeSettings()"
  (accountDeleted)="logoff()"
/>
