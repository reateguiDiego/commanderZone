<div class="header-menu-dropdown">
  <button
    class="icon-button"
    type="button"
    title="Menu"
    aria-label="Header menu"
    [attr.aria-expanded]="menuOpen()"
    (click)="toggleMenu()"
  >
    <lucide-icon name="menu" size="18" />
  </button>

  @if (menuOpen()) {
    <section class="header-menu-panel" role="menu" aria-label="User menu">
      <button class="menu-item" type="button" role="menuitem" (click)="selectSettings()">Settings</button>

      <button
        class="menu-item with-detail"
        type="button"
        role="menuitem"
        [attr.aria-expanded]="languagePickerOpen()"
        (click)="toggleLanguagePicker()"
      >
        <span>Language</span>
        <span class="menu-item-detail">{{ selectedLanguageLabel() }}</span>
        <lucide-icon name="chevron-right" size="14" [class.expanded]="languagePickerOpen()" />
      </button>

      @if (languagePickerOpen()) {
        <div class="language-list" role="group" aria-label="Language options">
          @for (language of languages; track language.code) {
            <button
              class="language-item"
              type="button"
              [class.selected]="selectedLanguage() === language.code"
              (click)="selectLanguage(language.code)"
            >
              <span>{{ language.label }}</span>
              @if (selectedLanguage() === language.code) {
                <lucide-icon name="check" size="14" />
              }
            </button>
          }
        </div>
      }

      <button class="menu-item danger" type="button" role="menuitem" (click)="selectLogoff()">Log off</button>
    </section>
  }
</div>
