<section class="name-style-editor">
  <header class="name-style-preview" [attr.aria-label]="'settings.settingsDisplayNameStyleEditor.nameStylePreview' | runtimeTranslate">
    <span>{{ 'settings.settingsDisplayNameStyleEditor.currentSelection' | runtimeTranslate }}</span>
    <app-player-name [displayName]="displayName()" [nameStyle]="previewStyle()" size="lg" plateSize="lg" />
    <label class="name-color-picker">
      {{ 'settings.settingsDisplayNameStyleEditor.textColor' | runtimeTranslate }}
      <input type="color" [value]="previewTextColor()" [disabled]="saving()" (input)="updateTextColor($any($event.target).value)" />
    </label>
  </header>

  <section class="style-options">
    <nav class="style-tier-tabs" [attr.aria-label]="'settings.settingsDisplayNameStyleEditor.nameStyleTiers' | runtimeTranslate">
      <button type="button" [class.active]="activeTier() === 'basic'" (click)="switchTier('basic')">{{ 'settings.settingsDisplayNameStyleEditor.basic' | runtimeTranslate }}</button>
      <button type="button" [class.active]="activeTier() === 'premium'" (click)="switchTier('premium')">{{ 'settings.settingsDisplayNameStyleEditor.premium' | runtimeTranslate }}</button>
    </nav>

    <div class="style-grid" [class.premium-grid]="activeTier() === 'premium'">
      @for (option of visiblePresetOptions(); track option.preset.id) {
        <button
          type="button"
          class="style-card"
          [class.selected]="previewPreset().id === option.preset.id"
          [class.premium]="option.preset.tier === 'premium'"
          [disabled]="saving()"
          (click)="choosePreset(option.preset)"
        >
          <app-player-name
            [displayName]="displayName()"
            [nameStyle]="option.style"
            size="md"
            plateSize="md"
          />
          @if (option.preset.tier === 'premium') {
            <span class="premium-badge">{{ 'settings.settingsDisplayNameStyleEditor.premium' | runtimeTranslate }}</span>
          }
        </button>
      }
    </div>
  </section>

  <footer class="name-style-actions">
    <button czButton="primary" class="primary-button" type="button" [disabled]="!canSave()" (click)="save()">
      {{ saving() ? 'Saving...' : 'Save' }}
    </button>
  </footer>
</section>
