<section class="initial-avatar-option" [class.selected]="active()" (click)="openControls($event)">
  <button
    type="button"
    class="initial-avatar-select"
    [disabled]="disabled()"
  >
    <span
      class="initial-avatar-bubble"
      [style.background]="backgroundColor()"
      [style.color]="textColor()"
    >
      {{ letter() }}
    </span>
  </button>

  @if (selected() && controlsOpen()) {
    <div class="initial-avatar-controls" [attr.aria-label]="'settings.settingsInitialAvatarOption.initialAvatarCustomization' | runtimeTranslate">
      <label>
        <span>{{ 'settings.settingsInitialAvatarOption.mainColor' | runtimeTranslate }}</span>
        <input
          type="color"
          [value]="backgroundColor()"
          [disabled]="disabled()"
          (input)="backgroundColorChanged.emit($any($event.target).value)"
        />
      </label>
      <label>
        <span>{{ 'settings.settingsInitialAvatarOption.secondaryColor' | runtimeTranslate }}</span>
        <input
          type="color"
          [value]="textColor()"
          [disabled]="disabled()"
          (input)="textColorChanged.emit($any($event.target).value)"
        />
      </label>
      <label class="letter-field">
        <span>{{ 'settings.settingsInitialAvatarOption.letters' | runtimeTranslate }}</span>
        <input
          type="text"
          maxlength="2"
          autocomplete="off"
          [value]="letter()"
          [disabled]="disabled()"
          (input)="letterChanged.emit($any($event.target).value)"
        />
      </label>
    </div>
  }
</section>
