<section class="panel">
  <div class="tool-header compact-header">
    <div>
      <span class="eyebrow">Invites</span>
      <h3>Pending room invites</h3>
    </div>
  </div>
  <div appPrettyScroll class="dense-list compact-list invites-list">
    @for (invite of invites(); track invite.id) {
      <div class="list-row invite-row">
        <span>
          <strong>{{ invite.sender.displayName }}</strong>
          <small>{{ invite.room.visibility }} - {{ invite.room.players.length }} players</small>
        </span>
        <div class="invite-actions">
          <button class="primary-button compact" type="button" (click)="accepted.emit(invite)">Accept</button>
          <button class="secondary-button compact" type="button" (click)="declined.emit(invite)">Decline</button>
        </div>
      </div>
    }
  </div>
</section>
