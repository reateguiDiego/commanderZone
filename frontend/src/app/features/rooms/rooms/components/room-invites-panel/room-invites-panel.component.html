<section class="panel">
  <div class="tool-header compact-header">
    <div>
      <span class="eyebrow">{{ 'rooms.roomInvitesPanel.invites' | runtimeTranslate }}</span>
      <h3>{{ 'rooms.roomInvitesPanel.pendingRoomInvites' | runtimeTranslate }}</h3>
    </div>
  </div>
  <div appPrettyScroll class="dense-list compact-list invites-list">
    @for (invite of invites(); track invite.id) {
      <div class="list-row invite-row">
        <span>
          <app-player-name
            [displayName]="invite.sender.displayName"
            [nameStyle]="invite.sender.displayNameStyle"
            size="md"
            plateSize="sm"
          />
          <small>{{ invite.room.visibility }} - {{ invite.room.players.length }} players</small>
        </span>
        <div class="invite-actions">
          <button czButton="primary" czButtonSize="sm" class="primary-button compact" type="button" (click)="accepted.emit(invite)">{{ 'rooms.roomInvitesPanel.accept' | runtimeTranslate }}</button>
          <button czButton="secondary" czButtonSize="sm" class="secondary-button compact" type="button" (click)="declined.emit(invite)">{{ 'rooms.roomInvitesPanel.decline' | runtimeTranslate }}</button>
        </div>
      </div>
    }
  </div>
</section>
