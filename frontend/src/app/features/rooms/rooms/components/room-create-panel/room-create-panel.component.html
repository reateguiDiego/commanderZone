<aside class="panel rooms-create-panel">
  <div class="room-code-card" [class.has-code-input]="joinCodeInputOpen()">
    <span class="action-tooltip-anchor" [attr.title]="actionsLocked() ? lockedRoomTooltip : null">
      <button czButton="primary" class="primary-button room-action-button" type="button" [disabled]="actionsLocked()" (click)="joinByCode()">
        <lucide-icon name="search" size="16" />
        Join with code
      </button>
    </span>

    @if (joinCodeInputOpen()) {
      <input
        name="roomCode"
        placeholder="Enter room code"
        [value]="roomCode()"
        (input)="setRoomCode($event)"
        (keydown.enter)="joinByCode()"
      />
    }
  </div>

  <div class="rooms-create-header">
    <span class="eyebrow">{{ 'rooms.roomCreatePanel.createANewRoom' | runtimeTranslate }}</span>
    <h3>{{ 'rooms.roomCreatePanel.roomSetup' | runtimeTranslate }}</h3>
  </div>

  <span class="action-tooltip-anchor" [attr.title]="actionsLocked() ? lockedRoomTooltip : null">
    <button czButton="primary" class="primary-button room-action-button" type="button" [disabled]="actionsLocked()" (click)="requestCreate()">
      <lucide-icon name="plus" size="17" />
      {{ 'rooms.roomCreatePanel.createRoom' | runtimeTranslate }}
    </button>
  </span>
</aside>
