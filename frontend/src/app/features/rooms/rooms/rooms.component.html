<section class="page-stack">
  <div class="rooms-shell">
    <div class="rooms-main">
      @if (error()) {
        <p class="notice error">{{ error() }}</p>
      }

      @if (incomingInvites().length > 0) {
        <app-room-invites-panel
          [invites]="incomingInvites()"
          (accepted)="acceptInvite($event)"
          (declined)="declineInvite($event)"
        />
      }

      <app-room-browser
        [rooms]="rooms()"
        [formats]="formats()"
        [currentUserId]="auth.user()?.id ?? null"
        [currentRoomId]="currentRoom()?.id ?? null"
        [currentRoom]="currentRoom()"
        [currentRoomPlayer]="currentRoomPlayer()"
        [currentRoomTurn]="currentRoomTurn()"
        [currentRoomViewerRole]="currentRoomViewerRole()"
        [deletingRoomId]="deletingRoomId()"
        [leavingRoomId]="leavingRoomId()"
        (listedRoomOpened)="openListedRoom($event)"
        (currentRoomLeaveRequested)="leaveCurrentRoom($event)"
        (leaveRequested)="leaveRoom($event)"
        (deleteRequested)="requestDeleteRoom($event)"
      />
    </div>

    <app-room-create-panel
      [formats]="formats()"
      [actionsLocked]="currentRoom() !== null"
      (codeJoinRequested)="joinRoomByCode($event)"
      (roomCreated)="createRoom($event)"
    />
  </div>

  <app-modal
    [open]="roomPendingDelete() !== null"
    title="Borrar sala"
    message="Esta accion no se puede deshacer."
    primaryLabel="Borrar"
    secondaryLabel="Cancelar"
    [danger]="true"
    (primary)="confirmDeleteRoom()"
    (secondary)="cancelDeleteRoom()"
  >
    @if (roomPendingDelete(); as room) {
      <p class="notice">Sala {{ room.name }}</p>
    }
  </app-modal>

  <app-modal
    [open]="createDeckRequiredModalOpen()"
    title="Mazo requerido"
    message="Necesitas un mazo valido para crear una sala."
    primaryLabel="Entendido"
    secondaryLabel="Cerrar"
    (primary)="closeCreateDeckRequiredModal()"
    (secondary)="closeCreateDeckRequiredModal()"
  />

</section>
