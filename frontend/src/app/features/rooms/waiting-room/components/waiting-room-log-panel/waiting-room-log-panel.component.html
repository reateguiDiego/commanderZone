<aside class="room-log-panel">
  <header>
    <strong>{{ 'rooms.waitingRoomLogPanel.activity' | runtimeTranslate }}</strong>
  </header>

  <section appPrettyScroll class="room-log" [attr.aria-label]="'rooms.waitingRoomLogPanel.activity' | runtimeTranslate">
    @if (entries().length > 0) {
      @for (entry of entries(); track entry.id) {
        <article class="room-log-entry" [class.success]="entry.tone === 'success'">
          <span>{{ entryTime(entry) }}</span>
          <strong>{{ entry.label }}</strong>
        </article>
      }
    } @else {
      <p class="muted">{{ 'rooms.waitingRoomLogPanel.roomEventsWillAppearHere' | runtimeTranslate }}</p>
    }
  </section>
</aside>
