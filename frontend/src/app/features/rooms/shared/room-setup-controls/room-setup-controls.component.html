<div class="setup-controls">
  <app-game-setup-life-control
    label="Total life"
    summary=""
    [value]="startingLife()"
    [step]="startingLifeStep()"
    [disabled]="disabled() || updatingStartingLife()"
    (valueChange)="startingLifeChange.emit($event)"
  />

  <div class="setup-control timer-control">
    <div class="control-copy">
      <span class="eyebrow">{{ 'rooms.roomSetupControls.timer' | runtimeTranslate }}</span>
      <strong>{{ timerSummary() }}</strong>
    </div>
    <app-table-assistant-timer-settings
      [compact]="true"
      [timerMode]="timerMode()"
      [timerDurationSeconds]="timerDurationSeconds()"
      [timerModes]="['none', 'turn']"
      [disabled]="disabled() || updatingTimer()"
      (timerModeChange)="changeTimerMode($event)"
      (timerDurationSecondsChange)="timerDurationSecondsChange.emit($event)"
    />
  </div>

  <app-game-setup-seats-control
    label="Seats"
    [value]="maxPlayers()"
    [minimumValue]="minimumPlayers()"
    [options]="maxPlayersOptions()"
    [disabled]="disabled() || updatingCapacity()"
    (valueChange)="maxPlayersChange.emit($event)"
  />

  <div class="setup-control mulligan-control">
    <div class="mulligan-select-field">
      <app-format-select
        name="mulliganRule"
        [label]="'rooms.roomSetupControls.mulligan' | runtimeTranslate"
        [formats]="mulliganSelectOptions()"
        [value]="mulliganRule()"
        [disabled]="disabled() || updatingMulligan()"
        (valueChange)="changeMulliganRule($event)"
      />
      <p class="mulligan-description">{{ mulliganDescriptionKey() | runtimeTranslate }}</p>
    </div>

    <div class="mulligan-toggle-field">
      <span class="mulligan-toggle-label">{{ 'rooms.roomSetupControls.firstMulliganFree' | runtimeTranslate }}</span>
      <button
        type="button"
        class="mulligan-toggle-button"
        [class.is-on]="firstMulliganFree()"
        [attr.aria-pressed]="firstMulliganFree()"
        [disabled]="disabled() || updatingMulligan()"
        (click)="firstMulliganFreeChange.emit(!firstMulliganFree())"
      >
        <span class="mulligan-toggle-track" aria-hidden="true">
          <span class="mulligan-toggle-thumb"></span>
        </span>
        <span class="mulligan-toggle-state">
          {{ (firstMulliganFree() ? 'rooms.roomSetupControls.firstMulliganFreeOn' : 'rooms.roomSetupControls.firstMulliganFreeOff') | runtimeTranslate }}
        </span>
      </button>
    </div>
  </div>
</div>
