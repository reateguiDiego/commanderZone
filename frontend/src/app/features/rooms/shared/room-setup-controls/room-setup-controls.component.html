<div class="setup-controls">
  <app-game-setup-life-control
    label="Total life"
    summary=""
    [value]="startingLife()"
    [step]="startingLifeStep()"
    [disabled]="disabled() || updatingStartingLife()"
    (valueChange)="startingLifeChange.emit($event)"
  />

  <div class="setup-control timer-control">
    <div class="control-copy">
      <span class="eyebrow">{{ 'rooms.roomSetupControls.timer' | runtimeTranslate }}</span>
      <strong>{{ timerSummary() }}</strong>
    </div>
    <app-table-assistant-timer-settings
      [compact]="true"
      [timerMode]="timerMode()"
      [timerDurationSeconds]="timerDurationSeconds()"
      [timerModes]="['none', 'turn']"
      [disabled]="disabled() || updatingTimer()"
      (timerModeChange)="changeTimerMode($event)"
      (timerDurationSecondsChange)="timerDurationSecondsChange.emit($event)"
    />
  </div>

  <app-game-setup-seats-control
    label="Seats"
    [value]="maxPlayers()"
    [minimumValue]="minimumPlayers()"
    [options]="maxPlayersOptions()"
    [disabled]="disabled() || updatingCapacity()"
    (valueChange)="maxPlayersChange.emit($event)"
  />

  <div class="setup-control mulligan-control">
    <label class="mulligan-select-field">
      <span class="eyebrow">Mulligan</span>
      <select
        #mulliganRuleSelect
        [value]="mulliganRule()"
        [disabled]="disabled() || updatingMulligan()"
        (change)="changeMulliganRule(mulliganRuleSelect.value)"
      >
        @for (option of mulliganOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>

    <label class="mulligan-checkbox-field">
      <input
        #firstMulliganFreeInput
        type="checkbox"
        [checked]="firstMulliganFree()"
        [disabled]="disabled() || updatingMulligan()"
        (change)="firstMulliganFreeChange.emit(firstMulliganFreeInput.checked)"
      />
      <span>Primer mulligan es gratis</span>
    </label>
  </div>
</div>
