<article
  class="deck-list-row deck-row-clickable"
  [class.has-commander-art]="hasCommanderArt()"
  [class.has-dual-commander-art]="hasDualCommanderArt()"
  [style.--deck-commander-art]="commanderBackground()"
  [style.--deck-secondary-commander-art]="secondaryCommanderBackground()"
  role="link"
  tabindex="0"
  (click)="open($event)"
  (keydown.enter)="open($event)"
>
  @if (hasDualCommanderArt()) {
    <div class="deck-dual-commander-art" aria-hidden="true">
      <div class="deck-dual-commander-art-pane deck-dual-commander-art-pane-primary"></div>
      <div class="deck-dual-commander-art-pane deck-dual-commander-art-pane-secondary"></div>
    </div>
  }

  <div class="deck-card-topline">
    <strong>{{ deck().name }}</strong>
    @if (colorIdentity(); as colors) {
      <app-mana-symbols class="deck-commander-colors" [symbols]="colors" fallback="deckBuilder.deckList.colorFilter.colorless" size="small" />
    }
  </div>

  <div class="deck-card-footer">
    <app-tooltip [text]="visibilityLabelKey(deck().visibility) | runtimeTranslate">
      <span
        class="visibility-pill"
        [class.public]="deck().visibility === 'public'"
        [attr.aria-label]="visibilityLabelKey(deck().visibility) | runtimeTranslate"
      >
        <lucide-icon [name]="visibilityIcon(deck().visibility)" size="13" aria-hidden="true" />
        <span class="visibility-pill-label">{{ visibilityPillLabelKey(deck().visibility) | runtimeTranslate }}</span>
      </span>
    </app-tooltip>
    @if (hasIssues()) {
      <div class="deck-card-status">
        <app-tooltip [text]="issueTooltip()">
          <span class="deck-list-warning" [attr.aria-label]="'community.shared.deckWarnings' | runtimeTranslate">
            <lucide-icon name="triangle-alert" size="16" />
          </span>
        </app-tooltip>
      </div>
    }
  </div>
</article>
