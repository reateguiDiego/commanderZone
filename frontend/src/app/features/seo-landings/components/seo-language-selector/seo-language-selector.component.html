<details class="seo-language-selector" [open]="menuOpen()" (toggle)="syncMenuState($event)">
  <summary class="seo-language-selector__trigger" [attr.aria-label]="copy().ariaLabel">
    <span class="seo-language-selector__label">{{ copy().label }}</span>
    <img
      class="seo-language-selector__flag"
      [src]="flagIcon(currentLink().locale)"
      alt=""
      aria-hidden="true"
      width="24"
      height="24"
      decoding="async"
    />
  </summary>

  <nav class="seo-language-selector__menu app-pretty-scroll" [attr.aria-label]="copy().ariaLabel">
    @for (link of links(); track link.locale) {
      <a
        appSeoInternalLink
        class="seo-language-selector__link"
        [class.is-current]="isCurrentLocale(link.locale)"
        [href]="link.href"
        [attr.hreflang]="link.locale"
        [attr.aria-label]="link.ariaLabel"
        [attr.aria-current]="isCurrentLocale(link.locale) ? 'page' : null"
      >
        <span class="seo-language-selector__option">
          <img
            class="seo-language-selector__flag"
            [src]="flagIcon(link.locale)"
            alt=""
            aria-hidden="true"
            width="24"
            height="24"
            decoding="async"
          />
          <span>{{ link.label }}</span>
        </span>
        @if (isCurrentLocale(link.locale)) {
          <span class="seo-language-selector__current-mark" aria-hidden="true"></span>
        }
      </a>
    }
  </nav>
</details>
