<section class="landing-faq-preview" [attr.id]="content().id || null">
  <div class="landing-faq-preview__header">
    <h2>{{ content().title }}</h2>
    @if (content().intro) {
      <p>{{ content().intro }}</p>
    }
  </div>

  <div class="landing-faq-preview__grid">
    @for (item of content().items; track item.question) {
      <article>
        <h3>{{ item.question }}</h3>
        <p>{{ item.answer[0] }}</p>
      </article>
    }
  </div>
</section>
