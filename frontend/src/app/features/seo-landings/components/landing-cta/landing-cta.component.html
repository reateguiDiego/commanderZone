<section class="landing-cta" [attr.id]="content().id || null">
  <div>
    <h2>{{ content().title }}</h2>
    <p>{{ content().description }}</p>
  </div>

  <nav class="landing-cta__actions" aria-label="Landing call to action">
    <a czButton="primary" appSeoInternalLink class="primary-button" [href]="content().primaryLink.href" [attr.aria-label]="content().primaryLink.ariaLabel">
      {{ content().primaryLink.label }}
    </a>

    @if (content().secondaryLink; as secondaryLink) {
      <a czButton="primary" appSeoInternalLink class="primary-button" [href]="secondaryLink.href" [attr.aria-label]="secondaryLink.ariaLabel">
        {{ secondaryLink.label }}
      </a>
    }
  </nav>
</section>
