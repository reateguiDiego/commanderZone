<section class="landing-use-cases" [attr.id]="content().id || null">
  <div class="landing-use-cases__header">
    <h2>{{ content().title }}</h2>
    @if (content().intro) {
      <p>{{ content().intro }}</p>
    }
  </div>

  <div class="landing-use-cases__grid">
    @for (useCase of content().useCases; track useCase.title) {
      <article class="landing-use-case">
        <h3>{{ useCase.title }}</h3>
        <p>{{ useCase.description }}</p>
        @if (useCase.link; as link) {
          <a appSeoInternalLink [href]="link.href" [attr.aria-label]="link.ariaLabel">{{ link.label }}</a>
        }
      </article>
    }
  </div>
</section>
