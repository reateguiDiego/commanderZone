<div class="app-route-frame" [class.app-route-frame-with-noindex-disclaimer]="showNoindexFooterDisclaimer()">
  <router-outlet />
</div>

@if (showFooterDisclaimer()) {
  <app-footer-disclaimer />
}

@if (showNoindexFooterDisclaimer()) {
  <app-noindex-footer-disclaimer />
}

<app-cookie-consent-banner />

@if (showGlobalLoading()) {
  <div class="global-loader" role="status" aria-live="polite" aria-label="Loading">
    <div class="spinner"></div>
  </div>
}
