<div class="app-route-frame">
  <router-outlet />
</div>

@if (showDisclaimer()) {
  <app-footer-disclaimer />
}

@if (showNoindexDisclaimer()) {
  <app-noindex-footer-disclaimer />
}

<app-cookie-consent-banner />

@if (showGlobalLoading()) {
  <div class="global-loader" role="status" aria-live="polite" [attr.aria-label]="'common.app.app.loading' | runtimeTranslate">
    <div class="spinner"></div>
  </div>
}
