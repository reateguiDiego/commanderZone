<footer class="app-disclaimer">
  <div class="app-disclaimer-content">
    <h2>{{ copy().disclaimer.heading }}</h2>

    <p>{{ copy().disclaimer.text }}</p>
    <p>{{ copy().disclaimer.copyright }}</p>

    <nav class="app-disclaimer-links" [attr.aria-label]="copy().footer.ariaLabel">
      @for (link of links(); track link.href) {
        <a [href]="link.href">{{ link.label }}</a>
      }
      <button type="button" class="app-disclaimer-link-button app-disclaimer-link-button--cookies" data-cz-cookie-preferences (click)="openCookiePreferences()">
        {{ copy().cookieBanner.managePreferences }}
      </button>
    </nav>
  </div>
</footer>
