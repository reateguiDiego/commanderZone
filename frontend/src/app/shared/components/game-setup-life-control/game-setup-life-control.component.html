<div class="setup-control life-control">
  <div class="control-copy">
    <span class="eyebrow">{{ label() }}</span>
    @if (summary()) {
      <strong>{{ summary() }}</strong>
    }
  </div>
  <div class="life-editor" aria-label="Starting life">
    <button
      type="button"
      class="life-step-button"
      [disabled]="decreaseDisabled()"
      aria-label="Decrease starting life"
      (click)="decrease()"
    >
      -
    </button>
    <span class="life-value-button" aria-live="polite">
      {{ value() }}
    </span>
    <button
      type="button"
      class="life-step-button"
      [disabled]="increaseDisabled()"
      aria-label="Increase starting life"
      (click)="increase()"
    >
      +
    </button>
  </div>
</div>
