<div class="setup-control life-control" [class.has-presets]="hasPresets()">
  <div class="control-copy">
    @if (hasPresets()) {
      <span class="label-accent" aria-hidden="true"></span>
    }
    <span class="eyebrow">{{ label() | runtimeTranslate }}</span>
    @if (hasPresets()) {
      <span class="label-accent" aria-hidden="true"></span>
    }
    @if (summary()) {
      <strong>{{ summary() | runtimeTranslate }}</strong>
    }
  </div>
  <div class="life-editor" [attr.aria-label]="'rooms.setup.gameSetupLifeControl.startingLife' | runtimeTranslate">
    <button
      type="button"
      class="life-step-button"
      [disabled]="decreaseDisabled()"
      [attr.aria-label]="'rooms.setup.gameSetupLifeControl.decreaseStartingLife' | runtimeTranslate"
      (click)="decrease()"
    >
      <lucide-icon name="minus" size="16" aria-hidden="true" />
    </button>
    <span class="life-value-button" aria-live="polite">
      <span class="life-value">{{ value() }}</span>
      <span class="life-unit">{{ 'rooms.setup.gameSetupLifeControl.lifeUnit' | runtimeTranslate }}</span>
    </span>
    <button
      type="button"
      class="life-step-button"
      [disabled]="increaseDisabled()"
      [attr.aria-label]="'rooms.setup.gameSetupLifeControl.increaseStartingLife' | runtimeTranslate"
      (click)="increase()"
    >
      <lucide-icon name="plus" size="16" aria-hidden="true" />
    </button>
  </div>

  @if (hasPresets()) {
    <div class="life-presets" [attr.aria-label]="'rooms.setup.gameSetupLifeControl.startingLifePresets' | runtimeTranslate">
      @for (preset of presets(); track preset) {
        <button
          type="button"
          class="life-preset-button"
          [class.is-selected]="preset === value()"
          [disabled]="disabled()"
          (click)="selectPreset(preset)"
        >
          {{ preset }}
        </button>
      }
    </div>
  }
</div>
