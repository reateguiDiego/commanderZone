@if (imageUrl(); as image) {
  <img class="card-face-image__visual" [src]="image" [alt]="altText()" [loading]="loading()" />
} @else {
  <span class="card-face-image__visual card-face-image__fallback">{{ displayName() }}</span>
}

@if (hasAlternateFace()) {
  <button
    class="card-face-image__toggle"
    type="button"
    [title]="'deckBuilder.cards.cardImage.flipFace' | runtimeTranslate"
    [attr.aria-label]="'deckBuilder.cards.cardImage.flipFace' | runtimeTranslate"
    (pointerdown)="stopPointer($event)"
    (click)="toggleFace($event)"
  >
    <lucide-icon name="rotate-cw" size="15" aria-hidden="true" />
  </button>
}
