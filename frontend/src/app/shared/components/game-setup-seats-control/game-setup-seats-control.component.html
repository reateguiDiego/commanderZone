<div class="setup-control seats-control">
  <div class="control-copy">
    <span class="eyebrow">{{ label() | runtimeTranslate }}</span>
    <strong>{{ value() }}</strong>
  </div>
  <div class="capacity-editor" [attr.aria-label]="'rooms.setup.gameSetupSeatsControl.tableSize' | runtimeTranslate">
    @for (option of options(); track option) {
      <button
        type="button"
        [class.selected]="value() === option"
        [disabled]="disabled() || option < minimumValue()"
        [attr.aria-label]="'rooms.setup.gameSetupSeatsControl.setTableSizeToPlayers' | runtimeTranslate: { count: option }"
        (click)="selectValue(option)"
      >
        {{ option }}
      </button>
    }
  </div>
</div>
