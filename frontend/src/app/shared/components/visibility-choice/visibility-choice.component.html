<div class="visibility-choice">
  <p class="visibility-choice__label">
    {{ label | runtimeTranslate }}
    @if (required) {
      <span class="required-mark" aria-hidden="true">*</span>
    }
  </p>
  <div class="visibility-choice__group">
    @for (option of options; track option) {
      <button
        type="button"
        class="visibility-choice__button"
        [class.visibility-choice__button--public]="option === 'public'"
        [class.visibility-choice__button--private]="option === 'private'"
        [class.is-selected]="value === option"
        (click)="choose(option)"
      >
        <span class="visibility-choice__main">
          @if (option === 'public') {
            <lucide-icon name="globe" size="14" />
            <span czTextFit czTextFitMinScale="0.78">{{ 'common.visibility.visibilityChoice.public' | runtimeTranslate }}</span>
          } @else {
            <lucide-icon name="lock" size="14" />
            <span czTextFit czTextFitMinScale="0.78">{{ 'common.visibility.visibilityChoice.private' | runtimeTranslate }}</span>
          }
        </span>
        <small class="visibility-choice__subtitle">{{ subtitle(option) | runtimeTranslate }}</small>
      </button>
    }
  </div>
</div>
