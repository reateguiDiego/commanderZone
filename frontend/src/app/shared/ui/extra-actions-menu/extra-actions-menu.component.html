<div
  class="extra-actions"
  [class.extra-actions-open]="open()"
  [class.variant-compact]="variant() === 'compact'"
  [class.variant-gold]="variant() === 'gold'"
  [class.has-label]="showText()"
  [class.align-left]="align() === 'left'"
  [class.align-center]="align() === 'center'"
  [class.align-right]="align() === 'right'"
  [class.viewport-safe]="viewportSafe()"
>
  <button
    type="button"
    class="extra-actions-toggle"
    [attr.aria-label]="ariaLabel() | runtimeTranslate"
    [attr.aria-expanded]="open()"
    (click)="toggle($event)"
  >
    <lucide-icon [name]="icon()" size="17" aria-hidden="true" />
    @if (showText()) {
      <span>{{ label() | runtimeTranslate }}</span>
    }
  </button>

  @if (open()) {
    <div
      class="extra-actions-panel"
      role="menu"
      [attr.aria-label]="menuLabel() | runtimeTranslate"
      [style.left.px]="viewportPanelStyle()?.left"
      [style.top.px]="viewportPanelStyle()?.top"
      [style.width.px]="viewportPanelStyle()?.width"
      [style.max-height]="viewportPanelMaxHeight()"
      (click)="stopMenuClick($event)"
      (contextmenu)="stopMenuContextMenu($event)"
    >
      <ng-content />
    </div>
  }
</div>
