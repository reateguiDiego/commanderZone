<nav
  class="tab-list"
  [class.variant-pill]="variant() === 'pill'"
  [class.variant-underline]="variant() === 'underline'"
  role="tablist"
  [attr.aria-label]="ariaLabel() ? (ariaLabel() | runtimeTranslate) : null"
>
  @for (item of items(); track item.id) {
    <button
      class="tab-list-button"
      type="button"
      role="tab"
      [class.active]="activeId() === item.id"
      [class.attention]="item.attention"
      [class.align-end]="item.alignEnd"
      [disabled]="item.disabled"
      [attr.aria-selected]="activeId() === item.id"
      [attr.aria-label]="item.ariaLabel ? (item.ariaLabel | runtimeTranslate) : null"
      [attr.title]="item.title ? (item.title | runtimeTranslate) : null"
      (click)="selectTab(item)"
    >
      @if (item.icon) {
        <lucide-icon [name]="item.icon" [size]="iconSize()" aria-hidden="true" />
      }
      <span class="tab-list-label" [class.is-visually-hidden]="item.labelHidden">{{ item.label | runtimeTranslate }}</span>
      @if (item.badge !== undefined && item.badge !== null) {
        <span class="tab-list-badge" [class.attention]="item.attention">{{ item.badge }}</span>
      }
    </button>
  }
</nav>
