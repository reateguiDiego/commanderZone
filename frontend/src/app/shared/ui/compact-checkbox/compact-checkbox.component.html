<label
  class="compact-checkbox"
  [class.compact-checkbox--multiline]="multiline()"
  [class.compact-checkbox--accent]="accentRgb()"
  [style.--compact-checkbox-accent-rgb]="accentRgb()"
  [title]="title()"
>
  <input
    type="checkbox"
    [attr.name]="name()"
    [checked]="checked()"
    [disabled]="disabled()"
    (change)="updateChecked($event)"
  />
  <span class="compact-checkbox__box" aria-hidden="true"></span>
  @if (swatch()) {
    <span class="compact-checkbox__swatch" aria-hidden="true"></span>
  }
  <ng-content select="[compactCheckboxPrefix]" />
  <span class="compact-checkbox__label">{{ label() }}</span>
</label>
