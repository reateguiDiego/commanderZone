@if (open) {
  <div class="modal-backdrop" role="presentation">
    <section class="modal-panel" appPrettyScroll role="dialog" aria-modal="true" [attr.aria-label]="title">
      <header>
        <h2>{{ title }}</h2>
        @if (message) {
          <p>{{ message }}</p>
        }
      </header>

      <div class="modal-body">
        <ng-content />
      </div>

      <footer>
        @if (showSecondary) {
          <button class="secondary-button" type="button" (click)="secondary.emit()">{{ secondaryLabel }}</button>
        }
        @if (showPrimary) {
          <button class="primary-button" [class.danger-action]="danger" type="button" [disabled]="primaryDisabled" (click)="primary.emit()">
            {{ primaryLabel }}
          </button>
        }
      </footer>
    </section>
  </div>
}
