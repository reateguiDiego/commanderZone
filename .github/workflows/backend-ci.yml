name: Validate Backend

on:
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: commanderzone
          POSTGRES_USER: commanderzone
          POSTGRES_PASSWORD: commanderzone
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -d commanderzone -U commanderzone"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, intl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create test database
        run: APP_ENV=test php bin/console doctrine:database:create --if-not-exists --no-interaction

      - name: Run migrations (test)
        run: APP_ENV=test php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run backend tests
        run: APP_ENV=test php bin/phpunit
