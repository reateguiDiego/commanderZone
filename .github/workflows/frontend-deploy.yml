name: Frontend Deploy

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: frontend

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate required Vercel secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${VERCEL_TOKEN:?Missing VERCEL_TOKEN secret}"
          : "${VERCEL_ORG_ID:?Missing VERCEL_ORG_ID secret}"
          : "${VERCEL_PROJECT_ID:?Missing VERCEL_PROJECT_ID secret}"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (production)
        run: npm run build:prod

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel production
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
