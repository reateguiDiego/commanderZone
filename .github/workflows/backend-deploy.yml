name: Backend Deploy

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to Hetzner over SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.HETZNER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HETZNER_SSH_PORT }}
          SSH_USER: ${{ secrets.HETZNER_SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          REPO_DIR: ${{ secrets.HETZNER_REPO_DIR }}
          BACKEND_DIR: ${{ secrets.HETZNER_BACKEND_DIR }}
          ENV_FILE: ${{ secrets.HETZNER_ENV_FILE }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?Missing HETZNER_SSH_HOST secret}"
          : "${SSH_USER:?Missing HETZNER_SSH_USER secret}"
          : "${SSH_PRIVATE_KEY:?Missing HETZNER_SSH_PRIVATE_KEY secret}"
          : "${REPO_DIR:?Missing HETZNER_REPO_DIR secret}"
          : "${ENV_FILE:?Missing HETZNER_ENV_FILE secret (must point to production .env.prod file)}"
          EXPECTED_ENV_FILE="/opt/commanderZone/.env.prod"

          SSH_PORT="${SSH_PORT:-22}"
          BACKEND_DIR="${BACKEND_DIR:-backend}"

          if [ "$ENV_FILE" != "$EXPECTED_ENV_FILE" ]; then
            echo "HETZNER_ENV_FILE must be exactly $EXPECTED_ENV_FILE. Current: $ENV_FILE" >&2
            exit 1
          fi

          install -m 600 /dev/null ./deploy_key
          # Accept multiline keys and keys pasted with literal "\n", and remove CRLF.
          printf '%b\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ./deploy_key

          if ! ssh-keygen -y -f ./deploy_key >/dev/null 2>&1; then
            echo "Invalid private key in HETZNER_SSH_PRIVATE_KEY (format/newlines/passphrase)." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -p "$SSH_PORT" -i ./deploy_key -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            bash -s -- "$REPO_DIR" "$BACKEND_DIR" "$ENV_FILE" <<'EOF'
          set -euo pipefail

          REPO_DIR="$1"
          BACKEND_DIR="$2"
          ENV_FILE="$3"

          cd "$REPO_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          if [ -z "$ENV_FILE" ]; then
            echo "HETZNER_ENV_FILE is required and cannot be empty." >&2
            exit 1
          fi

          ENV_BASENAME="$(basename "$ENV_FILE")"
          if [ "$ENV_BASENAME" = ".env" ]; then
            echo "Refusing to deploy with .env. Use a production-specific env file (e.g. .env.prod)." >&2
            exit 1
          fi
          if [ "$ENV_BASENAME" != ".env.prod" ]; then
            echo "HETZNER_ENV_FILE must point to a .env.prod file. Current: $ENV_FILE" >&2
            exit 1
          fi
          if [ ! -f "$ENV_FILE" ]; then
            echo "Configured HETZNER_ENV_FILE does not exist on server: $ENV_FILE" >&2
            exit 1
          fi

          COMPOSE_ARGS=(--project-directory "$REPO_DIR" --env-file "$ENV_FILE" -f "$REPO_DIR/docker-compose.yml")
          if [ -f "$REPO_DIR/docker-compose.prod.yml" ]; then
            COMPOSE_ARGS+=(-f "$REPO_DIR/docker-compose.prod.yml")
          fi

          # Validate merged compose with production env interpolation before applying changes.
          docker compose "${COMPOSE_ARGS[@]}" config >/dev/null

          # Ensure DB service is running and resolvable before running migrations from api.
          docker compose "${COMPOSE_ARGS[@]}" up -d database
          docker compose "${COMPOSE_ARGS[@]}" up -d --build --no-deps api mercure websocket
          DB_CONTAINER_ID="$(docker compose "${COMPOSE_ARGS[@]}" ps -q database)"
          if [ -z "$DB_CONTAINER_ID" ]; then
            echo "Database container not found in compose project." >&2
            exit 1
          fi
          for i in $(seq 1 30); do
            DB_HEALTH="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' "$DB_CONTAINER_ID" 2>/dev/null || true)"
            if [ "$DB_HEALTH" = "healthy" ] || [ "$DB_HEALTH" = "running" ]; then
              break
            fi
            sleep 2
          done
          if [ "$DB_HEALTH" != "healthy" ] && [ "$DB_HEALTH" != "running" ]; then
            echo "Database container did not become ready. Current health: $DB_HEALTH" >&2
            docker compose "${COMPOSE_ARGS[@]}" logs --tail=100 database || true
            exit 1
          fi

          WS_CONTAINER_ID="$(docker compose "${COMPOSE_ARGS[@]}" ps -q websocket)"
          if [ -z "$WS_CONTAINER_ID" ]; then
            echo "Websocket container not found in compose project." >&2
            exit 1
          fi
          for i in $(seq 1 30); do
            WS_HEALTH="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}' "$WS_CONTAINER_ID" 2>/dev/null || true)"
            if [ "$WS_HEALTH" = "healthy" ] || [ "$WS_HEALTH" = "running" ]; then
              break
            fi
            sleep 2
          done
          if [ "$WS_HEALTH" != "healthy" ] && [ "$WS_HEALTH" != "running" ]; then
            echo "Websocket container did not become ready. Current health: $WS_HEALTH" >&2
            docker compose "${COMPOSE_ARGS[@]}" logs --tail=100 websocket || true
            exit 1
          fi

          docker compose "${COMPOSE_ARGS[@]}" exec -T -e APP_ENV=prod api php bin/console doctrine:migrations:migrate --no-interaction
          docker compose "${COMPOSE_ARGS[@]}" exec -T -e APP_ENV=prod api php bin/console cache:clear --no-warmup
          docker compose "${COMPOSE_ARGS[@]}" exec -T -e APP_ENV=prod api php bin/console cache:warmup
          EOF

          rm -f ./deploy_key
